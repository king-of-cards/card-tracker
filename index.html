  function Products({ division, products, vendors, onUpsert, onStage, onStageBulk, onQC, onRemove, addVendor, allowedStages, operator }) {
    const [q, setQ] = useState(""); const [open, setOpen] = useState({}); const [modal, setModal] = useState(false); const [showSug, setShowSug] = useState(false); const [page, setPage] = useState(1);

    const [selected, setSelected] = useState({}); const [bulkStage, setBulkStage] = useState(""); const [bulkStatus, setBulkStatus] = useState("Completed");
    const [bulkBusy, setBulkBusy] = useState(false);
    const [bulkErr, setBulkErr] = useState("");
    const isFullAccess = allowedStages === null;
    const selectedIds = Object.keys(selected).filter(id => selected[id]);
    const toggleSelect = (id) => setSelected(s => ({ ...s, [id]: !s[id] }));
    const clearSelect = () => setSelected({});

    const applyBulk = async () => {
      if (!bulkStage || selectedIds.length === 0) return;
      setBulkBusy(true);
      setBulkErr("");
      const personName = (operator && operator.trim()) || "";
      try {
        if (onStageBulk) {
          await onStageBulk(selectedIds, bulkStage, { status: bulkStatus, person: personName });
        } else {
          for (const id of selectedIds) { await onStage(id, bulkStage, { status: bulkStatus, person: personName }); }
        }
        clearSelect();
      } catch (e) {
        console.error("Bulk apply failed", e);
        setBulkErr("Could not apply to all selected — please try again or check your connection.");
      } finally {
        setBulkBusy(false);
      }
    };

    useEffect(() => { window.__openAdd = () => { if (isFullAccess) setModal(true); }; return () => { delete window.__openAdd; }; }, [isFullAccess]);

    const filtered = products.filter(p => {
      const t = (p.sku + " " + p.name + " " + p.vendor).toLowerCase(); if (!t.includes(q.toLowerCase())) return false;
      return true;
    });
    const totalPages = Math.max(1, Math.ceil(filtered.length / 20));
    return (
      <div>
        <div className="toolbar">
          <div className="search" style={{ position: "relative" }}>
            {I.search({})}
            <input placeholder="Search SKU, product or vendor…" value={q}
              onChange={e => { setQ(e.target.value); setShowSug(true); setPage(1); }}
              onBlur={() => setTimeout(() => setShowSug(false), 150)}
              onFocus={() => { if (q) setShowSug(true); }} />
            {showSug && q.length > 0 && (() => {
              const sugs = products.filter(p => (p.sku + " " + p.name + " " + p.vendor).toLowerCase().includes(q.toLowerCase())).slice(0, 8);
              return sugs.length > 0 ? (
                <div style={{ position: "absolute", top: "calc(100% + 6px)", left: 0, right: 0, background: "var(--card)", border: "1px solid var(--line2)", borderRadius: 12, boxShadow: "var(--shadow-lg)", zIndex: 50, overflow: "hidden" }}>
                  {sugs.map(p => (
                    <div key={p.id} onMouseDown={() => { setQ(p.sku); setShowSug(false); }}
                      style={{ display: "flex", alignItems: "center", gap: 10, padding: "9px 14px", cursor: "pointer", borderBottom: "1px solid var(--line)" }}
                      onMouseEnter={e => e.currentTarget.style.background = "var(--card-2)"}
                      onMouseLeave={e => e.currentTarget.style.background = "var(--card)"}>
                      <span className="psku" style={{ flexShrink: 0 }}>{p.sku}</span>
                      {p.name && <span style={{ fontSize: 12, fontWeight: 600, color: "var(--ink)" }}>{p.name}</span>}
                      {p.vendor && <span style={{ fontSize: 11, color: "var(--muted)", marginLeft: "auto" }}>{p.vendor}</span>}
                      {p.set_no && <span className="psku" style={{ background: "var(--peach-bg)", color: "var(--peach-ink)", border: "1px solid var(--peach)", flexShrink: 0 }}>{p.set_no}</span>}
                    </div>
                  ))}
                </div>
              ) : null;
            })()}
          </div>
        </div>
        {selectedIds.length > 0 && (
          <div style={{ display: "flex", alignItems: "center", gap: 10, background: "var(--sky-bg)", border: "1px solid var(--sky)", borderRadius: 12, padding: "10px 14px", marginBottom: 12, flexWrap: "wrap" }}>
            <span style={{ fontSize: 13, fontWeight: 600, color: "var(--sky-ink)" }}>{selectedIds.length} selected</span>
            <button className="ghost" style={{ padding: "7px 12px", fontSize: 12 }} onClick={() => { const allIds = {}; filtered.slice((page - 1) * 20, page * 20).forEach(p => allIds[p.id] = true); setSelected(allIds); }}>Select page</button>
            <button className="ghost" style={{ padding: "7px 12px", fontSize: 12 }} onClick={() => { const allIds = {}; filtered.forEach(p => allIds[p.id] = true); setSelected(allIds); }}>Select all ({filtered.length})</button>
            <select value={bulkStage} onChange={e => setBulkStage(e.target.value)} style={{ border: "1px solid var(--line2)", borderRadius: 8, padding: "6px 10px", background: "var(--card)", fontSize: 12 }}>
              <option value="">— pick stage —</option>
              {(allowedStages ? STAGES.filter(s => allowedStages.includes(s.k)) : STAGES).filter(s => s.k !== "qc").map(s => <option key={s.k} value={s.k}>{s.n}</option>)}
            </select>
            <select value={bulkStatus} onChange={e => setBulkStatus(e.target.value)} style={{ border: "1px solid var(--line2)", borderRadius: 8, padding: "6px 10px", background: "var(--card)", fontSize: 12 }}>
              {STATUSES.map(s => <option key={s}>{s}</option>)}
            </select>
            <button className="primary" onClick={applyBulk} disabled={!bulkStage || bulkBusy} style={{ padding: "7px 14px", fontSize: 12 }}>{bulkBusy ? "Applying…" : "Apply to all"}</button>
            <button className="ghost" onClick={clearSelect} style={{ padding: "7px 12px", fontSize: 12 }}>Clear</button>
            {bulkErr && <div style={{ color: "var(--rose-ink)", fontSize: 12, fontWeight: 600, width: "100%" }}>{bulkErr}</div>}
          </div>
        )}
        {filtered.length === 0 ? <div className="card empty">No products match. Add your first SKU to start tracking its full pipeline.</div> : (
          <div>
            <div className="plist">{filtered.slice((page - 1) * 20, page * 20).map(p => <ProductRow key={p.id} p={p} open={!!open[p.id]} toggle={() => setOpen(o => ({ ...o, [p.id]: !o[p.id] }))} onStage={onStage} onQC={onQC} onRemove={onRemove} allowedStages={allowedStages} selected={!!selected[p.id]} onSelect={() => toggleSelect(p.id)} operator={operator} />)}</div>
            {totalPages > 1 && (
              <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 6, marginTop: 16, flexWrap: "wrap" }}>
                <button className="ghost" style={{ padding: "7px 12px", fontSize: 12 }} disabled={page === 1} onClick={() => setPage(1)}>«</button>
                <button className="ghost" style={{ padding: "7px 12px", fontSize: 12 }} disabled={page === 1} onClick={() => setPage(p => p - 1)}>‹ Prev</button>
                {Array.from({ length: totalPages }, (_, i) => i + 1).filter(n => n === 1 || n === totalPages || Math.abs(n - page) <= 2).reduce((acc, n, i, arr) => { if (i > 0 && n - arr[i - 1] > 1) acc.push("..."); acc.push(n); return acc; }, []).map((n, i) => n === "..." ? (<span key={"e" + i} style={{ padding: "0 4px", color: "var(--faint)" }}>…</span>) : (<button key={n} onClick={() => setPage(n)} style={{ padding: "7px 12px", fontSize: 12, borderRadius: 10, border: "1px solid var(--line2)", background: page === n ? "var(--ink)" : "var(--card)", color: page === n ? "#fff" : "var(--ink)", fontWeight: 600, cursor: "pointer" }}>{n}</button>))}
                <button className="ghost" style={{ padding: "7px 12px", fontSize: 12 }} disabled={page === totalPages} onClick={() => setPage(p => p + 1)}>Next ›</button>
                <button className="ghost" style={{ padding: "7px 12px", fontSize: 12 }} disabled={page === totalPages} onClick={() => setPage(totalPages)}>»</button>
                <span style={{ fontSize: 12, color: "var(--muted)", marginLeft: 4 }}>{(page - 1) * 20 + 1}–{Math.min(page * 20, filtered.length)} of {filtered.length}</span>
              </div>
            )}
          </div>
        )}
        {modal && isFullAccess && <AddModal division={division} vendors={vendors} addVendor={addVendor} onClose={() => setModal(false)} onSave={p => { onUpsert(p, true); setModal(false); }} />}
      </div>
    );
  }

  function ProductRow({ p, open, toggle, onStage, onQC, onRemove, allowedStages, selected, onSelect, operator }) {
    const pct = productPct(p); const hasIssue = STAGES.some(s => p.stages[s.k].status === "Issue");
    const isFullAccess = allowedStages === null;
    // Filter stages visible to this user
    const visibleStages = allowedStages ? STAGES.filter(s => allowedStages.includes(s.k)) : STAGES;
    return (
      <div className="prow">
        <div className="phead" style={{ background: selected ? "var(--sky-bg)" : "" }}>
          <input type="checkbox" checked={selected} onChange={e => { e.stopPropagation(); onSelect(); }} onClick={e => e.stopPropagation()} style={{ width: 15, height: 15, accentColor: "var(--sky-ink)", cursor: "pointer", flexShrink: 0 }} />
          <span className={"chev " + (open ? "open" : "")} onClick={toggle}>▶</span>
          <span className="psku" onClick={toggle} style={{ cursor: "pointer" }}>{p.sku || "no-sku"}</span>
          {p.name && <span className="pname">{p.name}</span>}
          <span className="pvend">· {p.vendor || "—"} · {p.qty || 0} cards</span>
          {p.set_no && <span className="psku" style={{ background: "var(--peach-bg)", color: "var(--peach-ink)", border: "1px solid var(--peach)" }}>{p.set_no}</span>}
          <div className="spacer" />
          {hasIssue && <Chip status="Issue" />}
          {p.verdict === "Approved" && <span className="chip c-done"><span className="dot" />QC Approved</span>}
          <Pipe p={p} />
          <span className="pct">{pct}%</span>
        </div>
        {open && (
          <div className="pbody">
            {/* Active stage cards grid */}
            <div style={{ display: "flex", flexDirection: "column", gap: 8, padding: "14px 16px" }}>
              {visibleStages.filter(s => s.k !== "qc" && p.stages[s.k].status !== "Completed").map((s, i) => (
                <StageEditor key={s.k} p={p} stage={s} idx={STAGES.findIndex(st => st.k === s.k) + 1} onStage={onStage} operator={operator} />
              ))}
            </div>
            {/* Completed stages — pill popup style */}
            {visibleStages.filter(s => s.k !== "qc" && p.stages[s.k].status === "Completed").length > 0 && (
              <div style={{ borderTop: "1px solid var(--line)", padding: "10px 16px", background: "var(--sage-bg)", display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap" }}>
                <span style={{ fontSize: 11, fontWeight: 700, color: "var(--sage-ink)", letterSpacing: ".6px", textTransform: "uppercase", whiteSpace: "nowrap" }}>Done</span>
                {visibleStages.filter(s => s.k !== "qc" && p.stages[s.k].status === "Completed").map(s => {
                  const st = p.stages[s.k];
                  return (
                    <div key={s.k} style={{ position: "relative", display: "inline-block" }} className="done-pill-wrap">
                      <span className="done-pill" style={{ display: "inline-flex", alignItems: "center", gap: 5, background: "var(--card)", border: "1px solid var(--sage)", borderRadius: 999, padding: "3px 11px", fontSize: 12, color: "var(--sage-ink)", fontWeight: 600, cursor: "default" }}>
                        ✓ {s.n}
                      </span>
                      <div className="done-popup" style={{ position: "absolute", bottom: "calc(100% + 7px)", left: "50%", transform: "translateX(-50%)", background: "var(--ink)", color: "#fff", borderRadius: 9, padding: "8px 12px", fontSize: 11.5, whiteSpace: "nowrap", zIndex: 10, pointerEvents: "none", opacity: 0, transition: "opacity .15s", lineHeight: 1.6, boxShadow: "var(--shadow-lg)" }}>
                        <b style={{ color: "var(--sage)" }}>✓ {s.n}</b><br />
                        {st.person && <span>By: {st.person}<br /></span>}
                        {st.comments && <span>Note: {st.comments}<br /></span>}
                        <span style={{ color: "#B3AFA4" }}>{st.at ? fmt(st.at) : "—"}</span>
                        <div style={{ position: "absolute", bottom: -5, left: "50%", transform: "translateX(-50%)", width: 10, height: 10, background: "var(--ink)", borderRadius: 2, rotate: "45deg" }} />
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
            {/* QC — only for full access users */}
            {isFullAccess && <QCStage p={p} idx={STAGES.length} onQC={onQC} />}
            <div style={{ padding: "13px 16px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <span className="tag">Inward {p.inward || "—"} · created {fmt(p.createdAt)} · updated {fmt(p.updatedAt)}</span>
              {isFullAccess && <button className="danger" onClick={() => { if (confirm("Delete this product?")) onRemove(p.id); }}>Delete product</button>}
            </div>
          </div>
        )}
      </div>
    );
  }

  function StageEditor({ p, stage, idx, onStage, operator }) {
    const cur = p.stages[stage.k];
    const [status, setStatus] = useState(cur.status), [comments, setComments] = useState(cur.comments), [saved, setSaved] = useState(false);
    useEffect(() => { setStatus(cur.status); setComments(cur.comments); }, [cur.status, cur.comments]);
    const effectivePerson = (operator && operator.trim()) || cur.person || "";
    const dirty = status !== cur.status || comments !== cur.comments;
    const save = () => {
      // Guard: if the product's authoritative status already moved away from what
      // this row was editing (e.g. a bulk update landed), refuse to write stale state.
      if (status !== cur.status && cur.status === "Completed") {
        setStatus(cur.status); setComments(cur.comments);
        return;
      }
      onStage(p.id, stage.k, { status, person: effectivePerson, comments });
      setSaved(true);
      setTimeout(() => setSaved(false), 1400);
    };
    if (cur.status === "Completed") return null;
    return (
      <div style={{ background: "var(--card)", border: "1px solid var(--line)", borderRadius: 11, padding: "12px 14px", display: "flex", alignItems: "center", gap: 14, boxShadow: "var(--shadow)" }}>
        <span className="stnum" style={{ flex: "0 0 22px" }}>{idx}</span>
        <span style={{ fontWeight: 600, fontSize: 13, width: 150, flexShrink: 0 }}>{stage.n}</span>
        <select value={status} onChange={e => setStatus(e.target.value)} style={{ border: "1px solid var(--line2)", borderRadius: 8, padding: "6px 9px", background: "var(--bg)", fontSize: 12, width: 130, flexShrink: 0 }}>
          {STATUSES.map(s => <option key={s}>{s}</option>)}
        </select>
        <span className="tag" style={{ width: 110, flexShrink: 0, fontSize: 12, fontWeight: 600, color: "var(--sage-ink)", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }} title={effectivePerson || "no name set"}>
          {effectivePerson || "—"}
        </span>
        <input className="txt" placeholder="comments…" value={comments} onChange={e => setComments(e.target.value)} style={{ fontSize: 12, padding: "6px 9px", flex: 1, minWidth: 0 }} />
        <span style={{ fontSize: 10.5, color: "var(--faint)", whiteSpace: "nowrap", flexShrink: 0 }}>{cur.at ? fmt(cur.at) : "—"}</span>
        <button className={"mini " + (saved ? "saved" : "")} disabled={!dirty && !saved} onClick={save} style={{ flexShrink: 0 }}>{saved ? "✓" : "Save"}</button>
      </div>
    );
  }

  function QCStage({ p, idx, onQC }) {
    const [verdict, setVerdict] = useState(p.verdict || ""), [issues, setIssues] = useState(p.issues || ""), [saved, setSaved] = useState(false);
    useEffect(() => { setVerdict(p.verdict || ""); setIssues(p.issues || ""); }, [p.verdict, p.issues]);
    const dirty = verdict !== (p.verdict || "") || issues !== (p.issues || "");
    const save = () => { onQC(p.id, { verdict, issues }); setSaved(true); setTimeout(() => setSaved(false), 1400); };
    return (
      <div className="stage" style={{ background: "var(--card)" }}>
        <div className="lab"><span className="stnum">{idx}</span>Final QC / Audit</div>
        <label className="fld">Verdict<select value={verdict} onChange={e => setVerdict(e.target.value)}><option value="">— pending review —</option><option>Approved</option><option>Issues Found</option></select></label>
        <label className="fld">Auditor notes / issues after final audit<textarea placeholder="e.g. colour difference on 3 cards, content typo…" value={issues} onChange={e => setIssues(e.target.value)} /></label>
        <button className={"mini " + (saved ? "saved" : "")} disabled={!dirty && !saved} onClick={save}>{saved ? "Saved ✓" : "Save"}</button>
      </div>
    );
  }

  function AddModal({ division, vendors, addVendor, onClose, onSave }) {
    const [f, setF] = useState(() => blankProduct(division, "")); const [nv, setNv] = useState("");
    const set = (k, v) => setF(p => ({ ...p, [k]: v }));
    return (
      <div className="scrim" onClick={onClose}><div className="modal" onClick={e => e.stopPropagation()}>
        <h3>New product · {division}</h3>
        <div className="mbody">
          <div className="mrow">
            <label className="fld">SKU / Barcode<input className="txt" value={f.sku} onChange={e => set("sku", e.target.value)} placeholder="e.g. KOC-00142" /></label>
            <label className="fld">Card quantity<input className="txt" type="number" value={f.qty} onChange={e => set("qty", +e.target.value)} /></label>
          </div>
          <label className="fld">Product name<input className="txt" value={f.name} onChange={e => set("name", e.target.value)} placeholder="design / card name" /></label>
          <div className="mrow">
            <label className="fld">Vendor<select value={f.vendor} onChange={e => set("vendor", e.target.value)}><option value="">— select —</option>{vendors.map(v => <option key={v}>{v}</option>)}</select></label>
            <label className="fld">Inward date<input className="txt" type="date" value={f.inward} onChange={e => set("inward", e.target.value)} /></label>
          </div>
          <div className="mrow">
            <label className="fld">Add a new vendor<input className="txt" value={nv} onChange={e => setNv(e.target.value)} placeholder="vendor name" /></label>
            <button className="ghost" style={{ alignSelf: "end" }} onClick={() => { addVendor(division, nv.trim()); set("vendor", nv.trim()); setNv(""); }}>Add vendor</button>
          </div>
          <label className="fld">Note (optional)<textarea value={f.note} onChange={e => set("note", e.target.value)} placeholder="old/new split, set number, etc." /></label>
        </div>
        <div className="mfoot"><button className="ghost" onClick={onClose}>Cancel</button><button className="primary" onClick={() => onSave(f)}>Create product</button></div>
      </div></div>
    );
  }

  /* ---------------- DISPATCH ---------------- */
  function Dispatch({ products, onStore, onStage, operator }) {
    const [q, setQ] = useState(""); const [open, setOpen] = useState({});
    const filtered = products.filter(p => (p.sku + " " + p.name + " " + p.vendor).toLowerCase().includes(q.toLowerCase()));
    return (
      <div>
        <div className="note">Cards are scanned before dispatch, then sent to each store. Store executives confirm receipt and flag any missing or damaged cards — flagged shortages appear instantly on the Overview alerts.</div>
        <div className="toolbar" style={{ marginTop: 14 }}><div className="search">{I.search({})}<input placeholder="Search product to dispatch / receive…" value={q} onChange={e => setQ(e.target.value)} /></div></div>
        {filtered.length === 0 ? <div className="card empty">No products to dispatch yet.</div> :
          <div className="plist">{filtered.map(p => <DispatchRow key={p.id} p={p} open={!!open[p.id]} toggle={() => setOpen(o => ({ ...o, [p.id]: !o[p.id] }))} onStore={onStore} onStage={onStage} operator={operator} />)}</div>}
      </div>
    );
  }
  function DispatchRow({ p, open, toggle, onStore, onStage, operator }) {
    const scan = p.stages.scan;
    const recvCount = STORES.filter(st => p.stores[st].received).length;
    const issueCount = STORES.filter(st => p.stores[st].missing > 0 || p.stores[st].damaged > 0).length;
    return (
      <div className="prow">
        <div className="phead" onClick={toggle}>
          <span className={"chev " + (open ? "open" : "")}>▶</span>
          <span className="psku">{p.sku || "no-sku"}</span>{p.name && <span className="pname">{p.name}</span>}<span className="pvend">· {p.vendor || "—"}</span>
          <div className="spacer" />
          {scan.status === "Completed" ? <span className="chip c-done"><span className="dot" />Scanned</span> : <span className="chip c-app"><span className="dot" />Not scanned</span>}
          {issueCount > 0 && <span className="chip c-issue"><span className="dot" />{issueCount} store issue</span>}
          <span className="tag">{recvCount}/{STORES.length} received</span>
        </div>
        {open && (

    const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, sheetName);

  function readSheet(file, cb) {
    const isCsv = /\.csv$/i.test(file.name); const reader = new FileReader();
    reader.onload = e => {
      try {
        const wb = isCsv ? XLSX.read(e.target.result, { type: "string" }) : XLSX.read(new Uint8Array(e.target.result), { type: "array", cellDates: true });
        const sn = wb.SheetNames.find(n => /product|store|template|data/i.test(n)) || wb.SheetNames[0];
        cb(XLSX.utils.sheet_to_json(wb.Sheets[sn], { defval: "" }), null);

    };
    if (isCsv) reader.readAsText(file); else reader.readAsArrayBuffer(file);

  function AuditLog({ audit, products, onStage }) {
    const [q, setQ] = useState("");

    const skuToProduct = useMemo(() => {
      const m = {};
      products.forEach(p => { m[p.sku] = p; if (p.name) m[p.name.toLowerCase()] = p; });
      return m;
    }, [products]);

    const stageNameToKey = useMemo(() => {
      const m = {};
      STAGES.forEach(s => { m[s.n] = s.k; });
      return m;
    }, []);

    // Build completed-stage rows straight from the audit log (not from the
    // product's current "person" field, which is frequently left blank on
    // bulk imports / admin edits). Person resolution mirrors the Process tab:
    // prefer the name typed into the stage's person field, fall back to the
    // actor (logged-in operator) who actually performed the action.
    const completedRows = useMemo(() => {
      // Find only the MOST RECENT "Stage update" record per product+stage —
      // not the full history. This way, moving a stage back to In Progress
      // logs a newer entry that immediately replaces the old "Completed" one
      // here, so the row disappears right away instead of lingering forever.
      const latestByKey = new Map();
      audit.forEach(a => {
        if (a.action !== "Stage update") return;
        const detail = String(a.detail || "");
        const m = detail.match(/^(.+?)\s*→\s*([^·]+?)(?:\s*·\s*(.+))?$/);
        if (!m) return;
        const stageName = m[1].trim();
        const status = m[2].trim();
        const personFromDetail = (m[3] || "").trim();

        const prod = skuToProduct[a.entity] || skuToProduct[String(a.entity || "").toLowerCase()];
        const stageKey = stageNameToKey[stageName] || "";
        if (!prod || !stageKey) return;

        const key = prod.id + "|" + stageKey;
        const existing = latestByKey.get(key);
        if (!existing || new Date(a.at) > new Date(existing.a.at)) {
          latestByKey.set(key, { a, prod, stageKey, stageName, status, personFromDetail });
        }
      });

      const rows = [];
      latestByKey.forEach(({ a, prod, stageKey, stageName, status, personFromDetail }) => {
        if (status !== "Completed") return;

        if (!prod || prod.stages[stageKey]?.status !== "Completed") return;
        const person = personFromDetail || (a.actor || "").trim() || "—";
        if (person === "—") return;
        const comments = prod.stages[stageKey].comments || "";
        rows.push({
          id: a.id,
          productId: prod.id,
          sku: prod.sku,
          stageName,
          stageKey,
          person,
          comments,
          at: a.at,
          division: a.division
        });
      });
      rows.sort((x, y) => new Date(y.at) - new Date(x.at));
      return rows;
    }, [audit, skuToProduct, stageNameToKey]);

    const filtered = completedRows.filter(r =>
      (r.sku + " " + r.stageName + " " + r.person + " " + r.comments)
        .toLowerCase().includes(q.toLowerCase())
    );

    const moveBack = (row) => {
      if (!row.productId || !row.stageKey) return;
      const prod = products.find(p => p.id === row.productId);
      if (!prod) return;
      onStage(prod.id, row.stageKey, { status: "In Progress", person: prod.stages[row.stageKey].person, comments: prod.stages[row.stageKey].comments });
    };

    return (
      <div>
        <div className="note">Showing every stage marked Completed, drawn from the full activity log — including bulk imports and admin updates, regardless of whether a "person" name was typed in. Use <b>↩ In Progress</b> to move a stage back if needed.</div>
        <div className="toolbar" style={{ marginTop: 14 }}>
          <div className="search">{I.search({})}<input placeholder="Filter by SKU, stage, person…" value={q} onChange={e => setQ(e.target.value)} /></div>
          <span className="tag">{filtered.length} completed stages</span>
        </div>
        {filtered.length === 0
          ? <div className="card empty">No completed stages yet.</div>
          : <div className="tbl-wrap">
            <table>
              <thead>
                <tr>
                  <th style={{ width: 140 }}>When</th>
                  <th style={{ width: 110 }}>SKU</th>
                  <th style={{ width: 160 }}>Stage</th>
                  <th style={{ width: 120 }}>By</th>
                  <th>Comments</th>
                  <th style={{ width: 120 }}></th>
                </tr>
              </thead>
              <tbody>
                {filtered.map(r => (
                  <tr key={r.id} style={{ background: "var(--sage-bg)" }}>
                    <td className="tag" style={{ whiteSpace: "nowrap" }}>{fmt(r.at)}</td>
                    <td><span className="psku">{r.sku}</span></td>
                    <td>
                      <span className="audit-act" style={{ background: "var(--sage)", color: "#fff" }}>
                        ✓ {r.stageName}
                      </span>
                    </td>
                    <td style={{ fontWeight: 600 }}>{r.person}</td>
                    <td className="tag">{r.comments || "—"}</td>
                    <td>
                      <button
                        onClick={() => { if (confirm("Move back to In Progress?")) moveBack(r); }}
                        style={{ fontSize: 11, padding: "4px 10px", border: "1px solid var(--sky)", borderRadius: 7, background: "var(--sky-bg)", color: "var(--sky-ink)", fontWeight: 600, cursor: "pointer", whiteSpace: "nowrap" }}>
                        ↩ In Progress
                      </button>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        }
      </div>
    );
  }

    const divAllProducts = useMemo(() => allProducts.filter(p => p.division === division), [allProducts, division]);

    // SKUs already assigned to ANY member under this manager
    // Master has zero restriction — no lock applies, ever.
    // Managers (role:member with "assign") lock per-card WITHIN THEIR OWN scope only —
    // other managers' teams assigning the same card doesn't block this manager.
    const myAssignedSkus = useMemo(() => {
      if (isMasterOrAdmin) return new Set(); // unused for master
      const myTeamIds = new Set(assignableMembers.map(m => m.id));
      return new Set(
        divAssignments
          .filter(a => myTeamIds.has(a.memberId))
          .map(a => a.sku.trim().toLowerCase())
      );
    }, [divAssignments, assignableMembers, isMasterOrAdmin]);

    const isLocked = (sku) => isMasterOrAdmin ? false : myAssignedSkus.has(sku.trim().toLowerCase());
    // Manager's remaining pool = cards NOT assigned to anyone yet
    const managerPool = useMemo(() => {
      if (isMasterOrAdmin) {
        // Master sees ALL products always — no SKU is ever hidden from master
        return divAllProducts;
      } else {
        // What master assigned TO me (memberId = myMemberId)
        const myReceivedSkus = new Set(
          divAssignments
            .filter(a => a.memberId === myMemberId)
            .map(a => a.sku.trim().toLowerCase())
        );
        // What I have already pushed to my team members (managerId = myMemberId)
        const myPushedSkus = new Set(
          divAssignments
            .filter(a => a.managerId === myMemberId)
            .map(a => a.sku.trim().toLowerCase())
        );
        // Pool = what I received minus what I already pushed
        return divAllProducts.filter(p =>
          myReceivedSkus.has(p.sku.trim().toLowerCase()) &&
          !myPushedSkus.has(p.sku.trim().toLowerCase())
        );
      }
    }, [divAllProducts, divAssignments, isMasterOrAdmin, myMemberId]);

    // For the assignment picker, show ONLY manager's unassigned pool (filtered by vendor)
    const filteredProducts = useMemo(() =>
      managerPool.filter(p => !selVendor || p.vendor === selVendor),
      [managerPool, selVendor]);

    const availableSkus = useMemo(() =>
      filteredProducts.map(p => p.sku),
      [filteredProducts]);

    // const addMember = async () => {
    //   if (!newName.trim() || !newEmail.trim() || !newPass.trim()) { setAddErr("Name, email and password are required."); return; }
    //   const id = newName.trim().toLowerCase().replace(/\s+/g, "_");
    //   if (teamMembers.find(m => m.id === id && m.division === division)) { setAddErr("A member with this name already exists."); return; }

    //   // stages based on role
    //   // const roleStages = {
    //   //   backend: "barcoding,content,backend,website",
    //   //   content: "barcoding,content,backend,website",
    //   //   photography: "photography,videography,videoedit,images",
    //   //   videography: "photography,videography,videoedit,images"
    //   // };

    //   if (selectedStages.length === 0) { setAddErr("Select at least one stage for this member."); return; }
    //   const stages = selectedStages.join(",");
    //   // const stages = roleStages[newRole] || "barcoding,content,backend,website";

    //   const m = {
    //     id,
    //     name: newName.trim(),
    //     email: newEmail.trim(),
    //     password: newPass.trim(),
    //     role: "member",
    //     stages,
    //     division,
    //     joinedAt: now()
    //   };
    //   const updatedTeam = [...teamMembers, m];
    //   onSaveTeam(updatedTeam);

    //   // Save to Users sheet
    //   const existingUsers = await gsGetUsers();
    //   const alreadyExists = existingUsers.find(u => u.email.toLowerCase() === newEmail.trim().toLowerCase());
    //   if (!alreadyExists) {
    //     await gsPost("saveUsers", [...existingUsers, {
    //       email: newEmail.trim(),
    //       password: newPass.trim(),
    //       name: newName.trim(),
    //       role: "member",
    //       stages
    //     }]);
    //   }

    //   setNewName(""); setNewEmail(""); setNewPass(""); setAddErr(""); setSelectedStages([]);
    // };


    const addMember = async () => {
      if (!newName.trim() || !newEmail.trim() || !newPass.trim()) { setAddErr("Name, email and password are required."); return; }
      const id = newName.trim().toLowerCase().replace(/\s+/g, "_");
      if (teamMembers.find(m => m.id === id && m.division === division)) { setAddErr("A member with this name already exists."); return; }
      if (selectedStages.length === 0) { setAddErr("Select at least one stage for this member."); return; }

      const stages = selectedStages.join(",");
      const nameVal = newName.trim(), emailVal = newEmail.trim(), passVal = newPass.trim();

      const m = {
        id,
        name: nameVal,
        email: emailVal,
        password: passVal,
        role: "member",
        stages,
        division,
        managerId: isMasterOrAdmin ? null : myMemberId,
        joinedAt: now()
      };
      const updatedTeam = [...teamMembers, m];
      onSaveTeam(updatedTeam);

      // Reset the form right away — don't wait on the network round-trip below
      setNewName(""); setNewEmail(""); setNewPass(""); setAddErr(""); setSelectedStages([]);
      setAddMsg(`✓ ${nameVal} added to the team.`);

      // Save to Users sheet in the background; form is already reset by this point
      const existingUsers = await gsGetUsers();
      const alreadyExists = existingUsers.find(u => u.email.toLowerCase() === emailVal.toLowerCase());
      if (!alreadyExists) {
        await gsPost("saveUsers", [...existingUsers, {
          email: emailVal,
          password: passVal,
          name: nameVal,
          role: "member",
          stages
        }]);
      }
    };

    const removeMember = async (id) => {
      const member = teamMembers.find(m => m.id === id && m.division === division);
      onSaveTeam(teamMembers.filter(m => !(m.id === id && m.division === division)));
      onSaveAssignments(assignments.filter(a => !(a.memberId === id && a.division === division)));

      // Remove from Users sheet too
      if (member) {
        const existingUsers = await gsGetUsers();
        const updated = existingUsers.filter(u => u.email.toLowerCase() !== member.email.toLowerCase());
        await gsPost("saveUsers", updated);
      }
    };

    const [selStages, setSelStages] = useState([]);

    const assignSku = () => {
      if (!selMember || selSkus.length === 0 || selStages.length === 0) {
        setAssErr("Select a member, at least one SKU, and at least one stage.");
        return;
      }
      const member = assignableMembers.find(m => m.id === selMember);
      if (!member) { setAssErr("Member not found."); return; }

      let updatedAssignments = [...assignments];
      selSkus.forEach(sku => {
        selStages.forEach(stageKey => {
          updatedAssignments = updatedAssignments.filter(a =>
            !(a.division === division && a.sku.trim().toLowerCase() === sku.trim().toLowerCase() && a.stage === stageKey)
          );
          updatedAssignments.push({
            id: uid(),
            memberId: selMember,
            managerId: isMasterOrAdmin ? "master" : myMemberId,
            sku,
            stage: stageKey,
            division,
            assignedAt: now()
          });
        });
      });
      onSaveAssignments(updatedAssignments);
      setSelSkus([]);
      setSelStages([]);
      setAssErr("");
      setAssMsg(`✓ Assigned ${selSkus.length} SKU(s) × ${selStages.length} stage(s) to ${member.name}.`);
    };

    const unassign = (id, sku, memberName) => {
      onSaveAssignments(assignments.filter(a => a.id !== id));
      setAssErr("");
      setAssMsg(`✓ Removed ${sku} from ${memberName}.`);
    };

    const selectTop = (n) => {
      setAssMsg(""); setAssErr("");
      if (!selMember) { setAssErr("Select a team member first."); return; }
      const remaining = availableSkus.filter(sku => !selSkus.includes(sku));
      if (remaining.length === 0) { setAssErr("No more unassigned SKUs left to select."); return; }
      setSelSkus(prev => [...prev, ...remaining.slice(0, n)]);
    };

    const deselectTop = (n) => {
      setAssMsg(""); setAssErr("");
      if (selSkus.length === 0) { setAssErr("Nothing is selected yet."); return; }
      const orderedSelected = filteredProducts.map(p => p.sku).filter(sku => selSkus.includes(sku));
      const toRemove = orderedSelected.slice(0, n);
      setSelSkus(prev => prev.filter(sku => !toRemove.includes(sku)));
    };

    const selectAllAvailable = () => {
      setAssMsg(""); setAssErr("");
      if (!selMember) { setAssErr("Select a team member first."); return; }
      if (availableSkus.length === 0) { setAssErr("No unassigned SKUs available."); return; }
      setSelSkus(availableSkus);
    };

    const [selectedStages, setSelectedStages] = useState([]);
    const allStages = STAGES.filter(s => s.k !== "qc" && s.k !== "scan");
    const allPermissions = isMasterOrAdmin
      ? [...allStages, { k: "bulk", n: "Bulk Upload" }, { k: "assign", n: "Assign Work" }]
      : allStages.filter(s => (auth.stages || "").split(",").map(x => x.trim()).includes(s.k));
    // const assignableStages = STAGES.filter(s => s.k !== "qc" && s.k !== "scan");
    return (
      <div>
        <div style={{ display: "flex", gap: 8, marginBottom: 20 }}>
          {(canManageMembers ? [["members", "Team Members"], ["assignments", "SKU Assignments"]] : [["assignments", "SKU Assignments"]]).map(([k, n]) => (
            <button key={k} onClick={() => setSubTab(k)} style={{ padding: "8px 18px", borderRadius: 10, border: "1px solid var(--line2)", background: subTab === k ? "var(--ink)" : "var(--card)", color: subTab === k ? "#fff" : "var(--ink)", fontWeight: 600, fontSize: 13 }}>{n}</button>
          ))}
        </div>

        {subTab === "members" && canManageMembers && (
          <div>
            <div className="card pad" style={{ marginBottom: 16 }}>
              <h3 style={{ margin: "0 0 14px", fontSize: 15, fontWeight: 600 }}>Add team member — {division}</h3>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 12 }}>
                <label className="fld">Full name<input className="txt" placeholder="e.g. Priya Sharma" value={newName} onChange={e => { setNewName(e.target.value); setAddErr(""); setAddMsg(""); }} /></label>
                <label className="fld">Email (login)<input className="txt" type="email" placeholder="priya@koc.com" value={newEmail} onChange={e => { setNewEmail(e.target.value); setAddErr(""); setAddMsg(""); }} /></label>
                <label className="fld">Password<input className="txt" type="password" placeholder="••••••••" value={newPass} onChange={e => { setNewPass(e.target.value); setAddErr(""); setAddMsg(""); }} /></label>
                <label className="fld" style={{ gridColumn: "1/-1" }}>
                  Stages this member can access
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginTop: 6 }}>
                    {allPermissions.map(s => (
                      <label key={s.k} style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12, fontWeight: 500, color: "var(--ink)", background: selectedStages.includes(s.k) ? (s.k === "bulk" ? "var(--peach-bg)" : s.k === "assign" ? "var(--lav-bg)" : "var(--sage-bg)") : "var(--card)", border: `1px solid ${selectedStages.includes(s.k) ? (s.k === "bulk" ? "var(--peach)" : s.k === "assign" ? "var(--lav)" : "var(--sage)") : "var(--line2)"}`, borderRadius: 8, padding: "5px 10px", cursor: "pointer", textTransform: "none", letterSpacing: 0 }}>
                        <input type="checkbox" checked={selectedStages.includes(s.k)} style={{ width: 13, height: 13, accentColor: s.k === "bulk" ? "var(--peach-ink)" : "var(--sage-deep)" }}
                          onChange={e => setSelectedStages(prev => e.target.checked ? [...prev, s.k] : prev.filter(k => k !== s.k))} />
                        {s.n}
                      </label>
                    ))}
                  </div>
                  {selectedStages.length === 0 && <div style={{ fontSize: 11, color: "var(--rose-ink)", marginTop: 4 }}>Select at least one stage</div>}
                </label>
              </div>
              {addErr && <div style={{ color: "var(--rose-ink)", fontSize: 12, marginBottom: 10 }}>{addErr}</div>}
              {addMsg && <div style={{ color: "var(--sage-ink)", fontSize: 12, marginBottom: 10, fontWeight: 600 }}>{addMsg}</div>}
              <button className="primary" onClick={addMember}>Add member</button>
            </div>

            {divMembers.length === 0
              ? <div className="card empty">No team members added yet for {division}.</div>
              : <div className="tbl-wrap">
                <table>
                  <thead>
                    <tr>
                      <th>Name</th>
                      <th>Email</th>
                      <th>Division</th>
                      <th>Stages & Access</th>
                      <th>Joined</th>
                      <th className="num">Assigned SKUs</th>
                      <th></th>
                    </tr>
                  </thead>
                  <tbody>
                    {divMembers.map(m => {
                      const seen = new Set();
                      const count = assignments.filter(a => {
                        if (a.memberId !== m.id) return false;
                        const key = a.sku.trim().toLowerCase();
                        if (seen.has(key)) return false;
                        seen.add(key);
                        return true;
                      }).length;
                      return (
                        <tr key={m.id}>
                          <td><b>{m.name}</b></td>

                          <td className="tag">
                            {m.email}
                          </td>

                          <td>
                            <span className="chip c-done" style={{ fontSize: 10.5 }}>
                              <span className="dot" />{m.division || "—"}
                            </span>
                          </td>

                          <td>
                            {(m.stages || "")
                              .split(",")
                              .filter(Boolean)
                              .map(stage => {
                                const s = STAGES.find(x => x.k === stage);
                                return (
                                  <span
                                    key={stage}
                                    className="chip c-prog"
                                    style={{ marginRight: 4 }}
                                  >
                                    <span className="dot" />
                                    {s?.n || stage}
                                  </span>
                                );
                              })}
                          </td>

                          <td className="tag">
                            {m.joinedAt ? fmt(m.joinedAt) : "—"}
                          </td>

                          <td className="num">{count}</td>

                          <td>
                            <button
                              className="danger"
                              onClick={() => {
                                if (confirm(`Remove ${m.name}? Their assignments will also be cleared.`))
                                  removeMember(m.id);
                              }}
                            >
                              Remove
                            </button>
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            }
          </div>
        )}

        {subTab === "assignments" && (
          <div>
            <div className="card pad" style={{ marginBottom: 16 }}>
              <h3 style={{ margin: "0 0 14px", fontSize: 15, fontWeight: 600 }}>Assign SKU to member</h3>
              {!isMasterOrAdmin && (
                <div style={{ display: "flex", gap: 16, marginBottom: 14, flexWrap: "wrap" }}>
                  <div style={{ background: "var(--sky-bg)", border: "1px solid var(--sky)", borderRadius: 10, padding: "8px 14px", fontSize: 12 }}>
                    <span style={{ color: "var(--muted)" }}>Received from master</span>
                    <b style={{ color: "var(--sky-ink)", marginLeft: 6 }}>
                      {new Set(divAssignments.filter(a => a.memberId === myMemberId).map(a => a.sku.toLowerCase())).size}
                    </b>
                  </div>
                  <div style={{ background: "var(--sage-bg)", border: "1px solid var(--sage)", borderRadius: 10, padding: "8px 14px", fontSize: 12 }}>
                    <span style={{ color: "var(--muted)" }}>Pushed to team</span>
                    <b style={{ color: "var(--sage-ink)", marginLeft: 6 }}>
                      {new Set(divAssignments.filter(a => a.managerId === myMemberId).map(a => a.sku.toLowerCase())).size}
                    </b>
                  </div>
                  <div style={{ background: "var(--peach-bg)", border: "1px solid var(--peach)", borderRadius: 10, padding: "8px 14px", fontSize: 12 }}>
                    <span style={{ color: "var(--muted)" }}>Remaining with me</span>
                    <b style={{ color: "var(--peach-ink)", marginLeft: 6 }}>{managerPool.length}</b>
                  </div>
                </div>
              )}
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                <label className="fld">Team member
                  <select value={selMember} onChange={e => { setSelMember(e.target.value); setSelSkus([]); setSelStages([]); setAssErr(""); }}>
                    <option value="">— select member —</option>
                    {assignableMembers.map(m => <option key={m.id} value={m.id}>{m.name}{m.id === myMemberId ? " (myself)" : ""}</option>)}
                  </select>
                </label>
                <label className="fld">Vendor (filter)
                  <select value={selVendor} onChange={e => { setSelVendor(e.target.value); setSelSkus([]); setAssErr(""); }}>
                    <option value="">— all vendors —</option>
                    {vendors.map(v => <option key={v}>{v}</option>)}
                  </select>
                </label>

              </div>
              {selMember && (() => {
                const member = assignableMembers.find(m => m.id === selMember);
                const memberStageKeys = (member?.stages || "").split(",").map(s => s.trim()).filter(Boolean);
                const pickableStages = STAGES.filter(s => s.k !== "qc" && s.k !== "scan" && memberStageKeys.includes(s.k));
                return pickableStages.length > 0 ? (
                  <label className="fld" style={{ marginTop: 10 }}>
                    Stages to assign for this member
                    <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginTop: 6 }}>
                      {pickableStages.map(s => (
                        <label key={s.k} style={{
                          display: "flex", alignItems: "center", gap: 6, fontSize: 12, fontWeight: 500,
                          background: selStages.includes(s.k) ? "var(--sky-bg)" : "var(--card)",
                          border: `1px solid ${selStages.includes(s.k) ? "var(--sky)" : "var(--line2)"}`,
                          color: selStages.includes(s.k) ? "var(--sky-ink)" : "var(--ink)",
                          borderRadius: 8, padding: "5px 10px", cursor: "pointer"
                        }}>
                          <input type="checkbox" checked={selStages.includes(s.k)}
                            style={{ width: 13, height: 13, accentColor: "var(--sky-ink)" }}
                            onChange={e => setSelStages(prev => e.target.checked ? [...prev, s.k] : prev.filter(k => k !== s.k))} />
                          {s.n}
                        </label>
                      ))}
                    </div>
                    {selStages.length === 0 && <div style={{ fontSize: 11, color: "var(--rose-ink)", marginTop: 4 }}>Select at least one stage to assign</div>}
                  </label>
                ) : null;
              })()}
              <div style={{ display: "flex", gap: 8, marginTop: 12, flexWrap: "wrap", alignItems: "center" }}>
                <button className="ghost" onClick={() => selectTop(10)} disabled={!selMember || availableSkus.filter(sku => !selSkus.includes(sku)).length === 0}>+ 10</button>
                <button className="ghost" onClick={() => deselectTop(10)} disabled={selSkus.length === 0}>− 10</button>
                <span style={{ width: 1, height: 22, background: "var(--line2)" }} />
                <button className="ghost" onClick={selectAllAvailable} disabled={!selMember || availableSkus.length === 0}>Select all ({availableSkus.length})</button>
                <div style={{ marginLeft: "auto", background: "var(--sage-bg)", border: "1px solid var(--sage)", borderRadius: 9, padding: "6px 14px", fontSize: 13, fontWeight: 700, color: "var(--sage-ink)" }}>
                  {selSkus.length} selected
                </div>
              </div>
              <label className="fld" style={{ marginTop: 10 }}>
                SKUs to assign <span style={{ color: "var(--muted)", fontWeight: 400 }}>
                  — {filteredProducts.length} remaining in pool
                  {!isMasterOrAdmin && ` · ${divAssignments.filter(a => a.managerId === myMemberId).length} already assigned`}
                </span>
                <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginTop: 6, maxHeight: 220, overflowY: "auto", padding: 8, border: "1px solid var(--line2)", borderRadius: 9, background: "var(--card)" }}>
                  {filteredProducts.length === 0 ? (
                    <div style={{ fontSize: 12.5, color: "var(--faint)", padding: "8px 4px" }}>
                      {selVendor
                        ? `No products found with vendor "${selVendor}" yet. Add or import products under this vendor first, or clear the vendor filter.`
                        : isMasterOrAdmin
                          ? "No products available in this division yet."
                          : "Your team's pool is empty — every card you can assign has already been given to your team."}
                    </div>
                  ) : filteredProducts.map(p => {
                    // Already assigned to the currently selected member
                    const isAlreadyThisMember = !!selMember &&
                      divAssignments.some(a => a.memberId === selMember && a.sku === p.sku);

                    // For master, "other" assignments are just informational, never blocking.
                    const otherAssignments = divAssignments.filter(
                      a => a.memberId !== selMember &&
                        a.sku === p.sku &&
                        // exclude the manager's own "received from master" row
                        a.memberId !== myMemberId
                    );
                    const otherNames = otherAssignments.map(a => {
                      const m = assignableMembers.find(x => x.id === a.memberId);
                      return m ? m.name : null;
                    }).filter(Boolean);
                    const isAssignedToOther = otherNames.length > 0;

                    const isSelected = selSkus.includes(p.sku);

                    let bgColor = "var(--card)";
                    let borderColor = "var(--line2)";
                    let textColor = "var(--ink)";

                    if (isAlreadyThisMember) {
                      bgColor = "var(--sage-bg)";
                      borderColor = "var(--sage)";
                      textColor = "var(--sage-ink)";
                    } else if (isSelected) {
                      bgColor = "var(--sky-bg)";
                      borderColor = "var(--sky)";
                      textColor = "var(--sky-ink)";
                    } else if (isAssignedToOther) {
                      // Info only — still white/selectable, just shows a note below
                      bgColor = "var(--card)";
                      borderColor = "var(--line2)";
                      textColor = "var(--ink)";
                    }

                    return (
                      <label key={p.id} style={{ display: "flex", flexDirection: "column", gap: 3, fontSize: 12, fontWeight: 500, color: textColor, background: bgColor, border: `1px solid ${borderColor}`, borderRadius: 8, padding: "6px 10px", cursor: isAlreadyThisMember ? "default" : "pointer", minWidth: 160 }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                          <input
                            type="checkbox"
                            disabled={isAlreadyThisMember}
                            checked={isSelected || isAlreadyThisMember}
                            style={{ width: 13, height: 13, accentColor: "var(--sage-deep)" }}
                            onChange={e => {
                              if (isAlreadyThisMember) return;
                              setSelSkus(prev => e.target.checked ? [...prev, p.sku] : prev.filter(s => s !== p.sku));
                            }}
                          />
                          <span style={{ fontWeight: 600 }}>{p.sku}</span>
                          {p.name && <span style={{ color: "var(--muted)", fontWeight: 400 }}>· {p.name}</span>}
                        </div>
                        {isAlreadyThisMember && (
                          <span style={{ fontSize: 10, color: "var(--sage-ink)", fontWeight: 700, paddingLeft: 19 }}>✓ Already assigned</span>
                        )}
                        {isAssignedToOther && !isAlreadyThisMember && (
                          <span style={{ fontSize: 10, color: "var(--peach-ink)", fontWeight: 700, paddingLeft: 19 }}>
                            ⚠ With: {otherNames.join(", ")}
                          </span>
                        )}
                      </label>
                    );
                  })}
                </div>
              </label>

              {/* Already assigned cards — read-only reference for manager */}

              {/* Already assigned cards — read-only reference for manager */}
              {/* Already pushed by this manager — reference panel */}
              {!isMasterOrAdmin && divAssignments.filter(a => a.managerId === myMemberId).length > 0 && (
                <div style={{ marginTop: 10 }}>
                  <div style={{ fontSize: 11, fontWeight: 700, color: "var(--muted)", textTransform: "uppercase", letterSpacing: ".6px", marginBottom: 6 }}>
                    Already assigned by you ({new Set(divAssignments.filter(a => a.managerId === myMemberId).map(a => a.sku.toLowerCase())).size} cards pushed)
                  </div>
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 6, maxHeight: 130, overflowY: "auto", padding: 8, border: "1px solid var(--sage)", borderRadius: 9, background: "var(--sage-bg)" }}>
                    {[...new Map(
                      divAssignments
                        .filter(a => a.managerId === myMemberId)
                        .map(a => [a.sku.toLowerCase(), a])
                    ).values()].map(a => {
                      const prod = divAllProducts.find(p => p.sku.toLowerCase() === a.sku.toLowerCase());
                      const recipient = assignableMembers.find(x => x.id === a.memberId);
                      return (
                        <div key={a.id} style={{ display: "flex", flexDirection: "column", gap: 2, background: "var(--card)", border: "1px solid var(--sage)", borderRadius: 8, padding: "5px 10px", fontSize: 11.5 }}>
                          <span style={{ fontWeight: 700, color: "var(--ink)" }}>{a.sku}{prod?.name ? " · " + prod.name : ""}</span>
                          <span style={{ fontSize: 10, color: "var(--sage-ink)", fontWeight: 600 }}>→ {recipient?.name || "—"}</span>
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}

              {/* Already assigned cards — read-only reference for master */}
              {isMasterOrAdmin && divAllProducts.filter(p => divAssignments.some(a => a.sku.toLowerCase() === p.sku.toLowerCase() && a.managerId === "master")).length > 0 && (
                <div style={{ marginTop: 10 }}>
                  <div style={{ fontSize: 11, fontWeight: 700, color: "var(--muted)", textTransform: "uppercase", letterSpacing: ".6px", marginBottom: 6 }}>
                    Already assigned ({divAllProducts.filter(p => divAssignments.some(a => a.sku.toLowerCase() === p.sku.toLowerCase())).length} cards)
                  </div>
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 6, maxHeight: 130, overflowY: "auto", padding: 8, border: "1px solid var(--peach)", borderRadius: 9, background: "var(--peach-bg)" }}>
                    {divAllProducts.filter(p =>
                      divAssignments.some(a => a.sku.toLowerCase() === p.sku.toLowerCase() && a.managerId === "master")
                    ).map(p => {
                      const seenNames = new Set();
                      const whoList = divAssignments
                        .filter(a => a.sku.toLowerCase() === p.sku.toLowerCase())
                        .map(a => {
                          const m = assignableMembers.find(x => x.id === a.memberId);
                          return m ? m.name : null;
                        })
                        .filter(name => {
                          if (!name || seenNames.has(name)) return false;
                          seenNames.add(name);
                          return true;
                        });
                      return (
                        <div key={p.id} style={{ display: "flex", flexDirection: "column", gap: 2, background: "var(--card)", border: "1px solid var(--peach)", borderRadius: 8, padding: "5px 10px", fontSize: 11.5 }}>
                          <span style={{ fontWeight: 700, color: "var(--ink)" }}>{p.sku}{p.name ? " · " + p.name : ""}</span>
                          <span style={{ fontSize: 10, color: "var(--peach-ink)", fontWeight: 600 }}>→ {whoList.join(", ")}</span>
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}

              <button className="primary" style={{ marginTop: 12 }} onClick={assignSku}>Assign{selSkus.length > 0 ? ` (${selSkus.length})` : ""}</button>
              {assErr && <div style={{ color: "var(--rose-ink)", fontSize: 12, marginTop: 8 }}>{assErr}</div>}
              {assMsg && <div style={{ color: "var(--sage-ink)", fontSize: 12, marginTop: 8, fontWeight: 600 }}>{assMsg}</div>}
            </div>

            {assignableMembers.length === 0
              ? <div className="card empty">Add team members first before assigning SKUs.</div>
              : assignableMembers.map(m => {
                const seenSkus = new Set();
                // For the manager themselves, show only their remaining unassigned pool
                // For others, show their full assigned list
                const isManagerSelf = !isMasterOrAdmin && m.id === myMemberId;
                const pushedByManagerSkus = isManagerSelf ? new Set(
                  divAssignments
                    .filter(a => a.managerId === myMemberId)
                    .map(a => a.sku.trim().toLowerCase())
                ) : null;

                const myAss = divAssignments.filter(a => {
                  if (a.memberId !== m.id) return false;
                  const key = a.sku.trim().toLowerCase();
                  if (seenSkus.has(key)) return false;
                  seenSkus.add(key);
                  // For the manager themselves: exclude SKUs already pushed to team
                  if (isManagerSelf && pushedByManagerSkus.has(key)) return false;
                  return true;
                });
                const isOpen = expandedMember === m.id;
                return (
                  <div key={m.id} className="card" style={{ marginBottom: 10, overflow: "hidden" }}>
                    <div onClick={() => setExpandedMember(isOpen ? null : m.id)} style={{ display: "flex", alignItems: "center", gap: 12, padding: "13px 18px", cursor: "pointer" }}>
                      <span className={"chev " + (isOpen ? "open" : "")}>▶</span>
                      <b>{m.name}</b>
                      <span className="tag">· {m.role}</span>
                      <div className="spacer" />
                      <span className="hint">{myAss.length} SKU{myAss.length !== 1 ? "s" : ""} assigned</span>
                    </div>
                    {isOpen && (
                      myAss.length === 0
                        ? <div style={{ padding: "14px 18px", color: "var(--faint)", fontSize: 13, borderTop: "1px solid var(--line)" }}>No SKUs assigned yet.</div>
                        : <div className="tbl-wrap" style={{ border: 0, borderRadius: 0, boxShadow: "none", borderTop: "1px solid var(--line)" }}>
                          <table>
                            <thead><tr><th>SKU</th><th>Task</th><th>Product name</th><th>Vendor</th><th>Pipeline</th><th>Assigned</th><th></th></tr></thead>
                            <tbody>
                              {myAss.map(a => {
                                const prod = divAllProducts.find(p => p.sku === a.sku);
                                const stageLabel = a.stage === "all"
                                  ? "All stages"
                                  : (a.stage || "").split(",").map(k => STAGES.find(s => s.k === k)?.n || k).filter(Boolean).join(", ") || "—";
                                return (
                                  <tr key={a.id}>
                                    <td><span className="psku">{a.sku}</span></td>
                                    <td><span className="chip c-prog"><span className="dot" />{stageLabel}</span></td>
                                    <td>{prod?.name || "—"}</td>
                                    <td className="tag">{prod?.vendor || "—"}</td>
                                    <td>{prod ? <Pipe p={prod} /> : "—"}</td>
                                    <td className="tag">{fmt(a.assignedAt)}</td>
                                    <td><button className="danger" onClick={() => unassign(a.id, a.sku, m.name)}>Remove</button></td>
                                  </tr>
                                );
                              })}
                            </tbody>
                          </table>
                        </div>
                    )}
                  </div>
                );
              })
            }
          </div>
        )}
      </div>
    );
  }


  function Process({ division, products, teamMembers, assignments, audit }) {
    const [selMonth, setSelMonth] = useState(() => { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`; });
    const [expandedMember, setExpandedMember] = useState(null);
    const [showDebug, setShowDebug] = useState(false);

    const skuToProduct = useMemo(() => {
      const m = {};
      products.forEach(p => { m[p.sku] = p; if (p.name) m[p.name.toLowerCase()] = p; });
      return m;
    }, [products]);

    const resolveDivision = (a, skuMap) => {
      if (a.division === division) return true;
      const prod = skuMap[a.entity] || skuMap[String(a.entity || "").toLowerCase()];
      if (prod) return prod.division === division;
      return !a.division;
    };

    const monthKeyOf = (at) => {
      if (!at) return null;
      const d = new Date(at);
      if (isNaN(d.getTime())) return null;
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`;
    };

    const allActions = useMemo(() => {
      const rows = [];
      audit.forEach(a => {
        if (a.action !== "Stage update" && a.action !== "Final audit") return;
        const mk = monthKeyOf(a.at);
        if (!mk || mk !== selMonth) return;
        if (!resolveDivision(a, skuToProduct)) return;

        const detail = String(a.detail || "");
        let stageName = "", status = "", personFromDetail = "";

        if (a.action === "Stage update") {
          // Format: "<Stage Name> → <Status>[ · <person>]"
          const m = detail.match(/^(.+?)\s*→\s*([^·]+?)(?:\s*·\s*(.+))?$/);
          if (!m) return;
          stageName = m[1].trim();
          status = m[2].trim();
          personFromDetail = (m[3] || "").trim();
        } else {
          stageName = "Final QC / Audit";
          const m = detail.match(/Verdict:\s*(.+)/);
          status = m ? m[1].trim() : "—";
          if (status === "—" || !status) return;
        }

        // Prefer the person actually typed into the stage's "person" field —
        // that's who really did the work. Fall back to the actor (logged-in
        // operator) only when no person was specified, e.g. bulk imports or
        // QC verdicts that don't carry a separate person field.
        const person = personFromDetail || (a.actor || "").trim();
        if (!person || person.toLowerCase() === "unattributed") return;

        const prod = skuToProduct[a.entity] || skuToProduct[String(a.entity || "").toLowerCase()];
        rows.push({
          id: a.id,
          sku: prod ? prod.sku : a.entity,
          productName: prod ? (prod.name || prod.sku) : a.entity,
          stage: stageName,
          status: status || "—",
          person,
          at: a.at,
          actor: a.actor
        });
      });
      return rows.sort((x, y) => new Date(y.at) - new Date(x.at));
    }, [audit, division, selMonth, skuToProduct]);

    const months = useMemo(() => {
      const s = new Set();
      audit.forEach(a => { const mk = monthKeyOf(a.at); if (mk) s.add(mk); });
      if (s.size === 0) { const d = new Date(); s.add(`${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`); }
      return [...s].sort().reverse();
    }, [audit]);

    const getMemberActions = (member) => {
      const name = (member.name || "").trim().toLowerCase();
      const email = (member.email || "").trim().toLowerCase();
      return allActions.filter(r => {
        const p = r.person.trim().toLowerCase();
        return p === name || (email && p === email);
      });
    };

    const getAssignedCount = (member) => {
      const seen = new Set();
      return assignments
        .filter(a => a.memberId === member.id && a.division === division)
        .filter(a => {
          const key = a.sku.trim().toLowerCase();
          if (seen.has(key)) return false;
          seen.add(key);
          return true;
        }).length;
    };

    const downloadReport = (member, rows) => {
      const headers = ["Member Name", "SKU", "Product Name", "Stage", "Status", "When"];
      const data = rows.map(r => [member.name, r.sku || "—", r.productName || "—", r.stage, r.status, fmt(r.at)]);
      const ws = XLSX.utils.aoa_to_sheet([headers, ...data]);
      ws["!cols"] = headers.map(h => ({ wch: Math.max(14, h.length + 4) }));
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "Activity Log");
      const monthLabel = selMonth.replace("-", "_");
      XLSX.writeFile(wb, `${member.name}_${monthLabel}_activity.xlsx`);
    };

    const statusChipColor = (status) => {
      if (status === "Completed") return { bg: "var(--sage-bg)", border: "var(--sage)", ink: "var(--sage-ink)" };
      if (status === "In Progress") return { bg: "var(--sky-bg)", border: "var(--sky)", ink: "var(--sky-ink)" };
      if (status === "Issue") return { bg: "var(--rose-bg)", border: "var(--rose)", ink: "var(--rose-ink)" };
      return { bg: "#F0EEE8", border: "var(--line2)", ink: "var(--muted)" };
    };

    let divMembers = teamMembers.filter(m => m.division === division);
    if (divMembers.length === 0) {
      const knownDivisions = new Set(["KOC Cards", "Bombay Cards"]);
      const orphaned = teamMembers.filter(m => !knownDivisions.has(m.division));
      if (orphaned.length > 0) divMembers = orphaned;
    }

    // ---- DEBUG PANEL ---------------------------------------------------
    // Shows exactly what raw audit data the app received, so you can see
    // immediately whether the problem is (a) audit array is empty — backend
    // key mismatch, (b) action names don't match "Stage update"/"Final audit",
    // or (c) the "at" date field isn't parseable. Remove once it's working.
    const actionCounts = useMemo(() => {
      const c = {};
      audit.forEach(a => { const k = a.action || "(blank)"; c[k] = (c[k] || 0) + 1; });
      return c;
    }, [audit]);
    const sampleRaw = audit.slice(0, 3);
    // ----------------------------------------------------------------------

    return (
      <div>
        <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 12, flexWrap: "wrap" }}>
          <label style={{ fontSize: 12, fontWeight: 600, color: "var(--muted)" }}>Month</label>
          <select value={selMonth} onChange={e => setSelMonth(e.target.value)} style={{ border: "1px solid var(--line2)", borderRadius: 9, padding: "8px 12px", background: "var(--card)", fontSize: 13 }}>
            {months.map(m => <option key={m} value={m}>{m}</option>)}
          </select>
          <span style={{ fontSize: 12, color: "var(--muted)" }}>Every action recorded for {selMonth} · {allActions.length} total actions in {division}</span>
          <button onClick={() => setShowDebug(s => !s)} style={{ marginLeft: "auto", fontSize: 11, fontWeight: 700, color: "var(--rose-ink)", border: "1px solid var(--rose)", background: "var(--rose-bg)", borderRadius: 8, padding: "5px 10px" }}>
            {showDebug ? "Hide" : "Show"} debug info
          </button>
        </div>

        {showDebug && (
          <div className="card pad" style={{ marginBottom: 20, fontSize: 12, lineHeight: 1.7, background: "#FFFBF0", border: "1px solid var(--peach)" }}>
            <b>Raw audit rows received from backend:</b> {audit.length}<br />
            <b>Action types found:</b> {Object.keys(actionCounts).length === 0 ? "(none — audit array is empty)" : Object.entries(actionCounts).map(([k, v]) => `${k} (${v})`).join(", ")}<br />
            <b>Total team members loaded:</b> {teamMembers.length} · <b>for {division}:</b> {divMembers.length}<br />
            <b>Total assignments loaded:</b> {assignments.length}<br /><br />
            <b>First 3 raw audit rows (exact shape from backend):</b>
            <pre style={{ background: "#fff", border: "1px solid var(--line2)", borderRadius: 8, padding: 10, overflowX: "auto", fontSize: 11 }}>{JSON.stringify(sampleRaw, null, 2)}</pre>
            {audit.length === 0 && <div style={{ color: "var(--rose-ink)", fontWeight: 700 }}>→ The audit array is completely empty. This is a backend/loading issue, not a filtering issue — open the browser console (F12 → Console tab) and look for a line starting "[CardFlow] gsGet() raw keys" to see what key your Apps Script actually returns audit data under (likely not literally "audit").</div>}
            {audit.length > 0 && allActions.length === 0 && <div style={{ color: "var(--rose-ink)", fontWeight: 700 }}>→ Audit rows exist but none matched this month/division. Check "Action types found" above includes "Stage update" or "Final audit" exactly (case/spacing matters), and that the sample row's "at" field above looks like a real date.</div>}
          </div>
        )}

        {divMembers.length === 0
          ? <div className="card empty">No team members found for {division}. Add members in Assign Work first.</div>
          : <div className="grid" style={{ gridTemplateColumns: "repeat(auto-fill, minmax(340px, 1fr))" }}>
            {divMembers.map(m => {
              const rows = getMemberActions(m);
              const assignedCount = getAssignedCount(m);
              const isOpen = expandedMember === m.id;
              const statusBreakdown = ["Not Started", "In Progress", "Completed", "Issue"].map(s => ({ name: s, count: rows.filter(r => r.status === s).length })).filter(s => s.count > 0);
              return (
                <div key={m.id} className="card pad" style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                    <div style={{ width: 38, height: 38, borderRadius: 10, background: "linear-gradient(150deg, var(--sage), var(--sage-deep))", display: "grid", placeItems: "center", color: "#fff", fontFamily: "var(--serif)", fontWeight: 600, fontSize: 16, flexShrink: 0 }}>
                      {m.name[0].toUpperCase()}
                    </div>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontWeight: 700, fontSize: 14 }}>{m.name}</div>
                      <div style={{ fontSize: 11, color: "var(--muted)" }}>{assignedCount} SKU{assignedCount !== 1 ? "s" : ""} assigned</div>
                    </div>
                    <div style={{ textAlign: "right" }}>
                      <div style={{ fontFamily: "var(--serif)", fontSize: 26, fontWeight: 600, lineHeight: 1, color: rows.length > 0 ? "var(--sage-ink)" : "var(--faint)" }}>{rows.length}</div>
                      <div style={{ fontSize: 10, color: "var(--muted)", textTransform: "uppercase", letterSpacing: ".5px" }}>actions</div>
                    </div>
                  </div>

                  {statusBreakdown.length > 0 && (
                    <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                      {statusBreakdown.map(s => {
                        const c = statusChipColor(s.name);
                        return (
                          <span key={s.name} style={{ background: c.bg, color: c.ink, border: `1px solid ${c.border}`, borderRadius: 999, padding: "2px 10px", fontSize: 11, fontWeight: 600 }}>
                            {s.name} · {s.count}
                          </span>
                        );
                      })}
                    </div>
                  )}

                  {rows.length > 0 && (
                    <div style={{ maxHeight: isOpen ? 420 : 170, overflowY: "auto", borderTop: "1px solid var(--line)", paddingTop: 8, transition: "max-height .2s" }}>
                      {(isOpen ? rows : rows.slice(0, 6)).map((r, i) => {
                        const c = statusChipColor(r.status);
                        return (
                          <div key={r.id + i} style={{ display: "flex", alignItems: "center", gap: 8, padding: "6px 0", borderBottom: "1px solid var(--line)" }}>
                            <span className="psku" style={{ flexShrink: 0, fontSize: 10.5 }}>{r.sku || "—"}</span>
                            <div style={{ flex: 1, minWidth: 0 }}>
                              <div style={{ fontSize: 11.5, color: "var(--ink)", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{r.stage}</div>
                              <div style={{ fontSize: 10, color: "var(--faint)" }}>{fmt(r.at)}</div>
                            </div>
                            <span style={{ background: c.bg, color: c.ink, border: `1px solid ${c.border}`, borderRadius: 999, padding: "2px 9px", fontSize: 10.5, fontWeight: 600, flexShrink: 0, whiteSpace: "nowrap" }}>{r.status}</span>
                          </div>
                        );
                      })}
                      {!isOpen && rows.length > 6 && (
                        <button onClick={() => setExpandedMember(m.id)} style={{ fontSize: 11, color: "var(--sage-ink)", fontWeight: 600, paddingTop: 6 }}>
                          +{rows.length - 6} more — view all
                        </button>
                      )}
                      {isOpen && rows.length > 6 && (
                        <button onClick={() => setExpandedMember(null)} style={{ fontSize: 11, color: "var(--muted)", fontWeight: 600, paddingTop: 6 }}>
                          Show less
                        </button>
                      )}
                    </div>
                  )}

                  {rows.length === 0 && (
                    <div style={{ fontSize: 12, color: "var(--faint)", textAlign: "center", padding: "10px 0" }}>No recorded actions this month</div>
                  )}

                  <button
                    onClick={() => downloadReport(m, rows)}
                    disabled={rows.length === 0}
                    className="ghost"
                    style={{ width: "100%", justifyContent: "center", fontSize: 12, opacity: rows.length === 0 ? 0.4 : 1 }}>
                    {I.upload({ width: 14, height: 14 })} Download full activity · {selMonth}
                  </button>
                </div>
              );
            })}
          </div>
        }
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
