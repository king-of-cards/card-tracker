<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap');

  :root {
    --bg: #F4F2EC;
    --side: #FBFAF6;
    --card: #FFFFFF;
    --card-2: #FBFAF6;
    --ink: #35332D;
    --muted: #8C887E;
    --faint: #B3AFA4;
    --line: #EAE6DE;
    --line2: #DFDBD1;
    --sage: #9CBE9A;
    --sage-bg: #EDF4EB;
    --sage-ink: #4C6A4A;
    --sage-deep: #7FA67D;
    --sky: #A5C4D8;
    --sky-bg: #E9F1F6;
    --sky-ink: #42607A;
    --lav: #BCAFD4;
    --lav-bg: #EFEBF6;
    --lav-ink: #594D77;
    --peach: #E3C193;
    --peach-bg: #F8F0E2;
    --peach-ink: #8A6427;
    --rose: #D89F9F;
    --rose-bg: #F7EAEA;
    --rose-ink: #8C4C4C;
    --shadow: 0 1px 2px rgba(53, 51, 45, .04), 0 6px 22px rgba(53, 51, 45, .05);
    --shadow-lg: 0 18px 50px rgba(53, 51, 45, .14);
    --r: 16px;
    --r-sm: 11px;
    --side-w: 248px;
    --sans: 'Hanken Grotesk', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    --serif: 'Fraunces', Georgia, 'Times New Roman', serif;
  }

  * {
    box-sizing: border-box
  }

  html,
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased
  }

  .serif {
    font-family: var(--serif)
  }

  input,
  select,
  textarea,
  button {
    font-family: inherit;
    font-size: 13px;
    color: var(--ink)
  }

  button {
    cursor: pointer;
    border: 0;
    background: none
  }

  a {
    color: inherit
  }

  ::-webkit-scrollbar {
    width: 10px;
    height: 10px
  }

  ::-webkit-scrollbar-thumb {
    background: var(--line2);
    border-radius: 10px;
    border: 3px solid transparent;
    background-clip: padding-box
  }

  svg {
    display: block
  }

  /* ---------- shell ---------- */
  .app {
    display: flex;
    min-height: 100vh
  }

  .sidebar {
    width: var(--side-w);
    flex: 0 0 var(--side-w);
    background: var(--side);
    border-right: 1px solid var(--line);
    position: fixed;
    inset: 0 auto 0 0;
    display: flex;
    flex-direction: column;
    padding: 20px 14px;
    z-index: 40
  }

  .main {
    margin-left: var(--side-w);
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 11px;
    padding: 6px 8px 18px
  }

  .logo {
    width: 34px;
    height: 34px;
    border-radius: 10px;
    background: linear-gradient(150deg, var(--sage), var(--sage-deep));
    display: grid;
    place-items: center;
    color: #fff;
    box-shadow: 0 4px 10px rgba(124, 166, 125, .35)
  }

  .brand b {
    font-family: var(--serif);
    font-weight: 600;
    font-size: 19px;
    letter-spacing: .2px;
    line-height: 1
  }

  .brand span {
    display: block;
    font-size: 10.5px;
    color: var(--muted);
    letter-spacing: .6px;
    text-transform: uppercase;
    margin-top: 3px
  }

  .navlabel {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--faint);
    padding: 14px 10px 7px
  }

  .divbtn {
    display: flex;
    align-items: center;
    gap: 11px;
    width: 100%;
    text-align: left;
    padding: 11px 12px;
    border-radius: var(--r-sm);
    color: var(--muted);
    font-weight: 600;
    transition: .16s;
    margin-bottom: 3px
  }

  .divbtn:hover {
    background: var(--card)
  }

  .divbtn.on {
    background: var(--card);
    color: var(--ink);
    box-shadow: var(--shadow)
  }

  .divbtn .dmark {
    width: 26px;
    height: 26px;
    border-radius: 8px;
    display: grid;
    place-items: center;
    font-family: var(--serif);
    font-weight: 600;
    font-size: 13px;
    background: var(--sage-bg);
    color: var(--sage-ink);
    flex: 0 0 26px
  }

  .divbtn.on .dmark {
    background: var(--sage);
    color: #fff
  }

  .divbtn .dcount {
    margin-left: auto;
    font-size: 11px;
    font-weight: 600;
    color: var(--faint)
  }

  .navitem {
    display: flex;
    align-items: center;
    gap: 11px;
    width: 100%;
    text-align: left;
    padding: 9px 12px;
    border-radius: var(--r-sm);
    color: var(--muted);
    font-weight: 500;
    transition: .16s;
    position: relative;
    margin-bottom: 1px
  }

  .navitem:hover {
    background: var(--card);
    color: var(--ink)
  }

  .navitem.on {
    background: var(--sage-bg);
    color: var(--sage-ink);
    font-weight: 600
  }

  .navitem.on::before {
    content: "";
    position: absolute;
    left: -14px;
    top: 8px;
    bottom: 8px;
    width: 3px;
    border-radius: 3px;
    background: var(--sage-deep)
  }

  .navitem svg {
    flex: 0 0 17px;
    opacity: .85
  }

  .navitem .pip {
    margin-left: auto;
    background: var(--rose);
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    border-radius: 999px;
    padding: 1px 7px;
    min-width: 18px;
    text-align: center
  }

  .sidefoot {
    margin-top: auto;
    border-top: 1px solid var(--line);
    padding-top: 14px
  }

  .opwrap {
    display: flex;
    flex-direction: column;
    gap: 5px;
    padding: 0 4px
  }

  .opwrap label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .8px;
    text-transform: uppercase;
    color: var(--faint)
  }

  .opwrap input {
    border: 1px solid var(--line2);
    border-radius: 9px;
    padding: 8px 10px;
    background: var(--card);
    width: 100%
  }

  .syncbtn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    width: 100%;
    margin-top: 9px;
    padding: 8px;
    border: 1px solid var(--line2);
    border-radius: 9px;
    background: var(--card);
    color: var(--muted);
    font-weight: 600
  }

  .syncbtn:hover {
    color: var(--ink);
    border-color: var(--faint)
  }

  .shared {
    font-size: 10.5px;
    color: var(--faint);
    text-align: center;
    margin-top: 9px;
    line-height: 1.4
  }

  /* ---------- page header ---------- */
  .pagehead {
    position: sticky;
    top: 0;
    z-index: 20;
    background: rgba(244, 242, 236, .82);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--line);
    padding: 18px 32px;
    display: flex;
    align-items: center;
    gap: 16px
  }

  .pagehead h1 {
    margin: 0;
    font-family: var(--serif);
    font-weight: 600;
    font-size: 23px;
    letter-spacing: .2px
  }

  .pagehead .sub {
    font-size: 12.5px;
    color: var(--muted);
    margin-top: 2px
  }

  .pagehead .right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 10px
  }

  .crumb {
    font-size: 11px;
    color: var(--faint);
    font-weight: 600;
    letter-spacing: .4px;
    text-transform: uppercase;
    margin-bottom: 1px
  }

  .content {
    padding: 24px 32px 90px;
    max-width: 1180px
  }

  .menubtn {
    display: none
  }

  /* ---------- generic ---------- */
  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--r);
    box-shadow: var(--shadow)
  }

  .pad {
    padding: 20px 22px
  }

  .grid {
    display: grid;
    gap: 16px
  }

  .sec {
    margin-top: 24px
  }

  .sec-h {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 13px
  }

  .sec-h h3 {
    margin: 0;
    font-size: 15px;
    font-weight: 600
  }

  .sec-h .hint {
    font-size: 12px;
    color: var(--muted)
  }

  .spacer {
    flex: 1
  }

  .tag {
    font-size: 11.5px;
    color: var(--muted)
  }

  /* kpi */
  .kpis {
    grid-template-columns: repeat(auto-fit, minmax(165px, 1fr))
  }

  .kpi {
    padding: 17px 18px;
    position: relative;
    overflow: hidden
  }

  .kpi .kico {
    position: absolute;
    top: 15px;
    right: 15px;
    color: var(--faint);
    opacity: .6
  }

  .kpi .lab {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .6px;
    font-weight: 600
  }

  .kpi .val {
    font-family: var(--serif);
    font-size: 32px;
    font-weight: 600;
    margin-top: 8px;
    letter-spacing: -.5px;
    line-height: 1
  }

  .kpi .sub {
    font-size: 11.5px;
    color: var(--faint);
    margin-top: 5px
  }

  /* chips */
  .chip {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    border-radius: 999px;
    padding: 3px 10px;
    font-size: 11px;
    font-weight: 600;
    white-space: nowrap
  }

  .chip .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%
  }

  .c-none {
    background: #F0EEE8;
    color: #8C887E
  }

  .c-none .dot {
    background: #B3AFA4
  }

  .c-prog {
    background: var(--sky-bg);
    color: var(--sky-ink)
  }

  .c-prog .dot {
    background: var(--sky)
  }

  .c-done {
    background: var(--sage-bg);
    color: var(--sage-ink)
  }

  .c-done .dot {
    background: var(--sage)
  }

  .c-issue {
    background: var(--rose-bg);
    color: var(--rose-ink)
  }

  .c-issue .dot {
    background: var(--rose)
  }

  .c-app {
    background: var(--peach-bg);
    color: var(--peach-ink)
  }

  .c-app .dot {
    background: var(--peach)
  }

  /* bars / pipe */
  .bar {
    height: 7px;
    background: #EFEDE6;
    border-radius: 7px;
    overflow: hidden
  }

  .bar i {
    display: block;
    height: 100%;
    background: linear-gradient(90deg, var(--sage), var(--sage-deep));
    border-radius: 7px;
    transition: width .35s
  }

  .stagebar {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 10px 0;
    border-top: 1px solid var(--line)
  }

  .stagebar:first-child {
    border-top: 0
  }

  .stagebar .nm {
    width: 188px;
    font-size: 13px
  }

  .stagebar .meter {
    flex: 1
  }

  .stagebar .pc {
    width: 84px;
    text-align: right;
    font-size: 12px;
    color: var(--muted);
    font-variant-numeric: tabular-nums
  }

  .pipe {
    display: flex;
    gap: 3px;
    width: 170px
  }

  .pipe span {
    height: 6px;
    flex: 1;
    border-radius: 3px;
    background: var(--line2)
  }

  .pipe .s-done {
    background: var(--sage)
  }

  .pipe .s-prog {
    background: var(--sky)
  }

  .pipe .s-issue {
    background: var(--rose)
  }

  /* donut + legend */
  .donutwrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px
  }

  .legend {
    display: flex;
    flex-direction: column;
    gap: 9px;
    width: 100%
  }

  .legend .li {
    display: flex;
    align-items: center;
    gap: 9px;
    font-size: 12.5px
  }

  .legend .sw {
    width: 11px;
    height: 11px;
    border-radius: 4px
  }

  .legend .num {
    margin-left: auto;
    font-weight: 600;
    font-variant-numeric: tabular-nums
  }

  /* tables */
  table {
    border-collapse: collapse;
    width: 100%
  }

  th,
  td {
    text-align: left;
    padding: 11px 13px;
    border-bottom: 1px solid var(--line);
    font-size: 13px;
    vertical-align: middle
  }

  th {
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: .6px;
    color: var(--muted);
    font-weight: 700
  }

  td.num,
  th.num {
    text-align: right;
    font-variant-numeric: tabular-nums
  }

  tr:last-child td {
    border-bottom: 0
  }

  .tbl-wrap {
    overflow: auto;
    border: 1px solid var(--line);
    border-radius: var(--r);
    background: var(--card);
    box-shadow: var(--shadow)
  }

  thead th {
    position: sticky;
    top: 0;
    background: var(--card-2);
    z-index: 1
  }

  /* product rows */
  .plist {
    display: flex;
    flex-direction: column;
    gap: 11px
  }

  .prow {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--r);
    box-shadow: var(--shadow);
    overflow: hidden;
    transition: .16s
  }

  .prow:hover {
    border-color: var(--line2)
  }

  .phead {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 15px 18px;
    cursor: pointer
  }

  .phead:hover {
    background: var(--card-2)
  }

  .psku {
    font-family: ui-monospace, Menlo, monospace;
    font-size: 11.5px;
    color: var(--muted);
    background: var(--card-2);
    border: 1px solid var(--line);
    border-radius: 7px;
    padding: 3px 9px;
    white-space: nowrap
  }

  .pname {
    font-weight: 600
  }

  .pvend {
    font-size: 12px;
    color: var(--muted)
  }

  .pbody {
    border-top: 1px solid var(--line);
    background: var(--card-2)
  }

  .chev {
    color: var(--faint);
    transition: .2s;
    font-size: 11px
  }

  .chev.open {
    transform: rotate(90deg)
  }

  .pct {
    font-variant-numeric: tabular-nums;
    font-weight: 600;
    font-size: 12.5px;
    width: 40px;
    text-align: right
  }

  /* stage editor */
  .stage {
    display: grid;
    grid-template-columns: 182px 156px 1fr 90px;
    gap: 12px;
    align-items: start;
    padding: 13px 16px;
    border-bottom: 1px solid var(--line)
  }

  .stage:last-child {
    border-bottom: 0
  }

  .stage .lab {
    font-weight: 600;
    padding-top: 8px;
    display: flex;
    align-items: center;
    gap: 8px
  }

  .stage .meta {
    grid-column: 1/-1;
    font-size: 11px;
    color: var(--faint);
    margin-top: -5px
  }

  .stnum {
    width: 20px;
    height: 20px;
    border-radius: 6px;
    background: var(--card);
    border: 1px solid var(--line2);
    display: grid;
    place-items: center;
    font-size: 10px;
    color: var(--muted);
    font-weight: 700;
    flex: 0 0 20px
  }

  label.fld {
    display: flex;
    flex-direction: column;
    gap: 5px;
    font-size: 11px;
    color: var(--muted);
    font-weight: 500
  }

  select,
  input.txt,
  textarea {
    border: 1px solid var(--line2);
    border-radius: 9px;
    padding: 9px 11px;
    background: var(--card);
    width: 100%;
    transition: .14s
  }

  select:focus,
  input.txt:focus,
  textarea:focus {
    outline: none;
    border-color: var(--sage);
    box-shadow: 0 0 0 3px var(--sage-bg)
  }

  textarea {
    resize: vertical;
    min-height: 36px
  }

  .mini {
    padding: 8px 12px;
    border: 1px solid var(--line2);
    border-radius: 9px;
    background: var(--card);
    font-weight: 600;
    color: var(--sage-ink)
  }

  .mini:hover:not(:disabled) {
    background: var(--sage-bg);
    border-color: var(--sage)
  }

  .mini:disabled {
    opacity: .45;
    cursor: default
  }

  .mini.saved {
    background: var(--sage-bg);
    border-color: var(--sage);
    color: var(--sage-ink)
  }

  /* buttons */
  .ghost {
    border: 1px solid var(--line2);
    background: var(--card);
    border-radius: 10px;
    padding: 9px 14px;
    color: var(--ink);
    font-weight: 600;
    display: inline-flex;
    align-items: center;
    gap: 7px
  }

  .ghost:hover {
    border-color: var(--faint)
  }

  .primary {
    background: var(--ink);
    color: #fff;
    border-radius: 10px;
    padding: 10px 18px;
    font-weight: 600;
    display: inline-flex;
    align-items: center;
    gap: 7px
  }

  .primary:hover {
    background: #26241f
  }

  .primary:disabled {
    opacity: .5
  }

  .danger {
    color: var(--rose-ink);
    background: transparent;
    font-weight: 600;
    font-size: 12px
  }

  .danger:hover {
    text-decoration: underline
  }

  /* toolbar / filters */
  .toolbar {
    display: flex;
    gap: 10px;
    align-items: center;
    margin-bottom: 16px;
    flex-wrap: wrap
  }

  .search {
    position: relative;
    flex: 1;
    min-width: 200px
  }

  .search input {
    border: 1px solid var(--line2);
    border-radius: 10px;
    padding: 10px 12px 10px 36px;
    background: var(--card);
    width: 100%
  }

  .search svg {
    position: absolute;
    left: 11px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--faint)
  }

  .filt {
    border: 1px solid var(--line2);
    border-radius: 10px;
    padding: 9px 11px;
    background: var(--card);
    font-weight: 500;
    color: var(--ink)
  }

  /* alerts */
  .alert {
    display: flex;
    align-items: center;
    gap: 13px;
    padding: 13px 15px;
    border: 1px solid var(--rose);
    background: var(--rose-bg);
    border-radius: 13px;
    margin-bottom: 9px
  }

  .alert .ic {
    width: 28px;
    height: 28px;
    border-radius: 9px;
    background: var(--rose);
    color: #fff;
    display: grid;
    place-items: center;
    font-weight: 700;
    flex: 0 0 28px
  }

  .alert .tx {
    flex: 1;
    font-size: 13px;
    color: var(--rose-ink)
  }

  .alert b {
    color: var(--ink)
  }

  /* activity feed */
  .feed {
    display: flex;
    flex-direction: column
  }

  .feed .fi {
    display: flex;
    gap: 11px;
    padding: 11px 0;
    border-top: 1px solid var(--line)
  }

  .feed .fi:first-child {
    border-top: 0
  }

  .feed .fdot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--lav);
    margin-top: 6px;
    flex: 0 0 8px
  }

  .feed .fmain {
    font-size: 12.5px;
    line-height: 1.45
  }

  .feed .fmeta {
    font-size: 11px;
    color: var(--faint);
    margin-top: 2px
  }

  .feed b {
    font-weight: 600
  }

  .empty {
    text-align: center;
    color: var(--faint);
    padding: 54px 20px;
    font-size: 13px
  }

  .note {
    font-size: 12.5px;
    color: var(--sky-ink);
    background: var(--sky-bg);
    border: 1px solid #D6E5EE;
    border-radius: 12px;
    padding: 12px 15px;
    line-height: 1.55
  }

  /* modal */
  .scrim {
    position: fixed;
    inset: 0;
    background: rgba(53, 51, 45, .32);
    backdrop-filter: blur(3px);
    z-index: 60;
    display: grid;
    place-items: center;
    padding: 20px
  }

  .modal {
    background: var(--card);
    border-radius: 20px;
    box-shadow: var(--shadow-lg);
    width: min(580px, 100%);
    max-height: 92vh;
    overflow: auto
  }

  .modal h3 {
    margin: 0;
    padding: 22px 24px;
    border-bottom: 1px solid var(--line);
    font-family: var(--serif);
    font-weight: 600;
    font-size: 18px
  }

  .mbody {
    padding: 22px 24px;

<div id="root"></div>
<script type="text/babel">
  const { useState, useEffect, useMemo, useRef, useCallback } = React;

  /* ---------- constants ---------- */
  const DIVISIONS = ["KOC Cards", "Bombay Cards"];
  const STORES = ["Chamrajpet", "HSR Layout", "Sahakar Nagar", "Hoodi", "Jayanagar", "Bommasandra", "Hyderabad", "Mysore", "Vizag", "Hubli", "Chitradurga"];
  const STAGES = [
    { k: "barcoding", n: "Bar Coding" },
    { k: "content", n: "Content" },
    { k: "photography", n: "Photography" },
    { k: "videography", n: "Videography" },

  const STATUSES = ["Not Started", "In Progress", "Completed", "Issue"];
  const STAGE_COLS = STAGES.filter(s => s.k !== "qc");
  const DEFAULT_VENDORS = {
    "KOC Cards": ["KOC", "Patrika", "Mayur", "Rasiklal", "Venis", "Ferry Card", "Mack Mark", "Shubham", "Mani Creation", "Jimit", "Reel Card", "Swamy Cards", "Remco", "Sanskurti", "Aakarshak"],
    "Bombay Cards": []
  };

  /* ---------- storage (shared across team) ---------- */
  const GS_URL = "https://script.google.com/macros/s/AKfycbwhvIeomL6wiBH_3LgbskV__BNy0j_w1BlOBVz53oLZa2LRTD1aH79zeXPbsNCqYAE/exec";

  async function gsGet() {
    try {
      const r = await fetch(GS_URL + "?action=getAll", { redirect: "follow" });
      const text = await r.text();
      return JSON.parse(text);
    } catch (e) { console.error("gsGet", e); return null; }
  }
  async function gsPost(action, payload) {
    try {
      const r = await fetch(GS_URL, {
        method: "POST",
        redirect: "follow",
        body: JSON.stringify({ action, payload })
      });
      const text = await r.text();
      return JSON.parse(text);
    } catch (e) { console.error("gsPost", action, e); return null; }
  }

  /* ---------- utils ---------- */
  const now = () => new Date().toISOString();
  const uid = () => Math.random().toString(36).slice(2, 9);
  function fmt(iso) {
    if (!iso) return "—"; const d = new Date(iso);
    return d.toLocaleString("en-IN", { day: "2-digit", month: "short", hour: "2-digit", minute: "2-digit" });
  }
  function statusClass(s) { return s === "Completed" ? "c-done" : s === "In Progress" ? "c-prog" : s === "Issue" ? "c-issue" : "c-none"; }
  function pipeClass(s) { return s === "Completed" ? "s-done" : s === "In Progress" ? "s-prog" : s === "Issue" ? "s-issue" : "s-none"; }
  function normStatus(v) { const m = { "not started": "Not Started", "notstarted": "Not Started", "in progress": "In Progress", "inprogress": "In Progress", "progress": "In Progress", "wip": "In Progress", "pending": "In Progress", "completed": "Completed", "complete": "Completed", "done": "Completed", "approved": "Completed", "issue": "Issue", "issues": "Issue", "error": "Issue" }; return m[String(v).trim().toLowerCase()] || null; }
  function normBool(v) { return /^(y|yes|true|1|received|recd|done|✓|x)$/i.test(String(v).trim()); }
  function normDate(v) { if (v instanceof Date && !isNaN(v)) return v.toISOString().slice(0, 10); if (typeof v === "number") { const d = new Date(Date.UTC(1899, 11, 30) + v * 86400000); return d.toISOString().slice(0, 10); } return String(v).trim(); }
  function fieldFromProduct(p, h) { if (["division", "sku", "name", "vendor", "inward", "qty", "note"].includes(h)) return p[h] ?? ""; if (h === "qc_verdict") return p.verdict || ""; if (h === "qc_issues") return p.issues || ""; const mm = h.match(/^(.+)_(status|person|comments)$/); if (mm && p.stages[mm[1]]) return p.stages[mm[1]][mm[2]] || ""; return ""; }
  const PROD_HEADERS = (() => { const h = ["division", "sku", "name", "vendor", "inward", "qty", "note"]; STAGE_COLS.forEach(s => h.push(s.k + "_status", s.k + "_person", s.k + "_comments")); h.push("qc_verdict", "qc_issues"); return h; })();
  const STORE_HEADERS = ["division", "sku", "store", "dispatched", "received", "missing", "damaged", "notes"];
  function ensureStages(p) {
    if (!p.stages) p.stages = {};
    STAGES.forEach(s => {
      if (!p.stages[s.k]) p.stages[s.k] = { status: "Not Started", person: "", comments: "", at: "" };
    });
    if (!p.stores) p.stores = {};
    STORES.forEach(st => {
      if (!p.stores[st]) p.stores[st] = { dispatched: 0, received: false, receivedAt: "", receivedBy: "", missing: 0, damaged: 0, notes: "", at: "" };
    });
    return p;
  }
  function blankProduct(division, vendor) {
    const stages = {}; STAGES.forEach(s => stages[s.k] = { status: "Not Started", person: "", comments: "", at: "" });
    const stores = {}; STORES.forEach(st => stores[st] = { dispatched: 0, received: false, receivedAt: "", receivedBy: "", missing: 0, damaged: 0, notes: "", at: "" });
    return { id: uid(), division, sku: "", name: "", vendor: vendor || "", inward: "", qty: 0, note: "", stages, stores, verdict: "", issues: "", createdAt: now(), updatedAt: now() };
  }
  function productPct(p) { return Math.round(STAGES.filter(s => p.stages[s.k].status === "Completed").length / STAGES.length * 100); }
  function productState(p) { const pc = productPct(p); if (STAGES.some(s => p.stages[s.k].status === "Issue")) return "issue"; if (pc === 100) return "done"; if (pc === 0) return "none"; return "prog"; }

  /* ---------- icons ---------- */
  const I = {
    grid: p => (<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7" {...p}><rect x="3" y="3" width="7" height="7" rx="1.5" /><rect x="14" y="3" width="7" height="7" rx="1.5" /><rect x="3" y="14" width="7" height="7" rx="1.5" /><rect x="14" y="14" width="7" height="7" rx="1.5" /></svg>),
    layers: p => (<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinejoin="round" {...p}><path d="M12 3 3 8l9 5 9-5-9-5Z" /><path d="m3 13 9 5 9-5" /></svg>),
    truck: p => (<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinejoin="round" {...p}><path d="M3 6h11v9H3z" /><path d="M14 9h4l3 3v3h-7z" /><circle cx="7" cy="18" r="1.6" /><circle cx="17.5" cy="18" r="1.6" /></svg>),
    upload: p => (<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M4 16v3h16v-3" /><path d="M12 4v11" /><path d="m7 9 5-5 5 5" /></svg>),
    audit: p => (<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round" {...p}><rect x="4" y="3" width="16" height="18" rx="2" /><path d="m8 11 2 2 4-4" /><path d="M8 17h6" /></svg>),
    sync: p => (<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M21 12a9 9 0 1 1-3-6.7" /><path d="M21 3v5h-5" /></svg>),
    search: p => (<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" {...p}><circle cx="11" cy="11" r="7" /><path d="m20 20-3-3" /></svg>),
    plus: p => (<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" {...p}><path d="M12 5v14M5 12h14" /></svg>),
    menu: p => (<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.9" strokeLinecap="round" {...p}><path d="M4 6h16M4 12h16M4 18h16" /></svg>),
    box: p => (<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinejoin="round" {...p}><path d="M12 3 4 7v10l8 4 8-4V7l-8-4Z" /><path d="M4 7l8 4 8-4M12 11v10" /></svg>),
    check: p => (<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M20 6 9 17l-5-5" /></svg>),
    gear: p => (<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" {...p}><circle cx="12" cy="12" r="3" /><path d="M12 2v3M12 19v3M4.2 4.2l2.1 2.1M17.7 17.7l2.1 2.1M2 12h3M19 12h3M4.2 19.8l2.1-2.1M17.7 6.3l2.1-2.1" /></svg>),
    store: p => (<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinejoin="round" {...p}><path d="M4 9h16v11H4z" /><path d="M3 9l2-5h14l2 5" /><path d="M9 20v-5h6v5" /></svg>),
    alert: p => (<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M12 4 2 20h20L12 4Z" /><path d="M12 10v4M12 17h.01" /></svg>),
  };

  function Chip({ status }) { return <span className={"chip " + statusClass(status)}><span className="dot" />{status}</span>; }
  function Bar({ pct }) { return <div className="bar"><i style={{ width: pct + "%" }} /></div>; }
  function Pipe({ p }) { return <div className="pipe">{STAGES.map(s => <span key={s.k} className={pipeClass(p.stages[s.k].status)} title={s.n + ": " + p.stages[s.k].status} />)}</div>; }
  function Donut({ segments, size = 148, thick = 20, centerTop, centerBot }) {
    const r = (size - thick) / 2, c = size / 2, circ = 2 * Math.PI * r, total = segments.reduce((a, s) => a + s.value, 0);
    let off = 0;
    return (<svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      <circle cx={c} cy={c} r={r} fill="none" stroke="var(--line)" strokeWidth={thick} />
      {total > 0 && segments.map((s, i) => { const len = s.value / total * circ; const el = (<circle key={i} cx={c} cy={c} r={r} fill="none" stroke={s.color} strokeWidth={thick} strokeDasharray={`${len} ${circ - len}`} strokeDashoffset={-off} transform={`rotate(-90 ${c} ${c})`} />); off += len; return el; })}
      <text x={c} y={c - 1} textAnchor="middle" style={{ fontFamily: "var(--serif)", fontSize: 30, fontWeight: 600, fill: "var(--ink)" }}>{centerTop}</text>
      <text x={c} y={c + 17} textAnchor="middle" style={{ fontSize: 9.5, fill: "var(--muted)", letterSpacing: 1, textTransform: "uppercase" }}>{centerBot}</text>
    </svg>);
  }

  /* ============================================================= */
  function App() {
    const [loading, setLoading] = useState(true);
    const [division, setDivision] = useState("KOC Cards");
    const [tab, setTab] = useState("overview");
    const [operator, setOperator] = useState("");
    const [products, setProducts] = useState([]);
    const [audit, setAudit] = useState([]);
    const [vendors, setVendors] = useState(DEFAULT_VENDORS);
    const [navOpen, setNavOpen] = useState(false);

    const load = useCallback(async () => {
      const data = await gsGet();
      if (data) {
        setProducts((data.products || []).map(ensureStages));
        setAudit(data.audit || []);
        setVendors(data.vendors || DEFAULT_VENDORS);
      }
      const op = localStorage.getItem("ct:operator");
      if (op) setOperator(op);
      setLoading(false);
    }, []);
    useEffect(() => { load(); }, [load]);

    const logAudit = useCallback(async (action, entity, detail) => {
      const e = { id: uid(), at: now(), actor: operator || "Unattributed", action, entity, detail, division };
      setAudit(prev => { const next = [e, ...prev].slice(0, 800); return next; });
      await gsPost("appendAudit", e);
    }, [operator, division]);
    const saveProducts = useCallback(async (next) => {
      setProducts(next);
      await gsPost("batchUpsertProducts", next);
    }, []);

    const upsertProduct = useCallback(async (prod, isNew) => {
      prod.updatedAt = now();
      const next = isNew ? [prod, ...products] : products.map(x => x.id === prod.id ? prod : x); await saveProducts(next);
      logAudit(isNew ? "Added product" : "Edited product", prod.sku || prod.name || "product", `${prod.name || "(unnamed)"} · ${prod.vendor || "no vendor"} · qty ${prod.qty}`);
    }, [products, saveProducts, logAudit]);
    const patchStage = useCallback(async (pid, stageKey, patch) => {
      const next = products.map(p => p.id !== pid ? p : { ...p, stages: { ...p.stages, [stageKey]: { ...p.stages[stageKey], ...patch, at: now() } }, updatedAt: now() });
      await saveProducts(next); const p = next.find(x => x.id === pid), sn = STAGES.find(s => s.k === stageKey).n;
      logAudit("Stage update", `${p.name || p.sku || "product"}`, `${sn} → ${patch.status || p.stages[stageKey].status}${patch.person ? (" · " + patch.person) : ""}`);
    }, [products, saveProducts, logAudit]);
    const patchQC = useCallback(async (pid, patch) => {
      const next = products.map(p => p.id === pid ? { ...p, ...patch, updatedAt: now() } : p); await saveProducts(next);
      const p = next.find(x => x.id === pid); logAudit("Final audit", `${p.name || p.sku || "product"}`, `Verdict: ${patch.verdict || p.verdict || "—"}`);
    }, [products, saveProducts, logAudit]);
    const patchStore = useCallback(async (pid, store, patch) => {
      const next = products.map(p => p.id !== pid ? p : { ...p, stores: { ...p.stores, [store]: { ...p.stores[store], ...patch, at: now() } }, updatedAt: now() });
      await saveProducts(next);
      const updated = next.find(x => x.id === pid);
      await gsPost("upsertStore", {
        productId: pid,
        store,
        division: updated.division,
        sku: updated.sku,
        storeData: updated.stores[store]
      });
      const p = updated, s = p.stores[store];
      let d = `${store}: disp ${s.dispatched}, recv ${s.received ? "yes" : "no"}`; if (s.missing > 0 || s.damaged > 0) d += ` · ⚠ missing ${s.missing}, damaged ${s.damaged}`;
      logAudit((s.missing > 0 || s.damaged > 0) ? "Issue reported" : "Store update", `${p.name || p.sku || "product"}`, d);
    }, [products, saveProducts, logAudit]);
    const removeProduct = useCallback(async (pid) => {
      const p = products.find(x => x.id === pid);
      const filtered = products.filter(x => x.id !== pid);
      setProducts(filtered);
      await gsPost("deleteProduct", { id: pid });
      logAudit("Deleted product", `${p?.name || p?.sku || "product"}`, p?.vendor || "");
    }, [products, logAudit]);
    const addVendor = useCallback(async (div, name) => {
      if (!name) return; const list = vendors[div] || []; if (list.includes(name)) return; const next = { ...vendors, [div]: [...list, name].sort() }; setVendors(next); await gsPost("setVendors", next);
    }, [vendors]);

    const saveOperator = (v) => { setOperator(v); localStorage.setItem("ct:operator", v); };

    const bulkProducts = useCallback(async (rows) => {
      let created = 0, updated = 0; const errs = []; const newV = new Set(); let next = [...products];
      rows.forEach((row, i) => {
        const sku = String(row.sku || "").trim(); if (!sku || sku.toUpperCase().includes("EXAMPLE")) return;
        const div = DIVISIONS.includes(String(row.division || "").trim()) ? String(row.division).trim() : division;
        let existing = next.find(p => p.division === div && p.sku.toLowerCase() === sku.toLowerCase()); let prod, isNew = false;
        if (existing) { prod = { ...existing, stages: { ...existing.stages } }; } else { prod = blankProduct(div, ""); prod.sku = sku; isNew = true; }
        const g = k => row[k] !== "" && row[k] != null;
        if (g("name")) prod.name = String(row.name).trim();
        if (g("vendor")) { prod.vendor = String(row.vendor).trim(); if (!(vendors[div] || []).includes(prod.vendor)) newV.add(div + "|" + prod.vendor); }
        if (g("inward")) prod.inward = normDate(row.inward);
        if (g("qty") && !isNaN(+row.qty)) prod.qty = +row.qty;
        if (g("note")) prod.note = String(row.note).trim();
        STAGE_COLS.forEach(s => {
          const k = s.k; let t = false; const cur = { ...prod.stages[k] }; const st = row[k + "_status"], pe = row[k + "_person"], co = row[k + "_comments"];
          if (st !== "" && st != null) { const ns = normStatus(st); if (ns) { cur.status = ns; t = true; } else errs.push(`Row ${i + 2}: invalid status "${st}" in ${k}_status`); }
          if (pe !== "" && pe != null) { cur.person = String(pe).trim(); t = true; } if (co !== "" && co != null) { cur.comments = String(co).trim(); t = true; }
          if (t) { cur.at = now(); prod.stages[k] = cur; }
        });
        if (g("qc_verdict")) { const v = String(row.qc_verdict).trim(); if (/appro/i.test(v)) prod.verdict = "Approved"; else if (/issue/i.test(v)) prod.verdict = "Issues Found"; }
        if (g("qc_issues")) prod.issues = String(row.qc_issues).trim(); prod.updatedAt = now();
        if (isNew) { next = [prod, ...next]; created++; } else { next = next.map(p => p.id === prod.id ? prod : p); updated++; }
      });
      await saveProducts(next); newV.forEach(s => { const [d, n] = s.split("|"); addVendor(d, n); });
      logAudit("Bulk import", `${created + updated} products`, `${created} created, ${updated} updated${errs.length ? `, ${errs.length} field errors` : ""}`);
      return { created, updated, errs };
    }, [products, division, vendors, saveProducts, addVendor, logAudit]);

    const bulkStores = useCallback(async (rows) => {
      let updated = 0; const errs = []; let next = [...products];
      rows.forEach((row, i) => {
        const sku = String(row.sku || "").trim(); if (!sku || sku.toUpperCase().includes("EXAMPLE")) return;
        const div = DIVISIONS.includes(String(row.division || "").trim()) ? String(row.division).trim() : division;
        const store = String(row.store || "").trim(); if (!STORES.includes(store)) { errs.push(`Row ${i + 2}: unknown store "${store}"`); return; }
        const existing = next.find(p => p.division === div && p.sku.toLowerCase() === sku.toLowerCase());
        if (!existing) { errs.push(`Row ${i + 2}: product "${sku}" not found in ${div}`); return; }
        const np = { ...existing, stores: { ...existing.stores } }; const s = { ...np.stores[store] }; const g = k => row[k] !== "" && row[k] != null;
        if (g("dispatched") && !isNaN(+row.dispatched)) s.dispatched = +row.dispatched;
        if (g("missing") && !isNaN(+row.missing)) s.missing = +row.missing;
        if (g("damaged") && !isNaN(+row.damaged)) s.damaged = +row.damaged;
        if (g("notes")) s.notes = String(row.notes).trim();
        if (g("received")) { const rv = normBool(row.received); if (rv && !s.received) { s.received = true; s.receivedAt = now(); s.receivedBy = operator || "bulk"; } else if (!rv) { s.received = false; } else { s.received = true; } }
        s.at = now(); np.stores[store] = s; np.updatedAt = now(); next = next.map(p => p.id === np.id ? np : p); updated++;
      });
      await saveProducts(next); logAudit("Bulk store import", `${updated} store rows`, errs.length ? `${errs.length} errors` : "ok");
      return { updated, errs };
    }, [products, division, operator, saveProducts, logAudit]);

    const divProducts = useMemo(() => products.filter(p => p.division === division), [products, division]);
    const counts = useMemo(() => { const o = {}; DIVISIONS.forEach(d => o[d] = products.filter(p => p.division === d).length); return o; }, [products]);
    const openIssues = useMemo(() => { const l = []; divProducts.forEach(p => STORES.forEach(st => { const s = p.stores[st]; if (s && (s.missing > 0 || s.damaged > 0)) l.push({ p, store: st, s }); })); return l; }, [divProducts]);

    const META = { overview: ["Overview", "Production, listing & dispatch at a glance"], products: ["Products & Pipeline", "Every design and its full production lifecycle"], dispatch: ["Dispatch & Stores", "Scan, dispatch & store receipts across 11 stores"], bulk: ["Bulk Upload", "Import & update thousands of records via Excel"], audit: ["Audit Log", "A complete timestamped trail of every action"] };

    if (loading) return <div className="empty serif" style={{ paddingTop: 140, fontSize: 19 }}>Loading workspace…</div>;

    const NAV = [["overview", "Overview", I.grid], ["products", "Products & Pipeline", I.layers], ["dispatch", "Dispatch & Stores", I.truck], ["bulk", "Bulk Upload", I.upload], ["audit", "Audit Log", I.audit]];

    return (
      <div className="app">
        {navOpen && <div className="scrim2" onClick={() => setNavOpen(false)} />}

  /* ---------------- OVERVIEW ---------------- */

                <button className="ghost" onClick={() => go("dispatch")}>Resolve</button>

          </div>
        )}

        <div className="sec ov-grid">
          <div className="card pad">
            <div className="sec-h" style={{ marginBottom: 6 }}><h3>Pipeline progress</h3><span className="hint">manufacturing → listing → dispatch</span></div>
            <div style={{ overflowX: "auto" }}>
              <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>

          </div>
        </div>

  /* ---------------- PRODUCTS ---------------- */
  function Products({ division, products, vendors, onUpsert, onStage, onQC, onRemove, addVendor }) {
    const [q, setQ] = useState(""); const [open, setOpen] = useState({}); const [modal, setModal] = useState(false);

    const filtered = products.filter(p => {

        {modal && <AddModal division={division} vendors={vendors} addVendor={addVendor} onClose={() => setModal(false)} onSave={p => { onUpsert(p, true); setModal(false); }} />}
      </div>

  }
  function ProductRow({ p, open, toggle, onStage, onQC, onRemove }) {
    const pct = productPct(p); const hasIssue = STAGES.some(s => p.stages[s.k].status === "Issue");
    return (
      <div className="prow">
        <div className="phead" onClick={toggle}>
          <span className={"chev " + (open ? "open" : "")}>▶</span>
          <span className="psku">{p.sku || "no-sku"}</span>

        </div>
        {open && (
          <div className="pbody">
            {STAGES.map((s, i) => s.k === "qc" ? <QCStage key={s.k} p={p} idx={i + 1} onQC={onQC} /> : <StageEditor key={s.k} p={p} stage={s} idx={i + 1} onStage={onStage} />)}

              <span className="tag">Inward {p.inward || "—"} · created {fmt(p.createdAt)} · updated {fmt(p.updatedAt)}</span>

  }
  function StageEditor({ p, stage, idx, onStage }) {
    const cur = p.stages[stage.k];
    const [status, setStatus] = useState(cur.status), [person, setPerson] = useState(cur.person), [comments, setComments] = useState(cur.comments), [saved, setSaved] = useState(false);
    useEffect(() => { setStatus(cur.status); setPerson(cur.person); setComments(cur.comments); }, [cur.status, cur.person, cur.comments]);
    const dirty = status !== cur.status || person !== cur.person || comments !== cur.comments;
    const save = () => { onStage(p.id, stage.k, { status, person, comments }); setSaved(true); setTimeout(() => setSaved(false), 1400); };
    return (
      <div className="stage">
        <div className="lab"><span className="stnum">{idx}</span>{stage.n}</div>
        <label className="fld">Status<select value={status} onChange={e => setStatus(e.target.value)}>{STATUSES.map(s => <option key={s}>{s}</option>)}</select></label>
        <label className="fld">Responsible · comments
          <input className="txt" placeholder="person" value={person} onChange={e => setPerson(e.target.value)} style={{ marginBottom: 6 }} />

  }
  function QCStage({ p, idx, onQC }) {

  /* ---------------- DISPATCH ---------------- */

        <div className="toolbar" style={{ marginTop: 14 }}><div className="search">{I.search({})}<input placeholder="Search product to dispatch / receive…" value={q} onChange={e => setQ(e.target.value)} /></div></div>

  function DispatchRow({ p, open, toggle, onStore, onStage, operator }) {
    const scan = p.stages.scan;
    const recvCount = STORES.filter(st => p.stores[st].received).length;
    const issueCount = STORES.filter(st => p.stores[st].missing > 0 || p.stores[st].damaged > 0).length;

        <div className="phead" onClick={toggle}>

          <div className="spacer" />

  function StoreCell({ p, store, onStore, operator }) {
    const s = p.stores[store];
    const [d, setD] = useState(s.dispatched), [r, setR] = useState(s.received), [m, setM] = useState(s.missing), [dm, setDm] = useState(s.damaged), [notes, setNotes] = useState(s.notes), [saved, setSaved] = useState(false);
    useEffect(() => { setD(s.dispatched); setR(s.received); setM(s.missing); setDm(s.damaged); setNotes(s.notes); }, [s.dispatched, s.received, s.missing, s.damaged, s.notes]);
    const dirty = d !== s.dispatched || r !== s.received || m !== s.missing || dm !== s.damaged || notes !== s.notes;
    const save = () => { onStore(p.id, store, { dispatched: +d, received: r, missing: +m, damaged: +dm, notes, receivedAt: r && !s.received ? now() : s.receivedAt, receivedBy: r && !s.received ? (operator || "") : s.receivedBy }); setSaved(true); setTimeout(() => setSaved(false), 1300); };
    const flagged = (+m > 0 || +dm > 0);
    return (
      <tr style={flagged ? { background: "var(--rose-bg)" } : null}>
        <td><b>{store}</b>{s.received && <div className="tag">recv {fmt(s.receivedAt)}{s.receivedBy ? (" · " + s.receivedBy) : ""}</div>}</td>
        <td className="num" style={{ width: 84 }}><input className="txt" type="number" value={d} onChange={e => setD(e.target.value)} style={{ textAlign: "right" }} /></td>
        <td style={{ width: 96 }}><label className="recv"><input type="checkbox" checked={r} onChange={e => setR(e.target.checked)} />received</label></td>
        <td className="num" style={{ width: 80 }}><input className="txt" type="number" value={m} onChange={e => setM(e.target.value)} style={{ textAlign: "right" }} /></td>
        <td className="num" style={{ width: 80 }}><input className="txt" type="number" value={dm} onChange={e => setDm(e.target.value)} style={{ textAlign: "right" }} /></td>
        <td style={{ minWidth: 150 }}><input className="txt" placeholder="optional" value={notes} onChange={e => setNotes(e.target.value)} /></td>
        <td style={{ width: 76 }}><button className={"mini " + (saved ? "saved" : "")} disabled={!dirty && !saved} onClick={save}>{saved ? "✓" : "Save"}</button></td>
      </tr>
    );
  }

  /* ---------------- BULK ---------------- */
  function makeWorkbook(headers, dataRows, sheetName, instructions) {
    const ws = XLSX.utils.aoa_to_sheet([headers, ...dataRows]); ws["!cols"] = headers.map(h => ({ wch: Math.max(12, Math.min(h.length + 4, 24)) }));
    const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, sheetName);
    if (instructions) XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(instructions), "Instructions"); return wb;
  }
  function readSheet(file, cb) {
    const isCsv = /\.csv$/i.test(file.name); const reader = new FileReader();
    reader.onload = e => {
      try {
        const wb = isCsv ? XLSX.read(e.target.result, { type: "string" }) : XLSX.read(new Uint8Array(e.target.result), { type: "array", cellDates: true });
        const sn = wb.SheetNames.find(n => /product|store|template|data/i.test(n)) || wb.SheetNames[0];
        cb(XLSX.utils.sheet_to_json(wb.Sheets[sn], { defval: "" }), null);
      } catch (err) { cb(null, err.message); }
    };
    if (isCsv) reader.readAsText(file); else reader.readAsArrayBuffer(file);
  }
  function Bulk({ division, products, divProducts, bulkProducts, bulkStores }) {
    const dlProducts = (withData) => {
      const ex1 = PROD_HEADERS.map(h => ({ division: division, sku: "EXAMPLE-001 (delete this row)", name: "Sample design", vendor: (DEFAULT_VENDORS[division] || [])[0] || "Vendor", inward: "2026-06-01", qty: 30, note: "old/new split etc", barcoding_status: "Completed", barcoding_person: "Vijaya", content_status: "In Progress", photography_status: "Not Started" }[h] ?? ""));
      const ex2 = PROD_HEADERS.map(h => h === "sku" ? "EXAMPLE-002 (delete this row)" : h === "division" ? division : h === "name" ? "Another design" : h === "qty" ? 12 : "");
      const data = withData ? divProducts.map(p => PROD_HEADERS.map(h => fieldFromProduct(p, h))) : [ex1, ex2];
      const instr = [["How to use the Products & Pipeline sheet"], [""],
      ["1. One row = one product / SKU. 'sku' is the key and must be unique within a division."],
      ["2. Re-uploading UPDATES products that already exist (matched on division + sku) and CREATES new ones."],
      ["3. Leave a cell BLANK to keep the existing value — only filled cells are written, nothing is wiped."],
      ["4. Allowed division: " + DIVISIONS.join(" / ") + ". Blank = currently selected division."],
      ["5. Allowed *_status: " + STATUSES.join(", ") + " (done/complete/pending also accepted, auto-mapped)."],
      ["6. Each stage has 3 columns: <stage>_status, <stage>_person, <stage>_comments."],
      ["7. Stage order: " + STAGE_COLS.map(s => s.n).join(" → ") + "."],
      ["8. qc_verdict: Approved / Issues Found. qc_issues = free text."],
      ["9. inward date format: YYYY-MM-DD."],
      ["10. Delete EXAMPLE rows before uploading. Blank-sku rows are ignored."],
      ["11. Tip: 'Export current products' to download all as-is, edit, and re-upload."]];
      XLSX.writeFile(makeWorkbook(PROD_HEADERS, data, "Products", instr), withData ? "card_products_export.xlsx" : "card_products_template.xlsx");
    };
    const dlStores = (withData) => {
      const ex1 = STORE_HEADERS.map(h => ({ division: division, sku: "EXAMPLE-001 (delete this row)", store: STORES[0], dispatched: 30, received: "yes", missing: 0, damaged: 0, notes: "" }[h] ?? ""));
      const ex2 = STORE_HEADERS.map(h => ({ division: division, sku: "EXAMPLE-001 (delete this row)", store: STORES[1], dispatched: 30, received: "no", missing: 2, damaged: 1, notes: "2 missing, 1 bent" }[h] ?? ""));
      let data = [ex1, ex2]; if (withData) { data = []; divProducts.forEach(p => STORES.forEach(st => { const s = p.stores[st]; data.push(STORE_HEADERS.map(h => ({ division: p.division, sku: p.sku, store: st, dispatched: s.dispatched, received: s.received ? "yes" : "no", missing: s.missing, damaged: s.damaged, notes: s.notes }[h] ?? ""))); })); }
      const instr = [["How to use the Store Dispatch & Receipts sheet"], [""],
      ["1. One row = one product at one store."],
      ["2. Products must already exist (matched on division + sku) — create them via the Products sheet first."],
      ["3. Allowed stores: " + STORES.join(", ") + "."],
      ["4. received: yes/no (or true/false, 1/0). 'yes' stamps receipt date/time automatically."],
      ["5. dispatched / missing / damaged = whole numbers. Any missing or damaged > 0 raises a live alert."],
      ["6. Leave a cell blank to keep the existing value. Delete EXAMPLE rows before uploading."]];
      XLSX.writeFile(makeWorkbook(STORE_HEADERS, data, "Stores", instr), withData ? "card_stores_export.xlsx" : "card_stores_template.xlsx");
    };
    return (
      <div>
        <div className="note">Built for scale — download a template, fill it in Excel (or export what's already here, edit, and re-upload), then import thousands of rows at once. Re-uploading updates existing SKUs and adds new ones; blank cells are never overwritten. Each row's <b>division</b> column decides where it lands.</div>
        <div className="grid" style={{ gridTemplateColumns: "repeat(auto-fit,minmax(330px,1fr))", marginTop: 16 }}>
          <BulkPanel title="Products & Pipeline" icon={I.layers}
            blurb="Add new designs and update any pipeline step — bar coding, content, photography, videography, video editing, images, App & Shopify listing, scan and final QC — all in one sheet."
            onTemplate={() => dlProducts(false)} onExport={() => dlProducts(true)} exportLabel={`Export current products (${divProducts.length})`}
            runImport={bulkProducts}
            summarize={rows => { let c = 0, u = 0; rows.forEach(r => { const sku = String(r.sku || "").trim(); if (!sku || sku.toUpperCase().includes("EXAMPLE")) return; const div = DIVISIONS.includes(String(r.division || "").trim()) ? String(r.division).trim() : division; (products.some(p => p.division === div && p.sku.toLowerCase() === sku.toLowerCase()) ? u++ : c++); }); return `${c} new · ${u} updates`; }}
            resultText={r => `${r.created} created, ${r.updated} updated${r.errs.length ? ` · ${r.errs.length} warning(s)` : ""}`} />
          <BulkPanel title="Store Dispatch & Receipts" icon={I.store}
            blurb="Bulk-record dispatched quantities, store receipts and any missing or damaged cards across all 11 stores. Flagged shortages appear instantly on the Overview."
            onTemplate={() => dlStores(false)} onExport={() => dlStores(true)} exportLabel="Export current store data"
            runImport={bulkStores}
            summarize={rows => { const n = rows.filter(r => String(r.sku || "").trim() && !String(r.sku).toUpperCase().includes("EXAMPLE")).length; return `${n} store row(s)`; }}
            resultText={r => `${r.updated} store rows updated${r.errs.length ? ` · ${r.errs.length} error(s)` : ""}`} />
        </div>
      </div>
    );
  }
  function BulkPanel({ title, icon, blurb, onTemplate, onExport, exportLabel, runImport, summarize, resultText }) {
    const [rows, setRows] = useState(null), [fname, setFname] = useState(""), [err, setErr] = useState(""), [result, setResult] = useState(null), [busy, setBusy] = useState(false);
    const inputRef = useRef();
    const pick = e => { const f = e.target.files[0]; if (!f) return; setErr(""); setResult(null); setRows(null); setFname(f.name); readSheet(f, (r, e2) => { if (e2) setErr(e2); else setRows(r); }); };
    const confirm = async () => { setBusy(true); const res = await runImport(rows); setResult(res); setRows(null); setFname(""); if (inputRef.current) inputRef.current.value = ""; setBusy(false); };
    return (
      <div className="card pad">
        <h3 style={{ margin: "0 0 6px", fontSize: 15, display: "flex", alignItems: "center", gap: 8 }}><span style={{ color: "var(--sage-ink)" }}>{icon({})}</span>{title}</h3>
        <p className="tag" style={{ margin: "0 0 14px", lineHeight: 1.55 }}>{blurb}</p>
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 12 }}>
          <button className="ghost" onClick={onTemplate}>{I.upload({ width: 15, height: 15 })} Blank template</button>
          <button className="ghost" onClick={onExport}>{I.upload({ width: 15, height: 15 })} {exportLabel}</button>
        </div>
        <div style={{ borderTop: "1px solid var(--line)", paddingTop: 14 }}>
          <label className="fld" style={{ marginBottom: 10 }}>Upload filled sheet (.xlsx or .csv)<input ref={inputRef} type="file" accept=".xlsx,.xls,.csv" onChange={pick} className="txt" /></label>
          {err && <div className="alert"><div className="ic">!</div><div className="tx">Couldn't read file: {err}</div></div>}
          {rows && !err && (
            <div className="card" style={{ boxShadow: "none", background: "var(--card-2)", padding: "12px 14px", marginBottom: 10 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 10 }}>
                <span className="tag"><b>{fname}</b> — {rows.length} row(s) · {summarize(rows)}</span>
                <button className="primary" disabled={busy} onClick={confirm}>{busy ? "Importing…" : "Confirm import"}</button>
              </div>
            </div>
          )}
          {result && (
            <div className="card" style={{ boxShadow: "none", background: "var(--sage-bg)", border: "1px solid var(--sage)", padding: "12px 14px" }}>
              <b style={{ color: "var(--sage-ink)" }}>Imported ✓</b> <span className="tag">{resultText(result)}</span>
              {result.errs && result.errs.length > 0 && <ul style={{ margin: "8px 0 0", paddingLeft: 18 }}>{result.errs.slice(0, 6).map((m, i) => <li key={i} className="tag" style={{ color: "var(--rose-ink)" }}>{m}</li>)}{result.errs.length > 6 && <li className="tag">+{result.errs.length - 6} more…</li>}</ul>}
            </div>
          )}
        </div>
      </div>
    );
  }

  /* ---------------- AUDIT ---------------- */
  function AuditLog({ audit }) {
    const [q, setQ] = useState("");
    const rows = audit.filter(a => (a.action + " " + a.entity + " " + a.detail + " " + a.actor).toLowerCase().includes(q.toLowerCase()));
    return (
      <div>
        <div className="note">A complete, timestamped trail of every action — additions, stage updates, final-audit verdicts, store receipts and reported issues. This is your system-level audit; the per-product sign-off lives in the Final QC / Audit stage.</div>
        <div className="toolbar" style={{ marginTop: 14 }}><div className="search">{I.search({})}<input placeholder="Filter the log…" value={q} onChange={e => setQ(e.target.value)} /></div><span className="tag">{rows.length} entries</span></div>
        {rows.length === 0 ? <div className="card empty">No activity recorded yet.</div> :
          <div className="tbl-wrap">
            <table><thead><tr><th style={{ width: 140 }}>When</th><th style={{ width: 130 }}>Action</th><th style={{ width: 120 }}>By</th><th>Item</th><th>Detail</th></tr></thead>
              <tbody>{rows.map(a => (<tr key={a.id}><td className="tag" style={{ whiteSpace: "nowrap" }}>{fmt(a.at)}</td><td><span className="audit-act">{a.action}</span></td><td>{a.actor}</td><td><b>{a.entity}</b></td><td className="tag">{a.detail}</td></tr>))}</tbody>
            </table>
          </div>}
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
