<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap');

  :root {
    --bg: #F4F2EC;
    --side: #FBFAF6;
    --card: #FFFFFF;
    --card-2: #FBFAF6;
    --ink: #35332D;
    --muted: #8C887E;
    --faint: #B3AFA4;
    --line: #EAE6DE;
    --line2: #DFDBD1;
    --sage: #9CBE9A;
    --sage-bg: #EDF4EB;
    --sage-ink: #4C6A4A;
    --sage-deep: #7FA67D;
    --sky: #A5C4D8;
    --sky-bg: #E9F1F6;
    --sky-ink: #42607A;
    --lav: #BCAFD4;
    --lav-bg: #EFEBF6;
    --lav-ink: #594D77;
    --peach: #E3C193;
    --peach-bg: #F8F0E2;
    --peach-ink: #8A6427;
    --rose: #D89F9F;
    --rose-bg: #F7EAEA;
    --rose-ink: #8C4C4C;
    --shadow: 0 1px 2px rgba(53, 51, 45, .04), 0 6px 22px rgba(53, 51, 45, .05);
    --shadow-lg: 0 18px 50px rgba(53, 51, 45, .14);
    --r: 16px;
    --r-sm: 11px;
    --side-w: 248px;
    --sans: 'Hanken Grotesk', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    --serif: 'Fraunces', Georgia, 'Times New Roman', serif;
  }

  * {
    box-sizing: border-box
  }

  html,
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased
  }

  .serif {
    font-family: var(--serif)
  }

  input,
  select,
  textarea,
  button {
    font-family: inherit;
    font-size: 13px;
    color: var(--ink)
  }

  button {
    cursor: pointer;
    border: 0;
    background: none
  }

  a {
    color: inherit
  }

  ::-webkit-scrollbar {
    width: 10px;
    height: 10px
  }

  ::-webkit-scrollbar-thumb {
    background: var(--line2);
    border-radius: 10px;
    border: 3px solid transparent;
    background-clip: padding-box
  }

  svg {
    display: block
  }

  /* ---------- shell ---------- */
  .app {
    display: flex;
    min-height: 100vh
  }

  .sidebar {
    width: var(--side-w);
    flex: 0 0 var(--side-w);
    background: var(--side);
    border-right: 1px solid var(--line);
    position: fixed;
    inset: 0 auto 0 0;
    display: flex;
    flex-direction: column;
    padding: 20px 14px;
    z-index: 40
  }

  .main {
    margin-left: var(--side-w);
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 11px;
    padding: 6px 8px 18px
  }

  .logo {
    width: 34px;
    height: 34px;
    border-radius: 10px;
    background: linear-gradient(150deg, var(--sage), var(--sage-deep));
    display: grid;
    place-items: center;
    color: #fff;
    box-shadow: 0 4px 10px rgba(124, 166, 125, .35)
  }

  .brand b {
    font-family: var(--serif);
    font-weight: 600;
    font-size: 19px;
    letter-spacing: .2px;
    line-height: 1
  }

  .brand span {
    display: block;
    font-size: 10.5px;
    color: var(--muted);
    letter-spacing: .6px;
    text-transform: uppercase;
    margin-top: 3px
  }

  .navlabel {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--faint);
    padding: 14px 10px 7px
  }

  .divbtn {
    display: flex;
    align-items: center;
    gap: 11px;
    width: 100%;
    text-align: left;
    padding: 11px 12px;
    border-radius: var(--r-sm);
    color: var(--muted);
    font-weight: 600;
    transition: .16s;
    margin-bottom: 3px
  }

  .divbtn:hover {
    background: var(--card)
  }

  .divbtn.on {
    background: var(--card);
    color: var(--ink);
    box-shadow: var(--shadow)
  }

  .divbtn .dmark {
    width: 26px;
    height: 26px;
    border-radius: 8px;
    display: grid;
    place-items: center;
    font-family: var(--serif);
    font-weight: 600;
    font-size: 13px;
    background: var(--sage-bg);
    color: var(--sage-ink);
    flex: 0 0 26px
  }

  .divbtn.on .dmark {
    background: var(--sage);
    color: #fff
  }

  .divbtn .dcount {
    margin-left: auto;
    font-size: 11px;
    font-weight: 600;
    color: var(--faint)
  }

  .navitem {
    display: flex;
    align-items: center;
    gap: 11px;
    width: 100%;
    text-align: left;
    padding: 9px 12px;
    border-radius: var(--r-sm);
    color: var(--muted);
    font-weight: 500;
    transition: .16s;
    position: relative;
    margin-bottom: 1px
  }

  .navitem:hover {
    background: var(--card);
    color: var(--ink)
  }

  .navitem.on {
    background: var(--sage-bg);
    color: var(--sage-ink);
    font-weight: 600
  }

  .navitem.on::before {
    content: "";
    position: absolute;
    left: -14px;
    top: 8px;
    bottom: 8px;
    width: 3px;
    border-radius: 3px;
    background: var(--sage-deep)
  }

  .navitem svg {
    flex: 0 0 17px;
    opacity: .85
  }

  .navitem .pip {
    margin-left: auto;
    background: var(--rose);
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    border-radius: 999px;
    padding: 1px 7px;
    min-width: 18px;
    text-align: center
  }

  .sidefoot {
    margin-top: auto;
    border-top: 1px solid var(--line);
    padding-top: 14px
  }

  .opwrap {
    display: flex;
    flex-direction: column;
    gap: 5px;
    padding: 0 4px
  }

  .opwrap label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .8px;
    text-transform: uppercase;
    color: var(--faint)
  }

  .opwrap input {
    border: 1px solid var(--line2);
    border-radius: 9px;
    padding: 8px 10px;
    background: var(--card);
    width: 100%
  }

  .syncbtn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    width: 100%;
    margin-top: 9px;
    padding: 8px;
    border: 1px solid var(--line2);
    border-radius: 9px;
    background: var(--card);
    color: var(--muted);
    font-weight: 600
  }

  .syncbtn:hover {
    color: var(--ink);
    border-color: var(--faint)
  }

  .shared {
    font-size: 10.5px;
    color: var(--faint);
    text-align: center;
    margin-top: 9px;
    line-height: 1.4
  }

  /* ---------- page header ---------- */
  .pagehead {
    position: sticky;
    top: 0;
    z-index: 20;
    background: rgba(244, 242, 236, .82);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--line);
    padding: 18px 32px;
    display: flex;
    align-items: center;
    gap: 16px
  }

  .pagehead h1 {
    margin: 0;
    font-family: var(--serif);
    font-weight: 600;
    font-size: 23px;
    letter-spacing: .2px
  }

  .pagehead .sub {
    font-size: 12.5px;
    color: var(--muted);
    margin-top: 2px
  }

  .pagehead .right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 10px
  }
  .recent-body {
    overflow: hidden;
    transition: max-height .25s ease, opacity .2s ease;
  }
  /* ---------- issue alert glow (rose) ---------- */
  @keyframes glowPulseRose {
    0%   { box-shadow: 0 0 0 0 rgba(216,159,159,.6); }
    70%  { box-shadow: 0 0 0 14px rgba(216,159,159,0); }
    100% { box-shadow: 0 0 0 0 rgba(216,159,159,0); }
  }
  .issue-card-alert {
    animation: glowPulseRose 1.6s ease-out 3;
    border: 1px solid var(--rose) !important;
  }
  .issue-card-badge {
    animation: glowPulseRose 1.6s ease-out 3;
  }

  .crumb {
    font-size: 11px;
    color: var(--faint);
    font-weight: 600;
    letter-spacing: .4px;
    text-transform: uppercase;
    margin-bottom: 1px
  }

  .content {
    padding: 24px 32px 90px;
    max-width: 1180px
  }

  .menubtn {
    display: none
  }

  /* ---------- generic ---------- */
  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--r);
    box-shadow: var(--shadow)
  }

  .pad {
    padding: 20px 22px
  }

  .grid {
    display: grid;
    gap: 16px
  }

  .sec {
    margin-top: 24px
  }

  .sec-h {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 13px
  }

  .sec-h h3 {
    margin: 0;
    font-size: 15px;
    font-weight: 600
  }

  .sec-h .hint {
    font-size: 12px;
    color: var(--muted)
  }

  .spacer {
    flex: 1
  }

  .tag {
    font-size: 11.5px;
    color: var(--muted)
  }

  /* kpi */
  .kpis {
    grid-template-columns: repeat(auto-fit, minmax(165px, 1fr))
  }

  .kpi {
    padding: 17px 18px;
    position: relative;
    overflow: hidden
  }

  .kpi .kico {
    position: absolute;
    top: 15px;
    right: 15px;
    color: var(--faint);
    opacity: .6
  }

  .kpi .lab {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .6px;
    font-weight: 600
  }

  .kpi .val {
    font-family: var(--serif);
    font-size: 32px;
    font-weight: 600;
    margin-top: 8px;
    letter-spacing: -.5px;
    line-height: 1
  }

  .kpi .sub {
    font-size: 11.5px;
    color: var(--faint);
    margin-top: 5px
  }

  /* chips */
  .chip {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    border-radius: 999px;
    padding: 3px 10px;
    font-size: 11px;
    font-weight: 600;
    white-space: nowrap
  }

  .chip .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%
  }

  .c-none {
    background: #F0EEE8;
    color: #8C887E
  }

  .c-none .dot {
    background: #B3AFA4
  }

  .c-prog {
    background: var(--sky-bg);
    color: var(--sky-ink)
  }

  .c-prog .dot {
    background: var(--sky)
  }

  .c-done {
    background: var(--sage-bg);
    color: var(--sage-ink)
  }

  .c-done .dot {
    background: var(--sage)
  }

  .c-issue {
    background: var(--rose-bg);
    color: var(--rose-ink)
  }

  .c-issue .dot {
    background: var(--rose)
  }

  .c-app {
    background: var(--peach-bg);
    color: var(--peach-ink)
  }

  .c-app .dot {
    background: var(--peach)
  }

  /* bars / pipe */
  .bar {
    height: 7px;
    background: #EFEDE6;
    border-radius: 7px;
    overflow: hidden
  }

  .bar i {
    display: block;
    height: 100%;
    background: linear-gradient(90deg, var(--sage), var(--sage-deep));
    border-radius: 7px;
    transition: width .35s
  }

  .stagebar {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 10px 0;
    border-top: 1px solid var(--line)
  }

  .stagebar:first-child {
    border-top: 0
  }

  .stagebar .nm {
    width: 188px;
    font-size: 13px
  }

  .stagebar .meter {
    flex: 1
  }

  .stagebar .pc {
    width: 84px;
    text-align: right;
    font-size: 12px;
    color: var(--muted);
    font-variant-numeric: tabular-nums
  }

  .pipe {
    display: flex;
    gap: 3px;
    width: 170px
  }

  .pipe span {
    height: 6px;
    flex: 1;
    border-radius: 3px;
    background: var(--line2)
  }

  .pipe .s-done {
    background: var(--sage)
  }

  .pipe .s-prog {
    background: var(--sky)
  }

  .pipe .s-issue {
    background: var(--rose)
  }

  /* donut + legend */
  .donutwrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px
  }

  .legend {
    display: flex;
    flex-direction: column;
    gap: 9px;
    width: 100%
  }

  .legend .li {
    display: flex;
    align-items: center;
    gap: 9px;
    font-size: 12.5px
  }

  .legend .sw {
    width: 11px;
    height: 11px;
    border-radius: 4px
  }

  .legend .num {
    margin-left: auto;
    font-weight: 600;
    font-variant-numeric: tabular-nums
  }

  /* tables */
  table {
    border-collapse: collapse;
    width: 100%
  }

  th,
  td {
    text-align: left;
    padding: 11px 13px;
    border-bottom: 1px solid var(--line);
    font-size: 13px;
    vertical-align: middle
  }

  th {
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: .6px;
    color: var(--muted);
    font-weight: 700
  }

  td.num,
  th.num {
    text-align: right;
    font-variant-numeric: tabular-nums
  }

  tr:last-child td {
    border-bottom: 0
  }

  .tbl-wrap {
    overflow: auto;
    border: 1px solid var(--line);
    border-radius: var(--r);
    background: var(--card);
    box-shadow: var(--shadow)
  }


  thead th {
    position: sticky;
    top: 0;
    background: var(--card-2);
    z-index: 1
  }

  /* product rows */
  .plist {
    display: flex;
    flex-direction: column;
    gap: 11px
  }

  .prow {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--r);
    box-shadow: var(--shadow);
    overflow: hidden;
    transition: .16s
  }

  .prow:hover {
    border-color: var(--line2)
  }

  .phead {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 15px 18px;
    cursor: pointer
  }

  .phead:hover {
    background: var(--card-2)
  }

  .psku {
    font-family: ui-monospace, Menlo, monospace;
    font-size: 11.5px;
    color: var(--muted);
    background: var(--card-2);
    border: 1px solid var(--line);
    border-radius: 7px;
    padding: 3px 9px;
    white-space: nowrap
  }

  .pname {
    font-weight: 600
  }

  .pvend {
    font-size: 12px;
    color: var(--muted)
  }

  .pbody {
    border-top: 1px solid var(--line);
    background: var(--card-2)
  }

  .chev {
    color: var(--faint);
    transition: .2s;
    font-size: 11px
  }

  .chev.open {
    transform: rotate(90deg)
  }

  .pct {
    font-variant-numeric: tabular-nums;
    font-weight: 600;
    font-size: 12.5px;
    width: 40px;
    text-align: right
  }

  /* stage editor */
  .stage {
    display: grid;
    grid-template-columns: 182px 156px 1fr 90px;
    gap: 12px;
    align-items: start;
    padding: 13px 16px;
    border-bottom: 1px solid var(--line)
  }

  .stage:last-child {
    border-bottom: 0
  }

  .stage .lab {
    font-weight: 600;
    padding-top: 8px;
    display: flex;
    align-items: center;
    gap: 8px
  }

  .stage .meta {
    grid-column: 1/-1;
    font-size: 11px;
    color: var(--faint);
    margin-top: -5px
  }

  .stnum {
    width: 20px;
    height: 20px;
    border-radius: 6px;
    background: var(--card);
    border: 1px solid var(--line2);
    display: grid;
    place-items: center;
    font-size: 10px;
    color: var(--muted);
    font-weight: 700;
    flex: 0 0 20px
  }

  label.fld {
    display: flex;
    flex-direction: column;
    gap: 5px;
    font-size: 11px;
    color: var(--muted);
    font-weight: 500
  }

  select,
  input.txt,
  textarea {
    border: 1px solid var(--line2);
    border-radius: 9px;
    padding: 9px 11px;
    background: var(--card);
    width: 100%;
    transition: .14s
  }

  select:focus,
  input.txt:focus,
  textarea:focus {
    outline: none;
    border-color: var(--sage);
    box-shadow: 0 0 0 3px var(--sage-bg)
  }

  textarea {
    resize: vertical;
    min-height: 36px
  }

  .done-pill-wrap:hover .done-popup {
    opacity: 1 !important;
  }


  .mini {
    padding: 8px 12px;
    border: 1px solid var(--line2);
    border-radius: 9px;
    background: var(--card);
    font-weight: 600;
    color: var(--sage-ink)
  }

  .mini:hover:not(:disabled) {
    background: var(--sage-bg);
    border-color: var(--sage)
  }

  .mini:disabled {
    opacity: .45;
    cursor: default
  }

  .mini.saved {
    background: var(--sage-bg);
    border-color: var(--sage);
    color: var(--sage-ink)
  }

  /* buttons */
  .ghost {
    border: 1px solid var(--line2);
    background: var(--card);
    border-radius: 10px;
    padding: 9px 14px;
    color: var(--ink);
    font-weight: 600;
    display: inline-flex;
    align-items: center;
    gap: 7px
  }

  .ghost:hover {
    border-color: var(--faint)
  }

  .primary {
    background: var(--ink);
    color: #fff;
    border-radius: 10px;
    padding: 10px 18px;
    font-weight: 600;
    display: inline-flex;
    align-items: center;
    gap: 7px
  }

  .primary:hover {
    background: #26241f
  }

  .primary:disabled {
    opacity: .5
  }

  .danger {
    color: var(--rose-ink);
    background: transparent;
    font-weight: 600;
    font-size: 12px
  }


  /* ---------- recently added / new-card glow ---------- */
  @keyframes glowPulse {
    0%   { box-shadow: 0 0 0 0 rgba(156,190,154,.55); }
    70%  { box-shadow: 0 0 0 14px rgba(156,190,154,0); }
    100% { box-shadow: 0 0 0 0 rgba(156,190,154,0); }
  }
  @keyframes slideInFade {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .new-card-alert {
    animation: glowPulse 1.6s ease-out 2, slideInFade .4s ease-out;
    border: 1px solid var(--sage) !important;
  }
  .new-card-badge {
    animation: glowPulse 1.6s ease-out 3;
  }
  .recent-row {
    animation: slideInFade .3s ease-out;
  }



  .danger:hover {
    text-decoration: underline
  }

  /* toolbar / filters */
  .toolbar {
    display: flex;
    gap: 10px;
    align-items: center;
    margin-bottom: 16px;
    flex-wrap: wrap
  }

  .search {
    position: relative;
    flex: 1;
    min-width: 200px
  }

  .search input {
    border: 1px solid var(--line2);
    border-radius: 10px;
    padding: 10px 12px 10px 36px;
    background: var(--card);
    width: 100%
  }

  .search svg {
    position: absolute;
    left: 11px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--faint)
  }

  .filt {
    border: 1px solid var(--line2);
    border-radius: 10px;
    padding: 9px 11px;
    background: var(--card);
    font-weight: 500;
    color: var(--ink)
  }

  /* alerts */
  .alert {
    display: flex;
    align-items: center;
    gap: 13px;
    padding: 13px 15px;
    border: 1px solid var(--rose);
    background: var(--rose-bg);
    border-radius: 13px;
    margin-bottom: 9px
  }

  .alert .ic {
    width: 28px;
    height: 28px;
    border-radius: 9px;
    background: var(--rose);
    color: #fff;
    display: grid;
    place-items: center;
    font-weight: 700;
    flex: 0 0 28px
  }

  .alert .tx {
    flex: 1;
    font-size: 13px;
    color: var(--rose-ink)
  }

  .alert b {
    color: var(--ink)
  }

  /* activity feed */
  .feed {
    display: flex;
    flex-direction: column
  }

  .feed .fi {
    display: flex;
    gap: 11px;
    padding: 11px 0;
    border-top: 1px solid var(--line)
  }

  .feed .fi:first-child {
    border-top: 0
  }

  .feed .fdot {
    width: 8px;
    height: 8px;

    menu: p => (<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.9" strokeLinecap="round" {...p}><path d="M4 6h16M4 12h16M4 18h16" /></svg>),
    box: p => (<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinejoin="round" {...p}><path d="M12 3 4 7v10l8 4 8-4V7l-8-4Z" /><path d="M4 7l8 4 8-4M12 11v10" /></svg>),
    check: p => (<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M20 6 9 17l-5-5" /></svg>),
    gear: p => (<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" {...p}><circle cx="12" cy="12" r="3" /><path d="M12 2v3M12 19v3M4.2 4.2l2.1 2.1M17.7 17.7l2.1 2.1M2 12h3M19 12h3M4.2 19.8l2.1-2.1M17.7 6.3l2.1-2.1" /></svg>),
    store: p => (<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinejoin="round" {...p}><path d="M4 9h16v11H4z" /><path d="M3 9l2-5h14l2 5" /><path d="M9 20v-5h6v5" /></svg>),
    alert: p => (<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M12 4 2 20h20L12 4Z" /><path d="M12 10v4M12 17h.01" /></svg>),
  };

  function Chip({ status }) { return <span className={"chip " + statusClass(status)}><span className="dot" />{status}</span>; }
  function Bar({ pct }) { return <div className="bar"><i style={{ width: pct + "%" }} /></div>; }
  function Pipe({ p }) { return <div className="pipe">{STAGES.map(s => <span key={s.k} className={pipeClass(p.stages[s.k].status)} title={s.n + ": " + p.stages[s.k].status} />)}</div>; }
  function Donut({ segments, size = 148, thick = 20, centerTop, centerBot }) {
    const r = (size - thick) / 2, c = size / 2, circ = 2 * Math.PI * r, total = segments.reduce((a, s) => a + s.value, 0);
    let off = 0;
    return (<svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      <circle cx={c} cy={c} r={r} fill="none" stroke="var(--line)" strokeWidth={thick} />
      {total > 0 && segments.map((s, i) => { const len = s.value / total * circ; const el = (<circle key={i} cx={c} cy={c} r={r} fill="none" stroke={s.color} strokeWidth={thick} strokeDasharray={`${len} ${circ - len}`} strokeDashoffset={-off} transform={`rotate(-90 ${c} ${c})`} />); off += len; return el; })}
      <text x={c} y={c - 1} textAnchor="middle" style={{ fontFamily: "var(--serif)", fontSize: 30, fontWeight: 600, fill: "var(--ink)" }}>{centerTop}</text>
      <text x={c} y={c + 17} textAnchor="middle" style={{ fontSize: 9.5, fill: "var(--muted)", letterSpacing: 1, textTransform: "uppercase" }}>{centerBot}</text>
    </svg>);
  }

  function Login({ onLogin }) {
    const [email, setEmail] = useState("");
    const [password, setPassword] = useState("");
    const [show, setShow] = useState(false);
    const [err, setErr] = useState("");
    const [busy, setBusy] = useState(false);

    const submit = async (e) => {
      e.preventDefault();
      setErr(""); setBusy(true);
      const em = email.trim().toLowerCase();
      // First check Google Sheet users
      const sheetUsers = await gsGetUsers();
      console.log("Sheet users:", sheetUsers);
      const user = sheetUsers.find(u => u.email.toLowerCase() === em && u.password === password);
      if (user) { setBusy(false); onLogin(user); return; }
      // Fallback: check team members added via Assign tab
      const allLocal = window.__teamMembers || [];
      const local = allLocal.find(u => u.email.toLowerCase() === em && u.password === password);
      if (local) { setBusy(false); onLogin(local); return; }
      setErr("Incorrect email or password.");
      setBusy(false);
    };

    return (
      <div className="loginwrap">
        <div className="loginbox">
          <div className="logo">{I.box({ stroke: "#fff" })}</div>
          <h1 className="serif">Card Flow</h1>
          <p className="sub">Production Suite — sign in to continue</p>
          <form onSubmit={submit}>
            <label>Email
              <input type="email" autoFocus value={email} placeholder="you@koc.com" onChange={e => { setEmail(e.target.value); setErr(""); }} />
            </label>
            <label>Password
              <div className="pwwrap">
                <input type={show ? "text" : "password"} value={password} placeholder="••••••••" onChange={e => { setPassword(e.target.value); setErr(""); }} />
                <button type="button" onClick={() => setShow(s => !s)}>{show ? "Hide" : "Show"}</button>
              </div>
            </label>
            {err && <div className="loginerr">{err}</div>}
            <button className="primary" type="submit" disabled={busy}>
              {busy ? "Signing in…" : "Sign in"}
            </button>
          </form>
        </div>
      </div>
    );
  }

  /* ============================================================= */
  function App() {
    const [loading, setLoading] = useState(true);

    const [teamMembers, setTeamMembers] = useState([]);
    const [assignments, setAssignments] = useState([]);
    const [qcAuditLog, setQcAuditLog] = useState([]); // deep-link target for QC Audit tab
    const [productsFilter, setProductsFilter] = useState(null);

    const goToProductsFilter = (filter) => {

    };
    const [qcAuditFilter, setQcAuditFilter] = useState(null); // deep-link target for QC Audit tab
    const goToQcAuditIssues = () => {

    };
    const [navOpen, setNavOpen] = useState(false);
    const [auth, setAuth] = useState(() => {
      try {
        const raw = sessionStorage.getItem("ct:auth") || localStorage.getItem("ct:auth");

    });

    const handleLogin = (user) => {
      const a = { name: user.name, email: user.email, role: user.role, stages: user.stages };
      setAuth(a);
      localStorage.setItem("ct:auth", JSON.stringify(a));
      sessionStorage.setItem("ct:auth", JSON.stringify(a));
      // Always stamp the operator name to whoever just logged in — never leave it
      // pointing at a stale name from a previous session on this browser/device.
      setOperator(user.name);
    };
    const handleLogout = () => {
      setAuth(null);
      localStorage.removeItem("ct:auth");
      sessionStorage.removeItem("ct:auth");
      localStorage.removeItem("ct:operator");
    };

    const load = useCallback(async () => {
      // Operator always mirrors the signed-in user — never a stale typed name

      if (auth && auth.name) setOperator(auth.name);
      const [data, sheetUsers] = await Promise.all([gsGet(), gsGetUsers()]);
      if (data) {
        const PROTECT_MS = 15000; // ignore a synced stage value for 15s after our own write
        const incoming = (data.products || []).map(ensureStages);
        const reconciled = incoming.map(incomingP => {
          const localP = productsRef.current.find(p => p.id === incomingP.id);
          if (!localP) return incomingP;
          const mergedStages = { ...incomingP.stages };
          Object.keys(mergedStages).forEach(stageKey => {
            const stamp = recentStagePatchRef.current[incomingP.id + "|" + stageKey];
            if (stamp && Date.now() - stamp < PROTECT_MS) {
              // Trust our own very-recent local write over this sync's value.
              mergedStages[stageKey] = localP.stages[stageKey];
            }
          });
          return { ...incomingP, stages: mergedStages };
        });
        setProducts(reconciled);
        setAudit((data.audit || []).map(normalizeAuditRow));
        setVendors(data.vendors || DEFAULT_VENDORS);
        setAssignments(data.assignments || []);
        setQcAuditLog(data.qcAudit || []);

        const savedMembers = data.teamMembers || [];

        // const fromSheet = sheetUsers

        // Use Users sheet as source of truth for team members
        // const sheetUsers = await gsGetUsers();
        // const savedMembers = data.teamMembers || [];

        const fromSheet = sheetUsers
          .filter(u => u.email && u.role !== "master" && u.role !== "admin")
          .map(u => {
            // teamMembers sheet is the source of truth for managerId and division
            // Users sheet often has these blank — always prefer teamMembers
            const saved = savedMembers.find(m => m.email && m.email.toLowerCase() === u.email.toLowerCase());
            return {
              id: saved?.id || (u.name ? u.name.toLowerCase().replace(/\s+/g, "_") : uid()),
              name: u.name || u.email,
              email: u.email,
              password: u.password || saved?.password || "",
              role: u.role || saved?.role || "member",
              stages: u.stages || saved?.stages || "",
              // teamMembers sheet (saved) has the correct division and managerId
              // Users sheet leaves these blank — don't fall back to u.division/u.managerId
              division: saved?.division || u.division || "KOC Cards",
              managerId: saved?.managerId ?? u.managerId ?? null,
              joinedAt: saved?.joinedAt || u.joinedAt || ""
            };
          });

        window.__teamMembers = fromSheet;
        setTeamMembers(fromSheet);
      }
      setLoading(false);
    }, [auth]);
    useEffect(() => { load(); }, [load]);

    // Auto-sync every 90 seconds so users never work on stale data
    useEffect(() => {
      const interval = setInterval(() => {
        // Only sync if no bulk operation is in progress
        if (!bulkLockRef.current) {
          load();
        }
      }, 90000);
      return () => clearInterval(interval);
    }, [load]);

    const logAudit = useCallback(async (action, entity, detail) => {
      const e = { id: uid(), at: now(), actor: operator || "Unattributed", action, entity, detail, division };
      setAudit(prev => { const next = [e, ...prev].slice(0, 800); return next; });
      await gsPost("appendAudit", e);
    }, [operator, division]);

    const bulkLockRef = useRef(false);
    const recentStagePatchRef = useRef({}); // pid+stageKey -> timestamp(ms) of our own last write

    const saveProducts = useCallback(async (next) => {
      if (bulkLockRef.current) {
        console.warn("Skipped saveProducts — bulk stage update in progress");
        return;
      }
      productsRef.current = next;
      setProducts(next);
      await gsPost("batchUpsertProducts", next);
    }, []);

    const upsertProduct = useCallback(async (prod, isNew) => {
      prod.updatedAt = now();
      const next = isNew ? [prod, ...products] : products.map(x => x.id === prod.id ? prod : x); await saveProducts(next);
      logAudit(isNew ? "Added product" : "Edited product", prod.sku || prod.name || "product", `${prod.name || "(unnamed)"} · ${prod.vendor || "no vendor"} · qty ${prod.qty}`);
    }, [products, saveProducts, logAudit]);

    const patchStage = useCallback(async (pid, stageKey, patch) => {
      if (bulkLockRef.current) {
        console.warn("Skipped single-stage patch — bulk update in progress");
        return;
      }
      const nowIso = now();
      const base = productsRef.current;
      const next = base.map(p => {
        if (p.id !== pid) return p;
        const updatedStages = { ...p.stages, [stageKey]: { ...p.stages[stageKey], ...patch, at: nowIso } };
        // If a stage is being marked Completed and the product had "Issues Found",
        // check if ALL stages are now Completed — if so, clear verdict back to pending
        // so it re-enters the QC queue for re-approval.
        let verdict = p.verdict;
        let issues = p.issues;
        if (patch.status === "Completed" && p.verdict === "Issues Found") {
          // Only check stages that are "In Progress" (i.e. flagged by QC and sent back).
          // As soon as none remain In Progress, the card is ready for re-approval.
          const flaggedStagesStillPending = STAGES.filter(s => 
            s.k !== "finalqc" && 
            (updatedStages[s.k]?.status === "In Progress")
          );
          if (flaggedStagesStillPending.length === 0) { 
            verdict = ""; 
            issues = ""; 
          }
        }
        return { ...p, stages: updatedStages, verdict, issues, updatedAt: nowIso };
      });
      productsRef.current = next;
      setProducts(next);

      // Targeted single-row patch — touches only this product's stage cells on the
      // backend, so a stale client elsewhere can never overwrite this fresh save.
      const res = await gsPost("batchPatchStage", { ids: [pid], stageKey, patch });
      if (!res || res.ok === false) {
        throw new Error("batchPatchStage failed: " + JSON.stringify(res));
      }

      const updatedProduct = next.find(x => x.id === pid);
      const originalProduct = base.find(x => x.id === pid);
      if (updatedProduct?.verdict === "" && originalProduct?.verdict === "Issues Found") {
        await gsPost("patchQCVerdict", { id: pid, verdict: "", issues: "" });
      }

      // Remember that WE just wrote this stage, so a sync that lands shortly after
      // (and might still carry a stale read from before our write committed) doesn't
      // overwrite it back. See load()'s merge logic below.
      recentStagePatchRef.current[pid + "|" + stageKey] = Date.now();

      const p = next.find(x => x.id === pid), sn = STAGES.find(s => s.k === stageKey).n;
      logAudit("Stage update", `${p.name || p.sku || "product"}`, `${sn} → ${patch.status || p.stages[stageKey].status}${patch.person ? (" · " + patch.person) : ""}`);
    }, [logAudit]);
    const patchStageBulk = useCallback(async (ids, stageKey, patch) => {
      bulkLockRef.current = true;
      try {
        const nowIso = now();
        const idSet = new Set(ids);
        const base = productsRef.current;
        const next = base.map(p => !idSet.has(p.id) ? p : { ...p, stages: { ...p.stages, [stageKey]: { ...p.stages[stageKey], ...patch, at: nowIso } }, updatedAt: nowIso });
        productsRef.current = next;
        setProducts(next);

        // Send only the ids + the single stage patch — not the whole product list —
        // so the backend does one targeted read+write instead of re-serializing everything.
        const res = await gsPost("batchPatchStage", { ids, stageKey, patch });
        if (!res || res.ok === false) {
          throw new Error("batchPatchStage failed: " + JSON.stringify(res));
        }

        const stamp = Date.now();
        ids.forEach(id => { recentStagePatchRef.current[id + "|" + stageKey] = stamp; });

        const sn = STAGES.find(s => s.k === stageKey).n;
        logAudit("Bulk stage update", `${ids.length} products`, `${sn} → ${patch.status} (multi-select)`);
      } finally {
        bulkLockRef.current = false;
      }
    }, [logAudit]);

    const submitQCAudit = useCallback(async (pid, verdict, comments, stagesBack) => {
      const p = productsRef.current.find(x => x.id === pid);
      if (!p) return { ok: true, failedStages: [] };

      // 1. Update verdict/issues on product locally + backend
      const next = productsRef.current.map(x =>
        x.id !== pid ? x : { ...x, verdict, issues: verdict === "Issues Found" ? comments : comments, updatedAt: now() }
      );
      productsRef.current = next;
      setProducts(next);
      await gsPost("patchQCVerdict", { id: pid, verdict, issues: comments });

      // 2. Push EVERY selected stage back to In Progress. Retry each up to
      // 3x, and only apply/trust a stage locally once the backend confirms
      // it. Before, a slow or dropped call on just ONE of several selected
      // stages still showed as changed in the UI, then quietly reverted on
      // the next 90s sync — while the stages that happened to succeed stuck.
      const failedStages = [];
      if (verdict === "Issues Found" && stagesBack.length > 0) {
        for (const stageKey of stagesBack) {
          let res = null;
          for (let attempt = 0; attempt < 3; attempt++) {
            res = await gsPost("batchPatchStage", {
              ids: [pid],
              stageKey,
              patch: { status: "In Progress", comments: `QC flagged: ${comments}` }
            });
            if (res && res.ok !== false) break;
            await new Promise(r => setTimeout(r, 500 * (attempt + 1)));
          }
          if (!res || res.ok === false) { failedStages.push(stageKey); continue; }

          productsRef.current = productsRef.current.map(x =>
            x.id !== pid ? x : {
              ...x,
              stages: {
                ...x.stages,
                [stageKey]: {
                  ...x.stages[stageKey],
                  status: "In Progress",
                  comments: `QC flagged: ${comments}`,
                  at: now()
                }
              }
            }
          );
          // Protect this stage from the 90s auto-sync overwriting it with a
          // still-stale server read — same protection every single-stage
          // save already gets via patchStage().
          recentStagePatchRef.current[pid + "|" + stageKey] = Date.now();
        }
        setProducts([...productsRef.current]);
      }

      // 3. Only record stages that were actually confirmed as sent back.
      const confirmedStagesBack = stagesBack.filter(k => !failedStages.includes(k));
      const entry = {
        id: uid(), at: now(), auditor: operator,
        sku: p.sku, division: p.division, productId: pid,
        verdict, comments: comments || "",
        stagesSentBack: confirmedStagesBack.join(",")
      };
      await gsPost("appendQCAudit", entry);
      setQcAuditLog(prev => [entry, ...prev]);

      logAudit(
        "QC Audit", p.sku || p.name,
        `${verdict}${comments ? " · " + comments : ""}${confirmedStagesBack.length ? " · sent back: " + confirmedStagesBack.join(", ") : ""}`
      );

      return { ok: failedStages.length === 0, failedStages };
    }, [operator, logAudit]);



    const patchQC = useCallback(async (pid, patch) => {
      const base = productsRef.current;
      const next = base.map(p => p.id === pid ? { ...p, ...patch, updatedAt: now() } : p);
      productsRef.current = next;
      await saveProducts(next);
      const p = next.find(x => x.id === pid); logAudit("Final audit", `${p.name || p.sku || "product"}`, `Verdict: ${patch.verdict || p.verdict || "—"}`);
    }, [saveProducts, logAudit]);
    const patchStore = useCallback(async (pid, store, patch) => {
      const base = productsRef.current;
      const next = base.map(p => p.id !== pid ? p : { ...p, stores: { ...p.stores, [store]: { ...p.stores[store], ...patch, at: now() } }, updatedAt: now() });
      productsRef.current = next;
      setProducts(next);  // update local state only — no batchUpsertProducts
      const updated = next.find(x => x.id === pid);
      await gsPost("upsertStore", {
        productId: pid,
        store,
        division: updated.division,
        sku: updated.sku,
        storeData: updated.stores[store]
      });
      const p = updated, s = p.stores[store];
      let d = `${store}: disp ${s.dispatched}, recv ${s.received ? "yes" : "no"}`; if (s.missing > 0 || s.damaged > 0) d += ` · ⚠ missing ${s.missing}, damaged ${s.damaged}`;
      logAudit((s.missing > 0 || s.damaged > 0) ? "Issue reported" : "Store update", `${p.name || p.sku || "product"}`, d);
    }, [saveProducts, logAudit]);
    const removeProduct = useCallback(async (pid) => {
      const p = products.find(x => x.id === pid);
      const filtered = products.filter(x => x.id !== pid);
      setProducts(filtered);
      await gsPost("deleteProduct", { id: pid });
      logAudit("Deleted product", `${p?.name || p?.sku || "product"}`, p?.vendor || "");
    }, [products, logAudit]);
    const addVendor = useCallback(async (div, name) => {
      if (!name) return; const list = vendors[div] || []; if (list.includes(name)) return; const next = { ...vendors, [div]: [...list, name].sort() }; setVendors(next); await gsPost("setVendors", next);
    }, [vendors]);

    const saveTeamMembers = useCallback(async (next) => {
      setTeamMembers(next);
      window.__teamMembers = next;
      const res = await gsPost("setTeamMembers", next);
      if (!res || res.ok === false) {
        alert("Could not save team members to the server — re-syncing.");
        await load();
      }
    }, [load]);

    const assignmentSaveLockRef = useRef(false);

    const saveAssignments = useCallback(async (next) => {
      if (assignmentSaveLockRef.current) {
        alert("Another assignment save is in progress — please wait a moment and try again.");
        return { ok: false };
      }
      assignmentSaveLockRef.current = true;
      try {
        const res = await gsPost("setAssignments", next);
        if (!res || res.ok === false) {
          alert("Could not save this assignment to the server: " + (res?.error || "unknown error") + " — re-syncing.");
          await load();
          return { ok: false, error: res?.error };
        }
        // Only update local state once the server has confirmed the write.
        setAssignments(next);
        return { ok: true };
      } finally {
        assignmentSaveLockRef.current = false;
      }
    }, [load]);

    const saveOperator = (v) => { setOperator(v); localStorage.setItem("ct:operator", v); };

    const bulkProducts = useCallback(async (rows) => {
      const validRows = rows.filter(r => {
        const sku = String(r.sku || "").trim();
        return sku && !sku.toUpperCase().includes("EXAMPLE");
      }).map(r => ({ ...r, division: DIVISIONS.includes(String(r.division || "").trim()) ? String(r.division).trim() : division }));

      const CHUNK = 500;       // was 50 — safe now that each chunk is set-based
      const CONCURRENCY = 3;   // run a few chunks in parallel
      let created = 0, updated = 0; const errs = [];

      const chunks = [];
      for (let i = 0; i < validRows.length; i += CHUNK) chunks.push(validRows.slice(i, i + CHUNK));

      for (let i = 0; i < chunks.length; i += CONCURRENCY) {
        const batch = chunks.slice(i, i + CONCURRENCY);
        const results = await Promise.all(batch.map(async chunk => {
          let res = null;
          for (let attempt = 0; attempt < 3; attempt++) {
            res = await gsPost("bulkImportProducts", chunk);
            if (res && res.ok) break;
            console.warn(`bulkImportProducts attempt ${attempt + 1} failed`, res);
            await new Promise(r => setTimeout(r, 700 * (attempt + 1)));
          }
          return res;
        }));
        results.forEach((res, idx) => {
          if (!res || !res.ok) {
            errs.push(`Chunk failed after 3 retries (${batch[idx].length} rows): ${res?.error || "no response / network error"}`);
            return;
          }
          created += res.created; updated += res.updated;
          if (res.failed?.length) errs.push(...res.failed.map(f => `${f.sku}: ${f.error}`));
        });
      }

      await load();
      logAudit("Bulk import", `${created + updated} products`,
        `${created} created, ${updated} updated${errs.length ? `, ${errs.length} error(s)` : ""}`);
      return { created, updated, errs };
    }, [division, load, logAudit]);

    const bulkStores = useCallback(async (rows) => {
      let updated = 0; const errs = []; let next = [...products];
      rows.forEach((row, i) => {
        const sku = String(row.sku || "").trim(); if (!sku || sku.toUpperCase().includes("EXAMPLE")) return;
        const div = DIVISIONS.includes(String(row.division || "").trim()) ? String(row.division).trim() : division;
        const store = String(row.store || "").trim(); if (!STORES.includes(store)) { errs.push(`Row ${i + 2}: unknown store "${store}"`); return; }
        const existing = next.find(p => p.division === div && p.sku.toLowerCase() === sku.toLowerCase());
        if (!existing) { errs.push(`Row ${i + 2}: product "${sku}" not found in ${div}`); return; }
        const np = { ...existing, stores: { ...existing.stores } }; const s = { ...np.stores[store] }; const g = k => row[k] !== "" && row[k] != null;
        if (g("dispatched") && !isNaN(+row.dispatched)) s.dispatched = +row.dispatched;

        s.at = now(); np.stores[store] = s; np.updatedAt = now(); next = next.map(p => p.id === np.id ? np : p); updated++;
      });
      await saveProducts(next); logAudit("Bulk store import", `${updated} store rows`, errs.length ? `${errs.length} errors` : "ok");

            .map(a => a.sku.toLowerCase())
        );

          delete map[myMemberId];

}, [audit, dashFromDate, dashToDate, division, isMasterOrAdminView, auth]);

const recentActivityScoped = useMemo(() => {

    // Pending/Complete KPIs now reflect the Website Listing (Shopify) stage

    const WEBSITE_STAGE_KEY = "website";
    const websiteStats = useMemo(() => {
      const pool = isMasterOrAdminView ? (allDivProducts || products) : myFullPool;
      // "Complete" means QC-approved — not just that the Website Listing stage
      // happens to read Completed. A card can sit with website already done
      // while still awaiting (re-)approval, e.g. after a flagged stage gets
      // fixed and the verdict resets to pending review.
      const completed = pool.filter(p => p.verdict === "Approved").length;
      const pending = pool.length - completed;
      return { completed, pending, total: pool.length };
    }, [isMasterOrAdminView, allDivProducts, products, myFullPool]);

    // Stage-by-stage status for whichever member is selected in the filter,
    // scoped to ONLY the stages that member was actually assigned (not the
    // full pipeline), so the master dashboard isn't confusing all-stage noise.
    const selectedMemberBreakdown = useMemo(() => {
      if (!fMember) return null;
      const member = teamMembers.find(m => m.id === fMember);
      if (!member) return null;
      const pool = allDivProducts || products;

      // Build sku -> [stageKeys assigned to this member] from assignments
      const skuStageMap = {};
      assignments
        .filter(a => a.memberId === fMember && a.division === division)
        .forEach(a => {
          const key = (a.sku || "").trim().toLowerCase();
          const stageKey = a.stage && a.stage !== "all" ? a.stage : null;
          if (!skuStageMap[key]) skuStageMap[key] = new Set();
          if (stageKey) skuStageMap[key].add(stageKey);
        });

      // Collect every distinct stage this member has been assigned anywhere
      const assignedStageKeys = [...new Set(
        Object.values(skuStageMap).flatMap(set => [...set])
      )];

      const perStage = assignedStageKeys.map(stageKey => {
        let completed = 0, inProgress = 0, issue = 0, notStarted = 0, total = 0;
        Object.entries(skuStageMap).forEach(([sku, stages]) => {
          if (!stages.has(stageKey)) return;
          const prod = pool.find(p => p.sku.trim().toLowerCase() === sku);
          if (!prod) return;
          total++;
          const status = prod.stages?.[stageKey]?.status || "Not Started";
          if (status === "Completed") completed++;
          else if (status === "In Progress") inProgress++;
          else if (status === "Issue") issue++;
          else notStarted++;
        });
        const s = STAGES.find(x => x.k === stageKey);
        return { key: stageKey, name: s?.n || stageKey, completed, inProgress, issue, notStarted, total };
      });

      const cardsAssigned = Object.keys(skuStageMap).length;
      const cardsDone = Object.entries(skuStageMap).filter(([sku, stages]) => {
        const prod = pool.find(p => p.sku.trim().toLowerCase() === sku);
        if (!prod || stages.size === 0) return false;
        return [...stages].every(stageKey => prod.stages?.[stageKey]?.status === "Completed");
      }).length;

      return { memberName: member.name, perStage, cardsAssigned, cardsDone, cardsPending: cardsAssigned - cardsDone };
    }, [fMember, teamMembers, assignments, division, allDivProducts, products]);

    // Group myTeam by their manager so master/admin can see who reports to
    // whom (e.g. everyone under Chitra clustered together), while a manager
    // viewing their own team just sees a flat list (they only have one group).
    const groupedTeamOptions = useMemo(() => {
      const managerNameOf = (managerId) => {
        if (!managerId) return "Unassigned / Direct";
        const mgr = teamMembers.find(x => x.id === managerId);
        return mgr ? mgr.name : managerId;
      };
      const groups = {};
      myTeam.forEach(m => {
        const label = m.id === myMemberId ? "Myself" : managerNameOf(m.managerId);
        if (!groups[label]) groups[label] = [];
        groups[label].push(m);
      });
      return Object.entries(groups)
        .map(([label, members]) => ({ label, members: members.sort((a, b) => a.name.localeCompare(b.name)) }))

    // Single source of truth for "is this card done, for this manager's own scope".

     const isCardCompleteForMe = useCallback((p) => {
      // Master/admin (overall view): "Complete" means QC-approved — stages
      // done but not yet approved still counts as pending.
      if (isMasterOrAdminView) return p.verdict === "Approved";
      // Manager/member own view: "Complete" means THEY finished their
      // assigned stages — QC approval status doesn't gate this level.
      const myStagesOnCard = assignments.filter(
        a => a.division === division &&
          a.memberId === myMemberId &&
          a.sku.trim().toLowerCase() === p.sku.trim().toLowerCase()

      const specificStages = myStagesOnCard.filter(a => a.stage && a.stage !== "all");

      return stagesToCheck.every(a => {

    // Only the person actually assigned to a QC-flagged stage should see it as
// "their" notification — not the whole team just because the SKU is shared.


    // Master's version of myFlaggedIssues — same two issue types

    const divisionIssuesList = useMemo(() => {
      if (!isMasterOrAdminView) return [];
      const pool = allDivProducts || products;
      const list = [];
      pool.forEach(p => {
        STAGES.forEach(s => {

          const stg = p.stages[s.k];
          if (!stg) return;
          const isQcFlagged = stg.status === "In Progress" && String(stg.comments || "").startsWith("QC flagged:");

      const myStageMap = {};

          return { name: m.name, count };

    } else {

      remainingWithManager = myFullPool.length - distributedSkus;
      distributionBreakdown = myTeam

          const count = assignments.filter(a => {

            if (seen.has(key)) return false;

    }
    const [showDistBreakdown, setShowDistBreakdown] = useState(false);
    // "Pending" = cards in my own full pool whose stages I haven't finished yet

    // of whether they've also been pushed to a teammate.
    const pendingCount = isMasterOrAdminView
      ? remainingWithManager
      : myFullPool.filter(p => !isCardCompleteForMe(p) && !myIssueCardIds.has(p.id)).length;
    const completeCount = isMasterOrAdminView
      ? done
      : myFullPool.filter(p => isCardCompleteForMe(p)).length;

    // Cards chitra kept for herself (not pushed to any team member)
    const myPersonalPool = useMemo(() => {
      if (isMasterOrAdminView) return myFullPool;
      return myFullPool.filter(p => !pushedToTeamSkuSet.has(p.sku.trim().toLowerCase()));
    }, [myFullPool, pushedToTeamSkuSet, isMasterOrAdminView]);

    const myPersonalComplete = myPersonalPool.filter(p => isCardCompleteForMe(p)).length;
    const myPersonalPending = myPersonalPool.filter(p => !isCardCompleteForMe(p)).length;

    const totalVal = isMasterOrAdminView ? myFullPool.length 
      : (dbStats ? Number(dbStats.total_assigned) : myFullPool.length);

    // Personalized completion: for a team member, "Complete"/"Pending" must
    // reflect only the stages THEY were specifically assigned on each card
    // (via isCardCompleteForMe), not a single global stage like Website
    // Listing checked across the whole pool. Master/admin keeps the
    // org-wide website-listing view since they aren't scoped to an assignment.
    const pendingVal = isMasterOrAdminView
      ? (allDivProducts || products).filter(p => p.verdict !== "Approved" && !divisionIssueCardIds.has(p.id)).length
      : pendingCount;
    const completeVal = isMasterOrAdminView ? websiteStats.completed : completeCount;
    const distributedVal = isMasterOrAdminView ? distributedSkus 
      : (dbStats ? Number(dbStats.pushed_to_team) : distributedSkus);
    const withManagerVal = isMasterOrAdminView ? remainingWithManager 
      : (dbStats ? Number(dbStats.kept_by_manager) : myPersonalPool.length);

    // // Master sees every flagged card across the division. A member/manager
    // // only sees issues that live on a stage actually assigned to them —
    // // never a flag that landed on a teammate's stage of the same card.
    // Master sees every flagged card across the division. A member/manager
    // only sees issues that live on a stage actually assigned to them —
    // never a flag that landed on a teammate's stage of the same card.
    // Counts distinct CARDS with an open issue (not stage-flag instances),
    // so Total = Pending + Complete + Issues stays clean and mutually exclusive.
    const issuesVal = isMasterOrAdminView
      ? divisionIssueCardIds.size
      : myIssueCardIds.size;
    const liveAlertCount = issues.length + (isMasterOrAdminView ? divisionIssuesList.length : myFlaggedIssues.length);
    useEffect(() => {

        const t = setTimeout(() => setIssueGlow(false), 5000);

      { lab: "Pending", val: pendingVal, sub: isMasterOrAdminView ? "not yet assigned" : "with me, not done", ic: I.layers, color: pendingVal > 0 ? "var(--peach-ink)" : "var(--sage-ink)", scope: "pending" },
      { lab: "Complete", val: completeVal, sub: isMasterOrAdminView ? "fully done" : "done by me personally", ic: I.check, color: "var(--sage-ink)", scope: "completed" },
            { lab: "Issues", val: issuesVal, sub: isMasterOrAdminView ? `${divisionIssuesList.length} flagged stage(s)` : `${myFlaggedIssues.length} flagged stage(s)`, ic: I.alert, color: issuesVal ? "var(--rose-ink)" : "var(--ink)", scope: "issues" },

        ]);

                {(dashFromDate || dashToDate) && (

                    style={{ fontSize: 11, fontWeight: 600, color: "var(--rose-ink)", border: "1px solid var(--rose)", background: "var(--rose-bg)", borderRadius: 8, padding: "5px 10px" }}>
                    ✕ Clear
                  </button>
                )}
                <span style={{ fontSize: 12, color: "var(--muted)", whiteSpace: "nowrap" }}>{dashboardActivity.length} action(s) in range</span>
              </div>
            )}
          </div>
        </div>


        {(dashFromDate && dashToDate) && (
          <div className="card pad" style={{ marginBottom: 16 }}>
            {dashboardActivity.length === 0
              ? <div style={{ fontSize: 12, color: "var(--faint)" }}>No activity in this range.</div>
              : <div style={{ maxHeight: 240, overflowY: "auto" }}>
                  {dashboardActivity.map(a => (
                    <div key={a.id} style={{ display: "flex", gap: 10, fontSize: 12, padding: "6px 0", borderBottom: "1px solid var(--line)" }}>
                      <span style={{ color: "var(--faint)", whiteSpace: "nowrap" }}>{fmt(a.at)}</span>
                      <span style={{ fontWeight: 600 }}>{a.actor || "—"}</span>
                      <span>{a.action}</span>
                      <span style={{ color: "var(--muted)" }}>{a.entity}</span>
                      <span style={{ color: "var(--muted)" }}>{a.detail}</span>
                    </div>
                  ))}
                </div>
            }
          </div>
        )}

        <div className="grid kpis">
          {kpis.map((k, i) => (
            <div
              className={"card kpi" + (k.scope === "issues" && issueGlow ? " issue-card-alert" : "")}
              key={i}
              onClick={() => {
                if (k.scope === "all") {
                  goProducts && goProducts({ assignTab: "assigned" });
                } else if (k.scope === "pending") {
                  goProducts && goProducts({ assignTab: "pending" });
                } else if (k.scope === "completed") {
                  goProducts && goProducts({ assignTab: "completed" });
                } else if (k.scope === "issues") {
                  if (isMasterOrAdminView) {
                    goIssues && goIssues();
                  } else {
                    goProducts && goProducts({ assignTab: "assigned", fQcVerdict: "issues" });
                  }
                }
              }}
              style={{ cursor: "pointer" }}
            >
                        
              <div className="kico">{k.ic({})}</div>
              <div className="lab">{k.lab}</div>
              <div className={"val" + (k.scope === "issues" && issueGlow ? " issue-card-badge" : "")} style={{ color: k.color || "var(--ink)" }}>{k.val}</div>
              <div className="sub">{k.sub}</div>
              <button
                onClick={(e) => { e.stopPropagation(); downloadKpiExcel(k.scope, k.lab.replace(/\s+/g, "_")); }}
                disabled={exporting === k.scope}
                title={`Download ${k.lab} as Excel`}
                style={{
                  position: "absolute", bottom: 12, right: 12,
                  fontSize: 10.5, fontWeight: 700, padding: "4px 9px", borderRadius: 7,
                  border: "1px solid var(--line2)", background: "var(--card-2)", color: "var(--sage-ink)",
                  display: "inline-flex", alignItems: "center", gap: 4
                }}
              >
                {exporting === k.scope ? "…" : "⬇ Excel"}
              </button>
            </div>
          ))}
        </div>

        <RecentlyAddedPanel products={allDivProducts || products} />

        <div className="sec ov-grid">
          <div className="card pad">
            <div className="sec-h" style={{ marginBottom: 6, alignItems: "center", flexWrap: "wrap", gap: 8 }}>
              <h3>Pipeline progress</h3>
              <div style={{ display: "flex", alignItems: "center", gap: 8, marginLeft: "auto", flexWrap: "wrap" }}>
                <select value={fVendor} onChange={e => setFVendor(e.target.value)} style={{ border: "1px solid var(--line2)", borderRadius: 8, padding: "6px 10px", background: "var(--card)", fontSize: 11.5, color: fVendor ? "var(--ink)" : "var(--muted)" }}>
                  <option value="">— all vendors —</option>
                  {vendorOptions.map(v => <option key={v} value={v}>{v}</option>)}
                </select>
                <select value={fSetNo} onChange={e => setFSetNo(e.target.value)} style={{ border: "1px solid var(--line2)", borderRadius: 8, padding: "6px 10px", background: "var(--card)", fontSize: 11.5, color: fSetNo ? "var(--ink)" : "var(--muted)" }}>
                  <option value="">— all set no. —</option>
                  {setNoOptions.map(s => <option key={s} value={s}>{s}</option>)}
                </select>
                {myTeam.length > 0 && (
                  <select
                    value={fMember}
                    onChange={e => setFMember(e.target.value)}
                    style={{
                      border: `1px solid ${fMember ? "var(--sky)" : "var(--line2)"}`,
                      borderRadius: 8, padding: "6px 10px",
                      background: fMember ? "var(--sky-bg)" : "var(--card)",
                      fontSize: 11.5, fontWeight: fMember ? 700 : 400,
                      color: fMember ? "var(--sky-ink)" : "var(--muted)",
                      minWidth: 200, cursor: "pointer"
                    }}
                  >
                    <option value="">— all my team —</option>
                    {groupedTeamOptions.map(g => (
                      <optgroup key={g.label} label={isMasterOrAdminView ? `👤 Under ${g.label}` : g.label}>
                        {g.members.map(m => (
                          <option key={m.id} value={m.id}>
                            {m.name}{m.id === myMemberId ? " (me)" : ""}
                          </option>
                        ))}
                      </optgroup>
                    ))}
                  </select>
                )}
                {hasFilters && <button className="ghost" style={{ padding: "6px 10px", fontSize: 11.5 }} onClick={() => { setFVendor(""); setFSetNo(""); setFMember(""); }}>Clear</button>}
                <span className="hint" style={{ whiteSpace: "nowrap" }}>manufacturing → listing → dispatch</span>
              </div>
            </div>
            {hasFilters && <div className="tag" style={{ marginBottom: 10 }}>Showing {filteredProducts.length} of {totalVal} {division} products{fVendor ? ` · vendor: ${fVendor}` : ""}{fSetNo ? ` · set no: ${fSetNo}` : ""}{fMember ? ` · member filter` : ""}</div>}
            {selectedMemberBreakdown && (
              <div style={{ marginBottom: 14, border: "1px solid var(--sky)", background: "var(--sky-bg)", borderRadius: 12, padding: "12px 16px" }}>
                <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 10, flexWrap: "wrap" }}>
                  <b style={{ fontSize: 13, color: "var(--sky-ink)" }}>{selectedMemberBreakdown.memberName}'s assigned work</b>
                  <span style={{ fontSize: 11.5, background: "var(--card)", border: "1px solid var(--line2)", borderRadius: 999, padding: "2px 10px", fontWeight: 600 }}>
                    {selectedMemberBreakdown.cardsAssigned} cards assigned
                  </span>
                  <span style={{ fontSize: 11.5, background: "var(--sage-bg)", color: "var(--sage-ink)", border: "1px solid var(--sage)", borderRadius: 999, padding: "2px 10px", fontWeight: 700 }}>
                    ✓ {selectedMemberBreakdown.cardsDone} done
                  </span>
                  <span style={{ fontSize: 11.5, background: "var(--peach-bg)", color: "var(--peach-ink)", border: "1px solid var(--peach)", borderRadius: 999, padding: "2px 10px", fontWeight: 700 }}>
                    ⏳ {selectedMemberBreakdown.cardsPending} pending
                  </span>
                </div>
                {selectedMemberBreakdown.perStage.length === 0 ? (
                  <div style={{ fontSize: 12, color: "var(--faint)" }}>No specific stages assigned to this member yet.</div>
                ) : (
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
                    {selectedMemberBreakdown.perStage.map(s => (
                      <div key={s.key} style={{ background: "var(--card)", border: "1px solid var(--line2)", borderRadius: 9, padding: "7px 12px", minWidth: 150 }}>
                        <div style={{ fontSize: 12, fontWeight: 700, marginBottom: 4 }}>{s.name}</div>
                        <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                          <span style={{ fontSize: 10.5, fontWeight: 700, color: "var(--sage-ink)" }}>✓ {s.completed}</span>
                          <span style={{ fontSize: 10.5, fontWeight: 700, color: "var(--sky-ink)" }}>… {s.inProgress}</span>
                          <span style={{ fontSize: 10.5, fontWeight: 700, color: "var(--muted)" }}>○ {s.notStarted}</span>
                          {s.issue > 0 && <span style={{ fontSize: 10.5, fontWeight: 700, color: "var(--rose-ink)" }}>! {s.issue}</span>}
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}
            <div style={{ overflowX: "auto" }}>
              <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
                <thead>
                  <tr>
                    <th style={{ textAlign: "left", padding: "8px 10px", color: "var(--muted)", fontWeight: 700, fontSize: 11, textTransform: "uppercase", letterSpacing: ".6px", borderBottom: "1px solid var(--line)", width: 180 }}>Stage</th>
                    <th style={{ textAlign: "center", padding: "8px 10px", color: "#B3AFA4", fontWeight: 700, fontSize: 11, textTransform: "uppercase", letterSpacing: ".6px", borderBottom: "1px solid var(--line)" }}>Not Started</th>
                    <th style={{ textAlign: "center", padding: "8px 10px", color: "var(--sky-ink)", fontWeight: 700, fontSize: 11, textTransform: "uppercase", letterSpacing: ".6px", borderBottom: "1px solid var(--line)" }}>In Progress</th>
                    <th style={{ textAlign: "center", padding: "8px 10px", color: "var(--sage-ink)", fontWeight: 700, fontSize: 11, textTransform: "uppercase", letterSpacing: ".6px", borderBottom: "1px solid var(--line)" }}>Completed</th>
                    <th style={{ textAlign: "center", padding: "8px 10px", color: "var(--rose-ink)", fontWeight: 700, fontSize: 11, textTransform: "uppercase", letterSpacing: ".6px", borderBottom: "1px solid var(--line)" }}>Issue</th>
                  </tr>
                </thead>
                <tbody>
                  {stageStats.map(s => {
                    // When a member is selected, use their own assigned-stage counts
                    // (computed in selectedMemberBreakdown) instead of the full pool.
                    const memberStage = fMember && selectedMemberBreakdown
                      ? selectedMemberBreakdown.perStage.find(x => x.key === s.k)
                      : null;
                    // DB-reconciled counts from /api/pipelineBreakdown — covers whole
                    // division, member-scoped, and vendor/set-no filtered cases alike.
                    // Falls back to client-computed counts until the fetch resolves.
                    const db = breakdownStats[s.k];
                    const notStarted = memberStage ? memberStage.notStarted : db ? db.notStarted : filteredProducts.filter(p => p.stages[s.k].status === "Not Started").length;
                    const inProgress = memberStage ? memberStage.inProgress : db ? db.inProgress : filteredProducts.filter(p => p.stages[s.k].status === "In Progress").length;
                    const completed = memberStage ? memberStage.completed : db ? db.completed : filteredProducts.filter(p => p.stages[s.k].status === "Completed").length;
                    const issue = memberStage ? memberStage.issue : (s.issue || 0);
                    return (
                      <tr key={s.k} style={{ borderBottom: "1px solid var(--line)" }}>
                        <td style={{ padding: "10px 10px", fontWeight: 600, fontSize: 13 }}>{s.n}</td>
                        <td style={{ textAlign: "center", padding: "10px 10px" }}>
                          {notStarted > 0
                            ? <span style={{ background: "#F0EEE8", color: "#8C887E", borderRadius: 999, padding: "3px 12px", fontWeight: 700, fontSize: 12 }}>{notStarted}</span>
                            : <span style={{ color: "var(--faint)" }}>—</span>}
                        </td>
                        <td style={{ textAlign: "center", padding: "10px 10px" }}>
                          {inProgress > 0
                            ? <span style={{ background: "var(--sky-bg)", color: "var(--sky-ink)", borderRadius: 999, padding: "3px 12px", fontWeight: 700, fontSize: 12 }}>{inProgress}</span>
                            : <span style={{ color: "var(--faint)" }}>—</span>}
                        </td>
                        <td style={{ textAlign: "center", padding: "10px 10px" }}>
                          {completed > 0
                            ? <span style={{ background: "var(--sage-bg)", color: "var(--sage-ink)", borderRadius: 999, padding: "3px 12px", fontWeight: 700, fontSize: 12 }}>{completed}</span>
                            : <span style={{ color: "var(--faint)" }}>—</span>}
                        </td>
                        <td style={{ textAlign: "center", padding: "10px 10px" }}>
                          {issue > 0
                            ? <span style={{ background: "var(--rose-bg)", color: "var(--rose-ink)", borderRadius: 999, padding: "3px 12px", fontWeight: 700, fontSize: 12 }}>{issue}</span>
                            : <span style={{ color: "var(--faint)" }}>—</span>}
                        </td>
                      </tr>
                    );
                  })}

                  <tr style={{ borderBottom: "1px solid var(--line)" }}>
                    <td style={{ padding: "10px 10px", fontWeight: 600, fontSize: 13 }}>QC Audit</td>
                    <td style={{ textAlign: "center", padding: "10px 10px" }}>
                      <span style={{ color: "var(--faint)" }}>—</span>
                    </td>
                    <td style={{ textAlign: "center", padding: "10px 10px" }}>
                      <span style={{ color: "var(--faint)" }}>—</span>
                    </td>
                    <td style={{ textAlign: "center", padding: "10px 10px" }}>
                      {filteredProducts.filter(p => p.verdict === "Approved").length > 0
                        ? <span style={{ background: "var(--sage-bg)", color: "var(--sage-ink)", borderRadius: 999, padding: "3px 12px", fontWeight: 700, fontSize: 12 }}>{filteredProducts.filter(p => p.verdict === "Approved").length}</span>
                        : <span style={{ color: "var(--faint)" }}>—</span>}
                    </td>
                    <td style={{ textAlign: "center", padding: "10px 10px" }}>
                      <span style={{ color: "var(--faint)" }}>—</span>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
          </div>

      <div className="sec ov-grid" style={!isMasterOrAdminView ? { gridTemplateColumns: "1fr" } : undefined}>
          {isMasterOrAdminView && (
            <div>
              <div className="sec-h"><h3>Store receipt status</h3><span className="hint">{STORES.length} stores</span></div>
              <div className="tbl-wrap">
                <table>
                  <thead><tr><th>Store</th><th className="num">Disp.</th><th className="num">Recv ✓</th><th className="num">Pending</th><th className="num">Miss</th><th className="num">Dmg</th><th>Status</th></tr></thead>
                  <tbody>{storeStats.map(r => (<tr key={r.st}><td><b>{r.st}</b></td><td className="num">{r.d}</td><td className="num">{r.r}</td><td className="num">{r.pending}</td><td className="num" style={{ color: r.m ? "var(--rose-ink)" : "inherit" }}>{r.m}</td><td className="num" style={{ color: r.dm ? "var(--rose-ink)" : "inherit" }}>{r.dm}</td><td>{(r.m || r.dm) ? <Chip status="Issue" /> : r.pending === 0 && r.d > 0 ? <Chip status="Completed" /> : r.d > 0 ? <Chip status="In Progress" /> : <Chip status="Not Started" />}</td></tr>))}</tbody>
                </table>
              </div>
            </div>
          )}
          <div className="card pad">
            <div className="sec-h" style={{ marginBottom: 6 }}><h3>Recent activity</h3></div>
            {recentActivityScoped.length === 0 ? <div className="tag" style={{ padding: "14px 0" }}>No activity yet.</div> :
            <div className="feed">{recentActivityScoped.slice(0, 9).map(a => (<div className="fi" key={a.id}><span className="fdot" /><div><div className="fmain"><b>{a.action}</b> — {a.entity}</div><div className="fmeta">{a.actor} · {fmt(a.at)}</div></div></div>))}</div>}
          </div>
        </div>
      </div>
    );
  }

  // Soothing ascending chime — used when a new card is added (~2.6s)
  function playBellSound() {
    try {
      const AudioCtx = window.AudioContext || window.webkitAudioContext;
      const ctx = new AudioCtx();
      const notes = [523.25, 659.25, 783.99, 1046.5]; // C5 E5 G5 C6
      notes.forEach((freq, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = "sine";
        osc.frequency.value = freq;
        osc.connect(gain);
        gain.connect(ctx.destination);
        const start = ctx.currentTime + i * 0.22;
        gain.gain.setValueAtTime(0, start);
        gain.gain.linearRampToValueAtTime(0.3, start + 0.05);
        gain.gain.exponentialRampToValueAtTime(0.001, start + 1.4);
        osc.start(start);
        osc.stop(start + 1.4);
      });
      setTimeout(() => ctx.close(), 2800);
    } catch (e) { console.warn("bell sound failed", e); }
  }

  // Distinct, gentle-but-alerting descending tone — used when a NEW issue appears (~2.6s)
  function playIssueSound() {
    try {
      const AudioCtx = window.AudioContext || window.webkitAudioContext;
      const ctx = new AudioCtx();
      const notes = [440, 349.23, 293.66]; // A4 -> F4 -> D4, descending
      notes.forEach((freq, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = "triangle";
        osc.frequency.value = freq;
        osc.connect(gain);
        gain.connect(ctx.destination);
        const start = ctx.currentTime + i * 0.32;
        gain.gain.setValueAtTime(0, start);
        gain.gain.linearRampToValueAtTime(0.32, start + 0.03);
        gain.gain.exponentialRampToValueAtTime(0.001, start + 0.85);
        osc.start(start);
        osc.stop(start + 0.85);
      });
      setTimeout(() => ctx.close(), 2800);
    } catch (e) { console.warn("issue sound failed", e); }
  }
