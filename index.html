  const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwhvIeomL6wiBH_3LgbskV__BNy0j_w1BlOBVz53oLZa2LRTD1aH79zeXPbsNCqYAE/exec";

  async function apiPost(action, payload) {
    try {
      const r = await fetch(APPS_SCRIPT_URL, {
        method: "POST",
        redirect: "follow",
        headers: { "Content-Type": "text/plain" },
        body: JSON.stringify({ action, payload })
      });
      const text = await r.text();
      try {
        const json = JSON.parse(text);
        if (json.error) console.error("API error:", json.error, "| action:", action);
        return json;
      } catch (e) {
        console.error("Non-JSON response for action:", action, "| body:", text.slice(0, 300));
        return { error: text };
      }
    } catch (e) {
      console.error("Fetch failed for action:", action, e);
      return { error: e.message };
    }
  }

      const text = await r.text();
      try { return JSON.parse(text); }
      catch (e) { console.error("getAll parse error:", text.slice(0, 300)); return { products: [], audit: [], vendors: {} }; }
    } catch (e) {
      console.error("getAll fetch failed:", e);
      return { products: [], audit: [], vendors: {} };
    }
  }


  /* ---------- utils ---------- */
  const now = () => new Date().toISOString();
  const uid = () => Math.random().toString(36).slice(2, 9);
  function fmt(iso) {
    if (!iso) return "—"; const d = new Date(iso);
    return d.toLocaleString("en-IN", { day: "2-digit", month: "short", year: "2-digit", hour: "2-digit", minute: "2-digit" });
  }
  function statusClass(s) { return s === "Completed" ? "c-done" : s === "In Progress" ? "c-prog" : s === "Issue" ? "c-issue" : "c-none"; }
  function normStatus(v) {
    const m = {
      "not started": "Not Started", "notstarted": "Not Started", "in progress": "In Progress", "inprogress": "In Progress",
      "progress": "In Progress", "wip": "In Progress", "pending": "In Progress", "completed": "Completed", "complete": "Completed",
      "done": "Completed", "approved": "Completed", "issue": "Issue", "issues": "Issue", "error": "Issue"
    };
    return m[String(v).trim().toLowerCase()] || null;
  }
  function normBool(v) { return /^(y|yes|true|1|received|recd|done|✓|x)$/i.test(String(v).trim()); }
  function normDate(v) {
    if (v instanceof Date && !isNaN(v)) return v.toISOString().slice(0, 10);
    if (typeof v === "number") { const d = new Date(Date.UTC(1899, 11, 30) + v * 86400000); return d.toISOString().slice(0, 10); }
    return String(v).trim();
  }
  function fieldFromProduct(p, h) {
    if (["division", "sku", "name", "vendor", "inward", "qty", "note"].includes(h)) return p[h] ?? "";
    if (h === "qc_verdict") return p.verdict || "";
    if (h === "qc_issues") return p.issues || "";
    const mm = h.match(/^(.+)_(status|person|comments)$/);
    if (mm && p.stages[mm[1]]) return p.stages[mm[1]][mm[2]] || "";
    return "";
  }
  const PROD_HEADERS = (() => {
    const h = ["division", "sku", "name", "vendor", "inward", "qty", "note"];
    STAGE_COLS.forEach(s => h.push(s.k + "_status", s.k + "_person", s.k + "_comments")); h.push("qc_verdict", "qc_issues"); return h;
  })();
  const STORE_HEADERS = ["division", "sku", "store", "dispatched", "received", "missing", "damaged", "notes"];
  function blankProduct(division, vendor) {
    const stages = {}; STAGES.forEach(s => stages[s.k] = { status: "Not Started", person: "", comments: "", at: "" });
    const stores = {}; STORES.forEach(st => stores[st] = { dispatched: 0, received: false, receivedAt: "", receivedBy: "", missing: 0, damaged: 0, notes: "", at: "" });
    return {
      id: uid(), division, sku: "", name: "", vendor: vendor || "", inward: "", qty: 0, note: "",
      stages, stores, verdict: "", issues: "", createdAt: now(), updatedAt: now()
    };
  }

  /* ---------- small components ---------- */
  function Chip({ status }) { return <span className={"chip " + statusClass(status)}><span className="dot" />{status}</span>; }
  function Progress({ pct }) { return <div className="bar"><i style={{ width: pct + "%" }} /></div>; }

  function productPct(p) {
    const done = STAGES.filter(s => p.stages[s.k]?.status === "Completed").length;
    return Math.round(done / STAGES.length * 100);
  }
  /* ============================================================= */
  function App() {
    const [loading, setLoading] = useState(true);
    const [syncing, setSyncing] = useState(false);
    const [savingCount, setSavingCount] = useState(0);
    const [syncOk, setSyncOk] = useState(false);
    const [division, setDivision] = useState("KOC Cards");
    const [tab, setTab] = useState("overview");
    const [operator, setOperator] = useState("");
    const [loginEmail, setLoginEmail] = useState("");
    const currentUser = USERS[loginEmail] || null;
    const [products, setProducts] = useState([]);
    const [audit, setAudit] = useState([]);
    const [vendors, setVendors] = useState(DEFAULT_VENDORS);

    const load = useCallback(async () => {
      if (savingCount > 0) return; // don't overwrite mid-save
      setSyncing(true);
      setSyncing(true);
      const data = await apiGet();
      if (data.products) {
        const patched = data.products.map(p => {
          const stages = { ...p.stages };
          STAGES.forEach(s => {
            if (!stages[s.k]) {
              stages[s.k] = { status: "Not Started", person: "", comments: "", at: "" };
            }
          });
          const stores = { ...p.stores };
          STORES.forEach(st => {
            if (!stores[st]) {
              stores[st] = { dispatched: 0, received: false, receivedAt: "", receivedBy: "", missing: 0, damaged: 0, notes: "", at: "" };
            }
          });
          return { ...p, stages, stores };
        });
        setProducts(patched);
        setAudit(data.audit || []);
        setVendors(data.vendors && Object.keys(data.vendors).length > 0
           ? data.vendors
           : DEFAULT_VENDORS
        );
      }
      const op = await sget("ct:operator");
      if (op) setOperator(op);
      setLoading(false);
      setSyncing(false);
      setSyncOk(true);
      setTimeout(() => setSyncOk(false), 2000);
    }, []);
    useEffect(() => {
      load();
      const iv = setInterval(load, 30000);
      return () => clearInterval(iv);
    }, [load]);
    // useEffect(() => { load(); }, [load]);

    const logAudit = useCallback(async (action, entity, detail) => {
      const entry = { id: uid(), at: now(), actor: operator || "Unattributed", action, entity, detail, division };
      setAudit(prev => [entry, ...prev].slice(0, 800));
      apiPost("appendAudit", entry); // fire-and-forget
    }, [operator, division]);

    const upsertProduct = useCallback(async (prod, isNew) => {
      prod.updatedAt = now();
      const next = isNew ? [prod, ...products] : products.map(x => x.id === prod.id ? prod : x);
      setProducts(next);
      setSavingCount(c => c + 1);
      await apiPost("upsertProduct", prod);
      setSavingCount(c => c - 1);
      logAudit(isNew ? "Added product" : "Edited product", prod.sku || prod.name || "product",
        `${prod.name || "(unnamed)"} · ${prod.vendor || "no vendor"} · qty ${prod.qty}`);
    }, [products, logAudit]);

    const patchStage = useCallback(async (pid, stageKey, patch) => {
      const next = products.map(p => {
        if (p.id !== pid) return p;
        const stages = { ...p.stages, [stageKey]: { ...p.stages[stageKey], ...patch, at: now() } };
        return { ...p, stages, updatedAt: now() };
      });
      setProducts(next);
      const updated = next.find(x => x.id === pid);
      setSavingCount(c => c + 1);
      await apiPost("upsertProduct", updated);
      setSavingCount(c => c - 1);
      const sn = STAGES.find(s => s.k === stageKey).n;
      logAudit("Stage update", `${updated.name || updated.sku || "product"}`, `${sn} → ${patch.status || updated.stages[stageKey].status}${patch.person ? (" · " + patch.person) : ""}`);
    }, [products, logAudit]);

    const patchQC = useCallback(async (pid, patch) => {
      const next = products.map(p => p.id === pid ? { ...p, ...patch, updatedAt: now() } : p);
      setProducts(next);
      const updated = next.find(x => x.id === pid);
      setSavingCount(c => c + 1);
      await apiPost("upsertProduct", updated);
      setSavingCount(c => c - 1);
      logAudit("Final audit", `${updated.name || updated.sku || "product"}`, `Verdict: ${patch.verdict || updated.verdict || "—"}`);
    }, [products, logAudit]);

    const removeProduct = useCallback(async (pid) => {
      const p = products.find(x => x.id === pid);
      setProducts(products.filter(x => x.id !== pid));
      await apiPost("deleteProduct", { id: pid });
      logAudit("Deleted product", `${p?.name || p?.sku || "product"}`, p?.vendor || "");
    }, [products, logAudit]);

    const addVendor = useCallback(async (div, name) => {
      if (!name) return;
      const list = vendors[div] || []; if (list.includes(name)) return;
      const next = { ...vendors, [div]: [...list, name].sort() };
      setVendors(next);
      await apiPost("setVendors", next);
    }, [vendors]);

    const saveOperator = async (v) => { setOperator(v); await sset("ct:operator", v); };

    const handleLogin = async (email) => {
      setLoginEmail(email);
      if (email && (!operator || !operator.trim())) {
        await saveOperator(email);
      }
    };

    const bulkProducts = useCallback(async (rows, uploadedBy) => {
      let created = 0, updated = 0; const errs = []; const newV = new Set();
      let next = [...products]; const changed = [];
      rows.forEach((row, i) => {
        const sku = String(row.sku || "").trim();
        if (!sku || sku.toUpperCase().includes("EXAMPLE")) return;
        const div = DIVISIONS.includes(String(row.division || "").trim()) ? String(row.division).trim() : division;
        let existing = next.find(p => p.division === div && p.sku.toLowerCase() === sku.toLowerCase());
        let prod, isNew = false;
        // if (existing) { prod = { ...existing, stages: { ...existing.stages } }; }
        if (existing) {
          prod = {
            ...existing,
            stages: Object.fromEntries(
              Object.entries(existing.stages).map(([k, v]) => [k, { ...v }])
            ),
            stores: Object.fromEntries(
              Object.entries(existing.stores).map(([k, v]) => [k, { ...v }])
            )
          };
        }
        else { prod = blankProduct(div, ""); prod.sku = sku; isNew = true; }
        const g = (k) => row[k] !== "" && row[k] != null;
        if (g("name")) prod.name = String(row.name).trim();
        if (g("vendor")) { prod.vendor = String(row.vendor).trim(); if (!(vendors[div] || []).includes(prod.vendor)) newV.add(div + "|" + prod.vendor); }
        if (g("inward")) prod.inward = normDate(row.inward);
        if (g("qty") && !isNaN(+row.qty)) prod.qty = +row.qty;
        if (g("note")) prod.note = String(row.note).trim();
        STAGE_COLS.forEach(s => {
          const k = s.k; let touched = false; const cur = { ...prod.stages[k] };
          const st = row[k + "_status"], pe = row[k + "_person"], co = row[k + "_comments"];
          if (st !== "" && st != null) { const ns = normStatus(st); if (ns) { cur.status = ns; touched = true; } else errs.push(`Row ${i + 2}: invalid status "${st}" in ${k}_status`); }
          if (pe !== "" && pe != null) { cur.person = String(pe).trim(); touched = true; }
          if (co !== "" && co != null) { cur.comments = String(co).trim(); touched = true; }
          if (touched) { cur.at = now(); prod.stages[k] = cur; }
        });
        if (g("qc_verdict")) { const v = String(row.qc_verdict).trim(); if (/appro/i.test(v)) prod.verdict = "Approved"; else if (/issue/i.test(v)) prod.verdict = "Issues Found"; }
        if (g("qc_issues")) prod.issues = String(row.qc_issues).trim();
        prod.updatedAt = now();
        if (isNew) { next = [prod, ...next]; created++; } else { next = next.map(p => p.id === prod.id ? prod : p); updated++; }
        changed.push(prod);
      });
      setProducts(next);
      // Send all products in ONE request instead of N separate ones
      await apiPost("batchUpsertProducts", changed);
      newV.forEach(s => { const [d, n] = s.split("|"); addVendor(d, n); });
      logAudit("Bulk import", `${created + updated} products`,
        `${created} created, ${updated} updated · uploaded by ${uploadedBy || operator || "unknown"}${errs.length ? ` · ${errs.length} field errors` : ""}`);
      return { created, updated, errs };
    }, [products, division, vendors, addVendor, logAudit]);

    const bulkStores = useCallback(async (rows) => {
      let updated = 0; const errs = []; let next = [...products]; const changedStores = [];
      rows.forEach((row, i) => {
        const sku = String(row.sku || "").trim();
        if (!sku || sku.toUpperCase().includes("EXAMPLE")) return;
        const div = DIVISIONS.includes(String(row.division || "").trim()) ? String(row.division).trim() : division;
        const store = String(row.store || "").trim();
        if (!STORES.includes(store)) { errs.push(`Row ${i + 2}: unknown store "${store}"`); return; }
        const existing = next.find(p => p.division === div && p.sku.toLowerCase() === sku.toLowerCase());
        if (!existing) { errs.push(`Row ${i + 2}: product "${sku}" not found in ${div}`); return; }
        const np = { ...existing, stores: { ...existing.stores } }; const s = { ...np.stores[store] };
        const g = (k) => row[k] !== "" && row[k] != null;
        if (g("dispatched") && !isNaN(+row.dispatched)) s.dispatched = +row.dispatched;
        if (g("missing") && !isNaN(+row.missing)) s.missing = +row.missing;
        if (g("damaged") && !isNaN(+row.damaged)) s.damaged = +row.damaged;
        if (g("notes")) s.notes = String(row.notes).trim();
        if (g("received")) {
          const rv = normBool(row.received);
          if (rv && !s.received) { s.received = true; s.receivedAt = now(); s.receivedBy = operator || "bulk"; }
          else if (!rv) { s.received = false; } else { s.received = true; }
        }
        s.at = now(); np.stores[store] = s; np.updatedAt = now();
        next = next.map(p => p.id === np.id ? np : p);
        changedStores.push({ productId: np.id, store, storeData: s, division: div, sku });
        updated++;
      });
      setProducts(next);
      await apiPost("batchUpsertStores", changedStores);
      logAudit("Bulk store import", `${updated} store rows`, errs.length ? `${errs.length} errors` : "ok");
      return { updated, errs };
    }, [products, division, operator, logAudit]);

    const divProducts = useMemo(() => products.filter(p => p.division === division), [products, division]);
    useEffect(() => {
      if ((tab === "bulk" || tab === "audit") && !hasPermission(currentUser, "all")) setTab("overview");
    }, [tab, currentUser]);

    if (loading) return <div className="empty serif" style={{ paddingTop: 120, fontSize: 18 }}>Loading workspace…</div>;
    if (!currentUser) return <LoginScreen onLogin={handleLogin} />;

    return (
      <div>
        <div className="top"><div className="top-in">
          <div className="brand"><b>Card Tracker</b></div>
          <div className="spacer" />
          <span className="tag">{loginEmail} · {currentUser.role}</span>
          <button className="ghost" onClick={() => handleLogin("")}>Switch user</button>
          <button className="ghost" onClick={load} disabled={syncing}
            style={{
              color: syncOk ? "var(--sage-ink)" : undefined,
              borderColor: syncOk ? "var(--sage)" : undefined
            }}>
            {syncing ? "Syncing…" : syncOk ? "✓ Synced" : "↻ Sync"}
          </button>
        </div></div>

        <div className="body-shell">
          <div className="sidebar">
            {DIVISIONS.map(d => (
              <button key={d} className={division === d ? "on" : ""} onClick={() => setDivision(d)}>{d}</button>
            ))}
          </div>

          <div className="wrap">
            <div className="tabs">
              {[["overview", "Overview"], ["products", "Products & Pipeline"], ["bulk", "Bulk Upload"], ["audit", "Audit Log"]]
                .filter(([k]) => (k === "bulk" || k === "audit") ? hasPermission(currentUser, "all") : true)
                .map(([k, n]) => (
                  <button key={k} className={tab === k ? "on" : ""} onClick={() => setTab(k)}>{n}</button>
                ))}
            </div>

            {tab === "overview" && <Overview division={division} products={divProducts} />}
            {tab === "products" && <Products division={division} products={divProducts} vendors={vendors[division] || []} currentUser={currentUser}
              onUpsert={upsertProduct} onStage={patchStage} onQC={patchQC} onRemove={removeProduct} addVendor={addVendor} />}
            {tab === "bulk" && <Bulk division={division} products={products} divProducts={divProducts} bulkProducts={bulkProducts} bulkStores={bulkStores} operator={operator} />}
            {tab === "audit" && <AuditLog audit={audit.filter(a => a.division === division)} />}
          </div>
        </div>
      </div>
    );
  }

  /* ---------------- LOGIN ---------------- */
  function LoginScreen({ onLogin }) {
    const [email, setEmail] = useState("");
    const [password, setPassword] = useState("");
    const [err, setErr] = useState("");
    const submit = () => {
      const key = Object.keys(USERS).find(k => k.toLowerCase() === email.trim().toLowerCase());
      if (!key) { setErr("Unknown email."); return; }
      if (USERS[key].password !== password) { setErr("Incorrect password."); return; }
      setErr(""); onLogin(key);
    };
    return (
      <div className="wrap" style={{ display: "grid", placeItems: "center", minHeight: "100vh" }}>
        <div className="card pad" style={{ width: "min(380px, 100%)" }}>
          <div className="brand" style={{ marginBottom: 18 }}>
            <b className="serif" style={{ fontSize: 20 }}>Card Tracker</b>
          </div>
          <label className="fld" style={{ marginBottom: 12 }}>Email
            <input className="txt" type="email" value={email} placeholder="you@kingofcards.in"
              onChange={e => { setEmail(e.target.value); setErr(""); }}
              onKeyDown={e => { if (e.key === "Enter") submit(); }} />
          </label>
          <label className="fld" style={{ marginBottom: 14 }}>Password
            <input className="txt" type="password" value={password} placeholder="password"
              onChange={e => { setPassword(e.target.value); setErr(""); }}
              onKeyDown={e => { if (e.key === "Enter") submit(); }} />
          </label>
          {err && <div className="alert" style={{ borderColor: "var(--rose)" }}><div className="ic">!</div><div className="tx">{err}</div></div>}
          <button className="primary" style={{ width: "100%" }} disabled={!email || !password} onClick={submit}>Log in</button>
        </div>
      </div>
    );
  }

  /* ---------------- OVERVIEW ---------------- */
  function Overview({ division, products }) {
    const total = products.length;
    const fullyDone = products.filter(p => productPct(p) === 100).length;
    const inProd = products.filter(p => { const v = productPct(p); return v > 0 && v < 100; }).length;
    const notStarted = products.filter(p => productPct(p) === 0).length;
    const stageStats = STAGES.map(s => ({
      ...s,
      done: products.filter(p => p.stages[s.k].status === "Completed").length,
      issue: products.filter(p => p.stages[s.k].status === "Issue").length
    }));

    return (
      <div>
        <div className="grid kpis">
          <div className="card kpi"><div className="lab">Products</div><div className="val">{total}</div><div className="sub">{division}</div></div>
          <div className="card kpi"><div className="lab">Listing Complete</div><div className="val" style={{ color: "var(--sage-ink)" }}>{fullyDone}</div><div className="sub">all stages done</div></div>
          <div className="card kpi"><div className="lab">In Production</div><div className="val" style={{ color: "var(--sky-ink)" }}>{inProd}</div><div className="sub">{notStarted} not started</div></div>
        </div>

        <div className="sec">
          <div className="sec-h"><h3>Pipeline progress</h3><span className="hint">manufacturing → listing</span></div>
          <div className="card pad">
            {stageStats.map(s => (
              <div className="stagebar" key={s.k}>
                <div className="nm">{s.n}{s.issue > 0 && <span className="tag" style={{ color: "var(--rose-ink)" }}> · {s.issue} issue</span>}</div>
                <div className="meter"><Progress pct={total ? Math.round(s.done / total * 100) : 0} /></div>
                <div className="pc">{s.done}/{total} done</div>
              </div>
            ))}
          </div>
        </div>
      </div>
    );
  }

  /* ---------------- PRODUCTS ---------------- */
  function Products({ division, products, vendors, currentUser, onUpsert, onStage, onQC, onRemove, addVendor }) {
    const [q, setQ] = useState("");
    const [open, setOpen] = useState({});
    const [modal, setModal] = useState(false);
    const canAdd = hasPermission(currentUser, "all");
    const filtered = products.filter(p => {
      const t = (p.sku + " " + p.name + " " + p.vendor).toLowerCase(); return t.includes(q.toLowerCase());
    });
    return (
      <div>
        <div className="toolbar">
          <div className="search"><input placeholder="Search SKU, product or vendor…" value={q} onChange={e => setQ(e.target.value)} /></div>
          {canAdd && <button className="primary" onClick={() => setModal(true)}>+ Add product</button>}
        </div>
        {filtered.length === 0 ? <div className="card empty">No products yet for {division}. Add your first SKU to begin tracking its full pipeline.</div> :
          <div className="plist">
            {filtered.map(p => (
              <ProductRow key={p.id} p={p} open={!!open[p.id]} toggle={() => setOpen(o => ({ ...o, [p.id]: !o[p.id] }))}
                currentUser={currentUser} onStage={onStage} onQC={onQC} onRemove={onRemove} />
            ))}
          </div>}
        <div className="legend">
          {STATUSES.map(s => <span key={s}><Chip status={s} /></span>)}
        </div>
        {modal && <AddModal division={division} vendors={vendors} addVendor={addVendor}
          onClose={() => setModal(false)} onSave={(prod) => { onUpsert(prod, true); setModal(false); }} />}
      </div>
    );
  }

  function ProductRow({ p, open, toggle, currentUser, onStage, onQC, onRemove }) {
    const pct = productPct(p);
    const hasIssue = STAGES.some(s => p.stages[s.k].status === "Issue");
    const canDelete = hasPermission(currentUser, "all");
    return (
      <div className="prow">
        <div className="phead" onClick={toggle}>
          <span className={"chev " + (open ? "open" : "")}>▶</span>
          <span className="psku">{p.sku || "no-sku"}</span>
          <span className="pname">{p.name || "(unnamed)"}</span>
          <span className="pvend">· {p.vendor || "—"} · {p.qty || 0} cards</span>
          <div className="spacer" style={{ flex: 1 }} />
          {hasIssue && <Chip status="Issue" />}
          {p.verdict === "Approved" && <span className="chip c-done"><span className="dot" />QC Approved</span>}
          <div className="pprog"><Progress pct={pct} /></div>
          <span className="tag" style={{ width: 38, textAlign: "right" }}>{pct}%</span>
        </div>
        {open && (
          <div className="pbody">
            {STAGES.map(s => {
              if (s.k === "website") return null; // Website Listing (Shopify) stage hidden per request
              return s.k === "qc"
                ? <QCStage key={s.k} p={p} currentUser={currentUser} onQC={onQC} />
                : <StageEditor key={s.k} p={p} stage={s} currentUser={currentUser} onStage={onStage} />;
            })}
            <div style={{ padding: "12px 14px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <span className="tag">Inward {p.inward || "—"} · created {fmt(p.createdAt)} · last update {fmt(p.updatedAt)}</span>
              {canDelete && <button className="danger" onClick={() => { if (confirm("Delete this product?")) onRemove(p.id); }}>Delete product</button>}
            </div>
          </div>
        )}
      </div>
    );
  }

  function StageEditor({ p, stage, currentUser, onStage }) {
    const cur = p.stages[stage.k] || { status: "Not Started", person: "", comments: "", at: "" };
    const [status, setStatus] = useState(cur.status);
    const [person, setPerson] = useState(cur.person);
    const [comments, setComments] = useState(cur.comments);
    const [width, setWidth] = useState(cur.width || "");
    const [height, setHeight] = useState(cur.height || "");
    const [depth, setDepth] = useState(cur.depth || "");
    const [saved, setSaved] = useState(false);
    const prevSaved = useRef({});

    useEffect(() => {
      const saved = {
        status: cur.status, person: cur.person, comments: cur.comments,
        width: cur.width || "", height: cur.height || "", depth: cur.depth || ""
      };
      const prev = prevSaved.current;
      if (
        prev.status !== saved.status || prev.person !== saved.person ||
        prev.comments !== saved.comments || prev.width !== saved.width ||
        prev.height !== saved.height || prev.depth !== saved.depth
      ) {
        prevSaved.current = saved;
        setStatus(saved.status);
        setPerson(saved.person);
        setComments(saved.comments);
        setWidth(saved.width);
        setHeight(saved.height);
        setDepth(saved.depth);
      }
    }, [cur.status, cur.person, cur.comments, cur.width, cur.height, cur.depth]);
    const dirty = status !== cur.status || person !== cur.person || comments !== cur.comments
      || width !== (cur.width || "") || height !== (cur.height || "") || depth !== (cur.depth || "");
    const canEdit = hasPermission(currentUser, STAGE_PERMISSION_MAP[stage.k]);
    const save = () => {
      const patch = { status, person, comments };
      if (stage.k === "dimensions") { patch.width = width; patch.height = height; patch.depth = depth; }
      onStage(p.id, stage.k, patch);
      setSaved(true); setTimeout(() => setSaved(false), 1400);
    };
    return (
      <div className="stage">
        <div className="lab">{stage.n}</div>
        <label className="fld">Status
          <select value={status} disabled={!canEdit} onChange={e => setStatus(e.target.value)}>
            {STATUSES.map(s => <option key={s}>{s}</option>)}
          </select>
        </label>
        <label className="fld">Responsible · comments
          <input className="txt" placeholder="person" value={person} disabled={!canEdit} onChange={e => setPerson(e.target.value)} style={{ marginBottom: 6 }} />
          <input className="txt" placeholder="comments (e.g. 27 of 30 cards)" value={comments} disabled={!canEdit} onChange={e => setComments(e.target.value)} />
          {stage.k === "dimensions" && (
            <div style={{ display: "flex", gap: 8, marginTop: 6 }}>
              <input className="txt" placeholder="Width (cm)" value={width} disabled={!canEdit}
                onChange={e => setWidth(e.target.value)} />
              <input className="txt" placeholder="Height (cm)" value={height} disabled={!canEdit}
                onChange={e => setHeight(e.target.value)} />
              <input className="txt" placeholder="Weight (g)" value={depth} disabled={!canEdit}
                onChange={e => setDepth(e.target.value)} />
            </div>
          )}
        </label>
        <button className={"mini " + (saved ? "saved" : "")} disabled={!canEdit || (!dirty && !saved)} onClick={save}>{saved ? "Saved ✓" : "Save"}</button>
        <div className="meta">{cur.at ? `Last set ${fmt(cur.at)}${cur.person ? (" by " + cur.person) : ""}` : "Not yet updated"}</div>
      </div>
    );
  }

  function QCStage({ p, currentUser, onQC }) {
    const [verdict, setVerdict] = useState(p.verdict || "");
    const [issues, setIssues] = useState(p.issues || "");
    const [saved, setSaved] = useState(false);
    useEffect(() => { setVerdict(p.verdict || ""); setIssues(p.issues || ""); }, [p.verdict, p.issues]);
    const dirty = verdict !== (p.verdict || "") || issues !== (p.issues || "");
    const canEdit = hasPermission(currentUser, STAGE_PERMISSION_MAP.qc);
    const save = () => { onQC(p.id, { verdict, issues }); setSaved(true); setTimeout(() => setSaved(false), 1400); };
    return (
      <div className="stage" style={{ background: "var(--surface)" }}>
        <div className="lab">Final QC / Audit</div>
        <label className="fld">Verdict
          <select value={verdict} disabled={!canEdit} onChange={e => setVerdict(e.target.value)}>
            <option value="">— pending review —</option>
            <option>Approved</option>
            <option>Issues Found</option>
          </select>
        </label>
        <label className="fld">Auditor notes / issues after final audit
          <textarea placeholder="e.g. colour difference on 3 cards, content typo…" value={issues} disabled={!canEdit} onChange={e => setIssues(e.target.value)} />
        </label>
        <button className={"mini " + (saved ? "saved" : "")} disabled={!canEdit || (!dirty && !saved)} onClick={save}>{saved ? "Saved ✓" : "Save"}</button>
      </div>
    );
  }

  function AddModal({ division, vendors, addVendor, onClose, onSave }) {
    const [f, setF] = useState(() => blankProduct(division, ""));
    const [newVendor, setNewVendor] = useState("");
    const set = (k, v) => setF(p => ({ ...p, [k]: v }));
    const showVendor = true;
    return (
      <div className="scrim" onClick={onClose}>
        <div className="modal" onClick={e => e.stopPropagation()}>
          <h3 className="serif">New product · {division}</h3>
          <div className="mbody">
            <div className="mrow">
              <label className="fld">SKU / Barcode<input className="txt" value={f.sku} onChange={e => set("sku", e.target.value)} placeholder="e.g. KOC-00142" /></label>
              <label className="fld">Card quantity<input className="txt" type="number" value={f.qty} onChange={e => set("qty", +e.target.value)} /></label>
            </div>
            <label className="fld">Product name<input className="txt" value={f.name} onChange={e => set("name", e.target.value)} placeholder="design / card name" /></label>
            {showVendor ? (
              <div className="mrow">
                <label className="fld">Vendor
                  <select value={f.vendor} onChange={e => set("vendor", e.target.value)}>
                    <option value="">— select —</option>
                    {vendors.map(v => <option key={v}>{v}</option>)}
                  </select>
                </label>
                <label className="fld">Inward date<input className="txt" type="date" value={f.inward} onChange={e => set("inward", e.target.value)} /></label>
              </div>
            ) : (
              <label className="fld">Inward date<input className="txt" type="date" value={f.inward} onChange={e => set("inward", e.target.value)} /></label>
            )}
            {showVendor && (
              <div className="mrow">
                <label className="fld">Add a new vendor
                  <input className="txt" value={newVendor} onChange={e => setNewVendor(e.target.value)} placeholder="vendor name" />
                </label>
                <button className="ghost" style={{ alignSelf: "end" }} onClick={() => { addVendor(division, newVendor.trim()); set("vendor", newVendor.trim()); setNewVendor(""); }}>Add vendor</button>
              </div>
            )}
            <label className="fld">Note (optional)<textarea value={f.note} onChange={e => set("note", e.target.value)} placeholder="old/new split, set number, etc." /></label>
          </div>
          <div className="mfoot">
            <button className="ghost" onClick={onClose}>Cancel</button>
            <button className="primary" onClick={() => onSave(f)}>Create product</button>
          </div>
        </div>
      </div>
    );
  }

  /* ---------------- BULK UPLOAD ---------------- */
  function makeWorkbook(headers, dataRows, sheetName, instructions) {
    const aoa = [headers, ...dataRows];
    const ws = XLSX.utils.aoa_to_sheet(aoa);
    ws["!cols"] = headers.map(h => ({ wch: Math.max(12, Math.min(h.length + 4, 24)) }));
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, sheetName);
    if (instructions) { XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(instructions), "Instructions"); }
    return wb;
  }
  function readSheet(file, cb) {
    const isCsv = /\.csv$/i.test(file.name);
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const wb = isCsv ? XLSX.read(e.target.result, { type: "string" })
          : XLSX.read(new Uint8Array(e.target.result), { type: "array", cellDates: true });
        const sn = wb.SheetNames.find(n => /product|store|template|data/i.test(n)) || wb.SheetNames[0];
        const rows = XLSX.utils.sheet_to_json(wb.Sheets[sn], { defval: "" });
        cb(rows, null);
      } catch (err) { cb(null, err.message); }
    };
    if (isCsv) reader.readAsText(file); else reader.readAsArrayBuffer(file);
  }

  function Bulk({ division, products, divProducts, bulkProducts, bulkStores, operator }) {
    const downloadProductTemplate = (withData) => {
      const ex1 = PROD_HEADERS.map(h => {
        const v = {
          division: division, sku: "EXAMPLE-001 (delete this row)", name: "Sample design", vendor: (DEFAULT_VENDORS[division] || [])[0] || "Vendor name",
          inward: "2026-06-01", qty: 30, note: "old/new split etc", barcoding_status: "Completed", barcoding_person: "Vijaya",
          content_status: "In Progress", photography_status: "Not Started", qc_verdict: "", qc_issues: ""
        };
        return v[h] !== undefined ? v[h] : "";
      });
      const ex2 = PROD_HEADERS.map(h => h === "sku" ? "EXAMPLE-002 (delete this row)" : h === "division" ? division : h === "name" ? "Another design" : h === "qty" ? 12 : "");
      const data = withData ? divProducts.map(p => PROD_HEADERS.map(h => fieldFromProduct(p, h))) : [ex1, ex2];
      const instr = [
        ["How to use the Products & Pipeline sheet"],
        [""],
        ["1. One row = one product / SKU. The 'sku' column is the key and must be unique within a division."],
        ["2. Re-uploading a file UPDATES products that already exist (matched on division + sku) and CREATES any new ones."],
        ["3. Leave a cell BLANK to keep the existing value. Only filled cells are written — nothing gets wiped."],
        ["4. Allowed division values: " + DIVISIONS.join(" / ") + ". If blank, the currently selected division is used."],
        ["5. Allowed *_status values: " + STATUSES.join(", ") + " (also accepts done/complete/pending — auto-mapped)."],
        ["6. Each stage has three columns: <stage>_status, <stage>_person, <stage>_comments."],
        ["7. Stages, in order: " + STAGE_COLS.map(s => s.n).join(" → ") + "."],
        ["8. qc_verdict accepts: Approved / Issues Found. qc_issues is free text for the auditor."],
        ["9. inward date format: YYYY-MM-DD (e.g. 2026-06-01)."],
        ["10. Delete the EXAMPLE rows before uploading. Rows with a blank sku are ignored."],
        ["11. Tip: use 'Export current products' to download everything as-is, edit in Excel, then re-upload."],
      ];
      XLSX.writeFile(makeWorkbook(PROD_HEADERS, data, "Products", instr), withData ? "card_products_export.xlsx" : "card_products_template.xlsx");
    };
    const downloadStoreTemplate = (withData) => {
      const ex1 = STORE_HEADERS.map(h => ({ division: division, sku: "EXAMPLE-001 (delete this row)", store: STORES[0], dispatched: 30, received: "yes", missing: 0, damaged: 0, notes: "" })[h] ?? "");
      const ex2 = STORE_HEADERS.map(h => ({ division: division, sku: "EXAMPLE-001 (delete this row)", store: STORES[1], dispatched: 30, received: "no", missing: 2, damaged: 1, notes: "2 missing, 1 bent corner" })[h] ?? "");
      let data = [ex1, ex2];
      if (withData) {
        data = []; divProducts.forEach(p => STORES.forEach(st => {
          const s = p.stores[st];
          data.push(STORE_HEADERS.map(h => ({ division: p.division, sku: p.sku, store: st, dispatched: s.dispatched, received: s.received ? "yes" : "no", missing: s.missing, damaged: s.damaged, notes: s.notes })[h] ?? ""));
        }));
      }
      const instr = [
        ["How to use the Store Dispatch & Receipts sheet"],
        [""],
        ["1. One row = one product at one store. Fill a row for every product/store you want to update."],
        ["2. Products must already exist (matched on division + sku). Create them first via the Products sheet."],
        ["3. Allowed store values: " + STORES.join(", ") + "."],
        ["4. received accepts: yes/no (or true/false, 1/0). Marking 'yes' stamps the receipt date/time automatically."],
        ["5. dispatched / missing / damaged are whole numbers. Any missing or damaged > 0 raises a live alert on Overview."],
        ["6. Leave a cell blank to keep the existing value. Delete EXAMPLE rows before uploading."],
      ];
      XLSX.writeFile(makeWorkbook(STORE_HEADERS, data, "Stores", instr), withData ? "card_stores_export.xlsx" : "card_stores_template.xlsx");
    };

    return (
      <div>
        <div className="note">Built for scale — download a template, fill it in Excel (or export what's already here, edit, and re-upload), then import thousands of rows at once. Re-uploading updates existing SKUs and adds new ones; blank cells are never overwritten. Imports apply across both divisions based on each row's <b>division</b> column.</div>
        <div className="grid" style={{ gridTemplateColumns: "repeat(auto-fit,minmax(320px,1fr))", marginTop: 16 }}>
          <BulkPanel
            title="Products & Pipeline"
            blurb="Add new designs and update any pipeline step — bar coding, content, photography, videography, video editing, App listing, and final QC — all in one sheet."
            headers={PROD_HEADERS}
            onTemplate={() => downloadProductTemplate(false)}
            onExport={() => downloadProductTemplate(true)}
            exportLabel={`Export current products (${divProducts.length})`}
            runImport={bulkProducts}
            operator={operator}
            summarize={(rows) => {
              let create = 0, update = 0;
              rows.forEach(r => {
                const sku = String(r.sku || "").trim(); if (!sku || sku.toUpperCase().includes("EXAMPLE")) return;
                const div = DIVISIONS.includes(String(r.division || "").trim()) ? String(r.division).trim() : division;
                (products.some(p => p.division === div && p.sku.toLowerCase() === sku.toLowerCase()) ? update++ : create++);
              });
              return `${create} new · ${update} updates`;
            }}
            resultText={(r) => `${r.created} created, ${r.updated} updated${r.errs.length ? ` · ${r.errs.length} field warning(s)` : ""}`}
          />
          <BulkPanel
            title="Store Dispatch & Receipts"
            blurb="Bulk-record dispatched quantities, store receipts, and any missing or damaged cards across all 11 stores. Flagged shortages appear instantly on the Overview."
            headers={STORE_HEADERS}
            onTemplate={() => downloadStoreTemplate(false)}
            onExport={() => downloadStoreTemplate(true)}
            exportLabel="Export current store data"
            runImport={bulkStores}
            operator={operator}
            summarize={(rows) => { const n = rows.filter(r => String(r.sku || "").trim() && !String(r.sku).toUpperCase().includes("EXAMPLE")).length; return `${n} store row(s)`; }}
            resultText={(r) => `${r.updated} store rows updated${r.errs.length ? ` · ${r.errs.length} error(s)` : ""}`}
          />
        </div>
      </div>
    );
  }

  function BulkPanel({ title, blurb, headers, onTemplate, onExport, exportLabel, runImport, summarize, resultText, operator }) {
    const [rows, setRows] = useState(null);
    const [fname, setFname] = useState("");
    const [err, setErr] = useState("");
    const [result, setResult] = useState(null);
    const [busy, setBusy] = useState(false);
    const inputRef = useRef();
    const pick = (e) => {
      const f = e.target.files[0]; if (!f) return; setErr(""); setResult(null); setRows(null); setFname(f.name);
      readSheet(f, (r, e2) => { if (e2) { setErr(e2); } else { setRows(r); } });
    };
    const confirm = async () => {
      if (!operator || !operator.trim()) {
        alert('Please enter your name in the "You" field at the top before uploading.');
        return;
      }
      setBusy(true);
      const res = await runImport(rows, operator.trim());
      setResult(res); setRows(null); setFname("");
      if (inputRef.current) inputRef.current.value = "";
      setBusy(false);
    };
    return (
      <div className="card pad">
        <h3 style={{ margin: "0 0 6px", fontSize: 15 }}>{title}</h3>
        <p className="tag" style={{ margin: "0 0 14px", lineHeight: 1.55 }}>{blurb}</p>
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 12 }}>
          <button className="ghost" onClick={onTemplate}>⬇ Blank template</button>
          <button className="ghost" onClick={onExport}>⬇ {exportLabel}</button>
        </div>
        <div style={{ borderTop: "1px solid var(--line)", paddingTop: 14 }}>
          {(!operator || !operator.trim()) && (
            <div style={{
              background: "var(--peach-bg)", border: "1px solid var(--peach)",
              borderRadius: 9, padding: "9px 13px", marginBottom: 10,
              fontSize: 12, color: "var(--peach-ink)"
            }}>
              ⚠ Enter your name in the <b>"You"</b> field (top right) before uploading — it will be recorded in the audit log.
            </div>
          )}

          <label className="fld" style={{ marginBottom: 10 }}>Upload filled sheet (.xlsx or .csv)
            <input ref={inputRef} type="file" accept=".xlsx,.xls,.csv" onChange={pick} className="txt" />
          </label>
          {err && <div className="alert" style={{ borderColor: "var(--rose)" }}><div className="ic">!</div><div className="tx">Couldn't read file: {err}</div></div>}
          {rows && !err && (
            <div className="card" style={{ boxShadow: "none", background: "var(--surface-2)", padding: "12px 14px", marginBottom: 10 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <span className="tag"><b>{fname}</b> — {rows.length} row(s) read · {summarize(rows)}</span>
                <button className="primary" disabled={busy} onClick={confirm}>{busy ? "Importing…" : "Confirm import"}</button>
              </div>
            </div>
          )}
          {result && (
            <div className="card" style={{ boxShadow: "none", background: "var(--sage-bg)", border: "1px solid var(--sage)", padding: "12px 14px" }}>
              <b style={{ color: "var(--sage-ink)" }}>Imported ✓</b> <span className="tag">{resultText(result)}</span>
              {result.errs && result.errs.length > 0 && (
                <ul style={{ margin: "8px 0 0", paddingLeft: 18 }}>
                  {result.errs.slice(0, 6).map((m, i) => <li key={i} className="tag" style={{ color: "var(--rose-ink)" }}>{m}</li>)}
                  {result.errs.length > 6 && <li className="tag">+{result.errs.length - 6} more…</li>}
                </ul>
              )}
            </div>
          )}
        </div>
      </div>
    );
  }

  /* ---------------- AUDIT ---------------- */
  function AuditLog({ audit }) {
    const [q, setQ] = useState("");
    const rows = audit.filter(a => (a.action + " " + a.entity + " " + a.detail + " " + a.actor).toLowerCase().includes(q.toLowerCase()));
    return (
      <div>
        <div className="note">A complete, timestamped trail of every action — additions, stage updates, final-audit verdicts, store receipts and reported issues. This is your system-level audit; the per-product sign-off lives in the Final QC / Audit stage.</div>
        <div className="toolbar" style={{ marginTop: 14 }}>
          <div className="search"><input placeholder="Filter the log…" value={q} onChange={e => setQ(e.target.value)} /></div>
          <span className="tag">{rows.length} entries</span>
        </div>
        {rows.length === 0 ? <div className="card empty">No activity recorded yet.</div> :
          <div className="tbl-wrap">
            <table>
              <thead><tr><th style={{ width: 150 }}>When</th><th style={{ width: 130 }}>Action</th><th style={{ width: 120 }}>By</th><th>Item</th><th>Detail</th></tr></thead>
              <tbody>
                {rows.map(a => (
                  <tr key={a.id}>
                    <td className="tag" style={{ whiteSpace: "nowrap" }}>{fmt(a.at)}</td>
                    <td><span className="audit-act">{a.action}</span></td>
                    <td>{a.actor}</td>
                    <td><b>{a.entity}</b></td>
                    <td className="tag">{a.detail}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>}
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
