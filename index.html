        }).length;
    };

    const downloadReport = (member, rows) => {
      const headers = ["Member Name", "SKU", "Product Name", "Stage", "Status", "When"];
      const data = rows.map(r => [member.name, r.sku || "—", r.productName || "—", r.stage, r.status, fmt(r.at)]);
      const ws = XLSX.utils.aoa_to_sheet([headers, ...data]);
      ws["!cols"] = headers.map(h => ({ wch: Math.max(14, h.length + 4) }));
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "Activity Log");
      const monthLabel = selMonth.replace("-", "_");
      XLSX.writeFile(wb, `${member.name}_${monthLabel}_activity.xlsx`);
    };

    const statusChipColor = (status) => {
      if (status === "Completed") return { bg: "var(--sage-bg)", border: "var(--sage)", ink: "var(--sage-ink)" };
      if (status === "In Progress") return { bg: "var(--sky-bg)", border: "var(--sky)", ink: "var(--sky-ink)" };
      if (status === "Issue") return { bg: "var(--rose-bg)", border: "var(--rose)", ink: "var(--rose-ink)" };
      return { bg: "#F0EEE8", border: "var(--line2)", ink: "var(--muted)" };
    };

    let divMembers = teamMembers.filter(m =>
      m.division === division || assignments.some(a => a.memberId === m.id && a.division === division)
    );

    // ---- DEBUG PANEL ---------------------------------------------------
    // Shows exactly what raw audit data the app received, so you can see
    // immediately whether the problem is (a) audit array is empty — backend
    // key mismatch, (b) action names don't match "Stage update"/"Final audit",
    // or (c) the "at" date field isn't parseable. Remove once it's working.
    const actionCounts = useMemo(() => {
      const c = {};
      audit.forEach(a => { const k = a.action || "(blank)"; c[k] = (c[k] || 0) + 1; });
      return c;
    }, [audit]);
    const sampleRaw = audit.slice(0, 3);
    // ----------------------------------------------------------------------

    return (
      <div>
        <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 12, flexWrap: "wrap" }}>
          <label style={{ fontSize: 12, fontWeight: 600, color: "var(--muted)" }}>Month</label>
          <select value={selMonth} onChange={e => setSelMonth(e.target.value)} style={{ border: "1px solid var(--line2)", borderRadius: 9, padding: "8px 12px", background: "var(--card)", fontSize: 13 }}>
            {months.map(m => <option key={m} value={m}>{m}</option>)}
          </select>
          <span style={{ fontSize: 12, color: "var(--muted)" }}>Every action recorded for {selMonth} · {allActions.length} total actions in {division}</span>
          <button onClick={() => setShowDebug(s => !s)} style={{ marginLeft: "auto", fontSize: 11, fontWeight: 700, color: "var(--rose-ink)", border: "1px solid var(--rose)", background: "var(--rose-bg)", borderRadius: 8, padding: "5px 10px" }}>
            {showDebug ? "Hide" : "Show"} debug info
          </button>
        </div>

        {showDebug && (
          <div className="card pad" style={{ marginBottom: 20, fontSize: 12, lineHeight: 1.7, background: "#FFFBF0", border: "1px solid var(--peach)" }}>
            <b>Raw audit rows received from backend:</b> {audit.length}<br />
            <b>Action types found:</b> {Object.keys(actionCounts).length === 0 ? "(none — audit array is empty)" : Object.entries(actionCounts).map(([k, v]) => `${k} (${v})`).join(", ")}<br />
            <b>Total team members loaded:</b> {teamMembers.length} · <b>for {division}:</b> {divMembers.length}<br />
            <b>Total assignments loaded:</b> {assignments.length}<br /><br />
            <b>First 3 raw audit rows (exact shape from backend):</b>
            <pre style={{ background: "#fff", border: "1px solid var(--line2)", borderRadius: 8, padding: 10, overflowX: "auto", fontSize: 11 }}>{JSON.stringify(sampleRaw, null, 2)}</pre>
            {audit.length === 0 && <div style={{ color: "var(--rose-ink)", fontWeight: 700 }}>→ The audit array is completely empty. This is a backend/loading issue, not a filtering issue — open the browser console (F12 → Console tab) and look for a line starting "[CardFlow] gsGet() raw keys" to see what key your Apps Script actually returns audit data under (likely not literally "audit").</div>}
            {audit.length > 0 && allActions.length === 0 && <div style={{ color: "var(--rose-ink)", fontWeight: 700 }}>→ Audit rows exist but none matched this month/division. Check "Action types found" above includes "Stage update" or "Final audit" exactly (case/spacing matters), and that the sample row's "at" field above looks like a real date.</div>}
          </div>
        )}

        {divMembers.length === 0
          ? <div className="card empty">No team members found for {division}. Add members in Assign Work first.</div>
          : <div className="grid" style={{ gridTemplateColumns: "repeat(auto-fill, minmax(340px, 1fr))" }}>
            {divMembers.map(m => {
              const rows = getMemberActions(m);
              const assignedCount = getAssignedCount(m);
              const isOpen = expandedMember === m.id;
              const statusBreakdown = ["Not Started", "In Progress", "Completed", "Issue"].map(s => ({ name: s, count: rows.filter(r => r.status === s).length })).filter(s => s.count > 0);
              return (
                <div key={m.id} className="card pad" style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                    <div style={{ width: 38, height: 38, borderRadius: 10, background: "linear-gradient(150deg, var(--sage), var(--sage-deep))", display: "grid", placeItems: "center", color: "#fff", fontFamily: "var(--serif)", fontWeight: 600, fontSize: 16, flexShrink: 0 }}>
                      {m.name[0].toUpperCase()}
                    </div>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontWeight: 700, fontSize: 14 }}>{m.name}</div>
                      <div style={{ fontSize: 11, color: "var(--muted)" }}>{assignedCount} SKU{assignedCount !== 1 ? "s" : ""} assigned</div>
                    </div>
                    <div style={{ textAlign: "right" }}>
                      <div style={{ fontFamily: "var(--serif)", fontSize: 26, fontWeight: 600, lineHeight: 1, color: rows.length > 0 ? "var(--sage-ink)" : "var(--faint)" }}>{rows.length}</div>
                      <div style={{ fontSize: 10, color: "var(--muted)", textTransform: "uppercase", letterSpacing: ".5px" }}>actions</div>
                    </div>
                  </div>

                  {statusBreakdown.length > 0 && (
                    <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                      {statusBreakdown.map(s => {
                        const c = statusChipColor(s.name);
                        return (
                          <span key={s.name} style={{ background: c.bg, color: c.ink, border: `1px solid ${c.border}`, borderRadius: 999, padding: "2px 10px", fontSize: 11, fontWeight: 600 }}>
                            {s.name} · {s.count}
                          </span>
                        );
                      })}
                    </div>
                  )}

                  {rows.length > 0 && (
                    <div style={{ maxHeight: isOpen ? 420 : 170, overflowY: "auto", borderTop: "1px solid var(--line)", paddingTop: 8, transition: "max-height .2s" }}>
                      {(isOpen ? rows : rows.slice(0, 6)).map((r, i) => {
                        const c = statusChipColor(r.status);
                        return (
                          <div key={r.id + i} style={{ display: "flex", alignItems: "center", gap: 8, padding: "6px 0", borderBottom: "1px solid var(--line)" }}>
                            <span className="psku" style={{ flexShrink: 0, fontSize: 10.5 }}>{r.sku || "—"}</span>
                            <div style={{ flex: 1, minWidth: 0 }}>
                              <div style={{ fontSize: 11.5, color: "var(--ink)", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{r.stage}</div>
                              <div style={{ fontSize: 10, color: "var(--faint)" }}>{fmt(r.at)}</div>
                            </div>
                            <span style={{ background: c.bg, color: c.ink, border: `1px solid ${c.border}`, borderRadius: 999, padding: "2px 9px", fontSize: 10.5, fontWeight: 600, flexShrink: 0, whiteSpace: "nowrap" }}>{r.status}</span>
                          </div>
                        );
                      })}
                      {!isOpen && rows.length > 6 && (
                        <button onClick={() => setExpandedMember(m.id)} style={{ fontSize: 11, color: "var(--sage-ink)", fontWeight: 600, paddingTop: 6 }}>
                          +{rows.length - 6} more — view all
                        </button>
                      )}
                      {isOpen && rows.length > 6 && (
                        <button onClick={() => setExpandedMember(null)} style={{ fontSize: 11, color: "var(--muted)", fontWeight: 600, paddingTop: 6 }}>
                          Show less
                        </button>
                      )}
                    </div>
                  )}

                  {rows.length === 0 && (
                    <div style={{ fontSize: 12, color: "var(--faint)", textAlign: "center", padding: "10px 0" }}>No recorded actions this month</div>
                  )}

                  <button
                    onClick={() => downloadReport(m, rows)}
                    disabled={rows.length === 0}
                    className="ghost"
                    style={{ width: "100%", justifyContent: "center", fontSize: 12, opacity: rows.length === 0 ? 0.4 : 1 }}>
                    {I.upload({ width: 14, height: 14 })} Download full activity · {selMonth}
                  </button>
                </div>
              );
            })}
          </div>
        }
      </div>
    );
  }

  function QCAuditTab({ division, products, qcAuditLog, onSubmit, operator, auth, initialFilter = null, onFilterConsumed }) {
    const [q, setQ] = useState("");
    const [filter, setFilter] = useState(initialFilter || "pending");

    useEffect(() => {
      if (initialFilter) {
        setFilter(initialFilter);
        onFilterConsumed && onFilterConsumed();
      }
    }, [initialFilter]);
    const [fSetNo, setFSetNo] = useState(""); // set-wise filter (master/admin only)
    const isMasterOrAdmin = auth?.role === "master" || auth?.role === "admin";
    const [expanded, setExpanded] = useState({});
    const [verdicts, setVerdicts] = useState({});
    const [saving, setSaving] = useState({});
    const [saved, setSaved] = useState({});
    const [copied, setCopied] = useState({});

    const [bulkSelected, setBulkSelected] = useState(new Set());
    const [bulkBusy, setBulkBusy] = useState(false);
    const [bulkDone, setBulkDone] = useState(false);

    const toggleBulkSelect = (id) => setBulkSelected(prev => {
      const next = new Set(prev);
      next.has(id) ? next.delete(id) : next.add(id);
      return next;
    });
    const selectAllVisible = () => setBulkSelected(new Set(filtered.map(p => p.id)));
    const clearBulkSelect = () => setBulkSelected(new Set());

    const bulkApprove = async () => {
      if (bulkSelected.size === 0) return;
      setBulkBusy(true);
      for (const pid of bulkSelected) {
        await onSubmit(pid, "Approved", "", []);
      }
      setBulkBusy(false);
      setBulkDone(true);
      setBulkSelected(new Set());
      setTimeout(() => setBulkDone(false), 2000);
    };

    const QC_GATE_EXCLUDED = ["scan", "qc", "finalqc"];
    const eligibleStages = STAGES.filter(s => !QC_GATE_EXCLUDED.includes(s.k));
    const setNoOptions = useMemo(() => [...new Set(products.map(p => p.set_no).filter(Boolean))].sort(), [products]);



    const wasFlaggedBefore = (p) => {
      const flaggedInLog = qcAuditLog.some(r => r.productId === p.id && r.verdict === "Issues Found");
      const flaggedOnStage = STAGES.filter(s => s.k !== "finalqc")
        .some(s => String(p.stages[s.k]?.comments || "").includes("QC flagged:"));
      return flaggedInLog || flaggedOnStage;
    };

    const filtered = useMemo(() => {
      return products.filter(p => {
        const t = (p.sku + " " + p.name + " " + p.vendor).toLowerCase();
        if (q && !t.includes(q.toLowerCase())) return false;
        // A card only enters the QC queue once every pipeline stage (excluding
        // finalqc itself) is Completed — no partial-pipeline QC.
        if (isMasterOrAdmin && fSetNo && (p.set_no || "").trim().toLowerCase() !== fSetNo.trim().toLowerCase()) return false;
        const allStagesDone = eligibleStages.every(s => p.stages[s.k].status === "Completed");
        const previouslyFlagged = wasFlaggedBefore(p);
        if (filter === "pending") return !p.verdict && allStagesDone && !previouslyFlagged;
        if (filter === "resolved") return !p.verdict && allStagesDone && previouslyFlagged;
        if (filter === "approved") return p.verdict === "Approved";
        if (filter === "issues") return p.verdict === "Issues Found";
        return true;
      });
    }, [products, q, filter, qcAuditLog, fSetNo, isMasterOrAdmin]);

    const resolvedCount = products.filter(p =>
      !p.verdict &&
      eligibleStages.every(s => p.stages[s.k].status === "Completed") &&
      wasFlaggedBefore(p)
    ).length;
    const pendingCount = products.filter(p => !p.verdict).length - resolvedCount;
    const approvedCount = products.filter(p => p.verdict === "Approved").length;
    const issuesCount = products.filter(p => p.verdict === "Issues Found").length;

    const getVState = (pid) => verdicts[pid] || { verdict: "", comments: "", stagesBack: [] };
    const setVState = (pid, patch) => setVerdicts(v => ({ ...v, [pid]: { ...getVState(pid), ...patch } }));

    const handleSubmit = async (p) => {
      const st = getVState(p.id);
      if (!st.verdict) return;
      setSaving(s => ({ ...s, [p.id]: true }));
      await onSubmit(p.id, st.verdict, st.comments, st.stagesBack);
      setSaving(s => ({ ...s, [p.id]: false }));
      setSaved(s => ({ ...s, [p.id]: true }));
      setTimeout(() => setSaved(s => ({ ...s, [p.id]: false })), 2200);
    };

    return (
      <div>
        {/* KPI row */}
        <div className="grid kpis" style={{ marginBottom: 16 }}>
          {[
            { lab: "Pending QC", val: pendingCount, bg: "var(--peach-bg)", border: "var(--peach)", color: "var(--peach-ink)", key: "pending" },
            { lab: "Issue Resolved", val: resolvedCount, bg: "var(--sky-bg)", border: "var(--sky)", color: "var(--sky-ink)", key: "resolved" },
            { lab: "Approved", val: approvedCount, bg: "var(--sage-bg)", border: "var(--sage)", color: "var(--sage-ink)", key: "approved" },
            { lab: "Issues Found", val: issuesCount, bg: "var(--rose-bg)", border: "var(--rose)", color: "var(--rose-ink)", key: "issues" },
            { lab: "Total Products", val: products.length, bg: "var(--card)", border: "var(--line2)", color: "var(--ink)", key: "all" },
          ].map((k, i) => (
            <div
              key={i}
              className="card kpi"
              onClick={() => setFilter(k.key)}
              style={{
                background: k.bg,
                border: filter === k.key ? `2px solid ${k.color}` : `1px solid ${k.border}`,
                cursor: "pointer",
              }}
            >
              <div className="lab">{k.lab}</div>
              <div className="val" style={{ color: k.color }}>{k.val}</div>
            </div>
          ))}
        </div>

        {/* Toolbar */}
        {isMasterOrAdmin && setNoOptions.length > 0 && (
          <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 12, flexWrap: "wrap" }}>
            <select
              value={fSetNo}
              onChange={e => setFSetNo(e.target.value)}
              style={{ border: "1px solid var(--line2)", borderRadius: 10, padding: "9px 12px", background: "var(--card)", fontSize: 13, fontWeight: 500, minWidth: 180 }}
            >
              <option value="">— all set no. —</option>
              {setNoOptions.map(s => <option key={s} value={s}>{s}</option>)}
            </select>
            {fSetNo && (
              <button className="ghost" style={{ padding: "6px 10px", fontSize: 12 }} onClick={() => setFSetNo("")}>
                Clear
              </button>
            )}
          </div>
        )}
        <div className="toolbar">
          <div className="search" style={{ position: "relative" }}>
            {I.search({})}
            <input
              placeholder="Search SKU, product or vendor…"
              value={q}
              onChange={e => { setQ(e.target.value); }}
              onBlur={() => setTimeout(() => setQ(q => q), 150)}
            />
            {q.length > 0 && (() => {
              const sugs = products.filter(p =>
                (p.sku + " " + p.name + " " + p.vendor).toLowerCase().includes(q.toLowerCase())
              ).slice(0, 8);
              return sugs.length > 0 ? (
                <div style={{ position: "absolute", top: "calc(100% + 6px)", left: 0, right: 0, background: "var(--card)", border: "1px solid var(--line2)", borderRadius: 12, boxShadow: "var(--shadow-lg)", zIndex: 50, overflow: "hidden" }}>
                  {sugs.map(p => (
                    <div
                      key={p.id}
                      onMouseDown={() => setQ(p.sku)}
                      style={{ display: "flex", alignItems: "center", gap: 10, padding: "9px 14px", cursor: "pointer", borderBottom: "1px solid var(--line)" }}
                      onMouseEnter={e => e.currentTarget.style.background = "var(--card-2)"}
                      onMouseLeave={e => e.currentTarget.style.background = "var(--card)"}
                    >
                      <span className="psku" style={{ flexShrink: 0 }}>{p.sku}</span>
                      {p.name && <span style={{ fontSize: 12, fontWeight: 600, color: "var(--ink)" }}>{p.name}</span>}
                      {p.vendor && <span style={{ fontSize: 11, color: "var(--muted)", marginLeft: "auto" }}>{p.vendor}</span>}
                      {p.set_no && <span className="psku" style={{ background: "var(--peach-bg)", color: "var(--peach-ink)", border: "1px solid var(--peach)", flexShrink: 0 }}>{p.set_no}</span>}
                      <span style={{
                        fontSize: 10.5, fontWeight: 700, borderRadius: 999, padding: "2px 9px", flexShrink: 0,
                        background: p.verdict === "Approved" ? "var(--sage-bg)" : p.verdict === "Issues Found" ? "var(--rose-bg)" : "var(--peach-bg)",
                        color: p.verdict === "Approved" ? "var(--sage-ink)" : p.verdict === "Issues Found" ? "var(--rose-ink)" : "var(--peach-ink)",
                        border: `1px solid ${p.verdict === "Approved" ? "var(--sage)" : p.verdict === "Issues Found" ? "var(--rose)" : "var(--peach)"}`,
                      }}>
                        {p.verdict === "Approved" ? "✓ Approved" : p.verdict === "Issues Found" ? "⚠ Issues" : "⏳ Pending"}
                      </span>
                    </div>
                  ))}
                </div>
              ) : null;
            })()}
          </div>
          {[
            ["pending", `Pending (${pendingCount})`],
            ["resolved", `Issue Resolved (${resolvedCount})`],
            ["approved", `Approved (${approvedCount})`],
            ["issues", `Issues (${issuesCount})`],
            ["all", "All"],
          ].map(([k, label]) => (
            <button key={k} onClick={() => setFilter(k)} style={{
              padding: "8px 14px", borderRadius: 10, fontSize: 12, fontWeight: 600, cursor: "pointer",
              background: filter === k ? "var(--ink)" : "var(--card)",
              color: filter === k ? "#fff" : "var(--ink)",
              border: `1px solid ${filter === k ? "var(--ink)" : "var(--line2)"}`,
            }}>{label}</button>
          ))}
        </div>

        {/* Bulk selection bar */}
        <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 12, flexWrap: "wrap" }}>
          <label style={{ display: "flex", alignItems: "center", gap: 7, fontSize: 12, fontWeight: 600, color: "var(--muted)", cursor: "pointer" }}>
            <input
              type="checkbox"
              checked={bulkSelected.size === filtered.length && filtered.length > 0}
              onChange={e => e.target.checked ? selectAllVisible() : clearBulkSelect()}
              style={{ width: 15, height: 15, accentColor: "var(--sage-deep)" }}
            />
            Select all ({filtered.length})
          </label>
          {bulkSelected.size > 0 && (
            <>
              <span style={{ fontSize: 13, fontWeight: 700, color: "var(--sky-ink)", background: "var(--sky-bg)", border: "1px solid var(--sky)", borderRadius: 999, padding: "3px 14px" }}>
                {bulkSelected.size} selected
              </span>
              <button
                onClick={bulkApprove}
                disabled={bulkBusy}
                style={{
                  padding: "8px 20px", borderRadius: 10, fontWeight: 700, fontSize: 13,
                  background: bulkDone ? "var(--sage)" : "var(--sage-deep)",
                  color: "#fff", border: 0, cursor: "pointer", opacity: bulkBusy ? 0.6 : 1
                }}>
                {bulkBusy ? "Approving…" : bulkDone ? "✓ Done" : `✓ Approve all (${bulkSelected.size})`}
              </button>
              <button className="ghost" style={{ padding: "7px 14px", fontSize: 12 }} onClick={clearBulkSelect}>
                Clear
              </button>
            </>
          )}
        </div>

        {filtered.length === 0
          ? <div className="card empty">No products match this filter.</div>
          : <div className="plist">
            {filtered.map(p => {
              const st = getVState(p.id);
              const isOpen = !!expanded[p.id];
              const allStagesDone = eligibleStages.every(s => p.stages[s.k].status === "Completed");
              const hasVerdict = !!p.verdict;
              // Once this card already has an open issue, let QC keep raising MORE
              // issues — on whichever stages are still Completed — without waiting
              // for the first flagged stage(s) to be fixed and re-completed.
              // Approving still requires every stage to be done.
              const canAddMoreIssues = p.verdict === "Issues Found";
              const pipelineGateBlocks = !allStagesDone && !(canAddMoreIssues && st.verdict === "Issues Found");

              return (
                <div key={p.id} className="prow">
                  {/* Card header */}
                  <div className="phead" onClick={() => setExpanded(e => ({ ...e, [p.id]: !e[p.id] }))}>
                        <input
                          type="checkbox"
                          checked={bulkSelected.has(p.id)}
                          onChange={e => { e.stopPropagation(); toggleBulkSelect(p.id); }}
                          onClick={e => e.stopPropagation()}
                          style={{ width: 15, height: 15, accentColor: "var(--sage-deep)", cursor: "pointer", flexShrink: 0 }}
                        />
                        <span className={"chev " + (isOpen ? "open" : "")}>▶</span>
                    <span className="psku">{p.sku || "no-sku"}</span>
                      <button
                        onClick={e => {
                          e.stopPropagation();
                          navigator.clipboard.writeText(p.sku || "");
                          setCopied(c => ({ ...c, [p.id]: true }));
                          setTimeout(() => setCopied(c => ({ ...c, [p.id]: false })), 1500);
                        }}
                        style={{
                          fontSize: 10.5, fontWeight: 700, padding: "2px 9px", borderRadius: 6, cursor: "pointer",
                          background: copied[p.id] ? "var(--sage-bg)" : "var(--card)",
                          border: `1px solid ${copied[p.id] ? "var(--sage)" : "var(--line2)"}`,
                          color: copied[p.id] ? "var(--sage-ink)" : "var(--muted)",
                          flexShrink: 0, transition: ".15s"
                        }}
                      >
                        {copied[p.id] ? "✓ Copied" : "Copy SKU"}
                      </button>
                      {p.name && <span className="pname">{p.name}</span>}
                    <span className="pvend">· {p.vendor || "—"} · {p.qty || 0} cards</span>
                    {p.set_no && <span className="psku" style={{ background: "var(--peach-bg)", color: "var(--peach-ink)", border: "1px solid var(--peach)" }}>{p.set_no}</span>}
                    <div className="spacer" />
                    {p.verdict === "Approved" && <span className="chip c-done"><span className="dot" />Approved</span>}
                    {p.verdict === "Issues Found" && <span className="chip c-issue"><span className="dot" />Issues Found</span>}
                    {!p.verdict && allStagesDone && qcAuditLog.some(r => r.productId === p.id && r.verdict === "Issues Found") &&
                      <span className="chip" style={{ background: "var(--sky-bg)", color: "var(--sky-ink)", border: "1px solid var(--sky)" }}><span className="dot" style={{ background: "var(--sky)" }} />↻ Issue Resolved — Re-review</span>}
                    {!p.verdict && allStagesDone && !qcAuditLog.some(r => r.productId === p.id && r.verdict === "Issues Found") &&
                      <span className="chip c-prog"><span className="dot" />Ready for QC</span>}
                    {!p.verdict && !allStagesDone && <span className="chip c-app"><span className="dot" />Pipeline incomplete</span>}
                    <Pipe p={p} />
                  </div>

                  {isOpen && (
                    <div className="pbody" style={{ padding: "16px 18px" }}>

                      {/* Pipeline overview */}
                      <div style={{ marginBottom: 14 }}>
                        <div style={{ fontSize: 11, fontWeight: 700, color: "var(--muted)", textTransform: "uppercase", letterSpacing: ".6px", marginBottom: 8 }}>Pipeline status</div>
                        <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                          {eligibleStages.map(s => {
                            const sg = p.stages[s.k];
                            const c = sg.status === "Completed" ? { bg: "var(--sage-bg)", border: "var(--sage)", ink: "var(--sage-ink)", icon: "✓" }
                              : sg.status === "In Progress" ? { bg: "var(--sky-bg)", border: "var(--sky)", ink: "var(--sky-ink)", icon: "…" }
                                : sg.status === "Issue" ? { bg: "var(--rose-bg)", border: "var(--rose)", ink: "var(--rose-ink)", icon: "!" }
                                  : { bg: "#F0EEE8", border: "var(--line2)", ink: "var(--muted)", icon: "○" };
                            return (
                              <span key={s.k} style={{ display: "inline-flex", alignItems: "center", gap: 5, background: c.bg, border: `1px solid ${c.border}`, color: c.ink, borderRadius: 8, padding: "3px 10px", fontSize: 11.5, fontWeight: 600 }}>
                                {c.icon} {s.n}{sg.person ? ` · ${sg.person}` : ""}
                              </span>
                            );
                          })}
                        </div>
                      </div>

                      {/* Existing verdict badge */}
                      {hasVerdict && (
                        <div style={{ marginBottom: 14, background: p.verdict === "Approved" ? "var(--sage-bg)" : "var(--rose-bg)", border: `1px solid ${p.verdict === "Approved" ? "var(--sage)" : "var(--rose)"}`, borderRadius: 10, padding: "10px 14px" }}>
                          <div style={{ fontWeight: 700, fontSize: 13, color: p.verdict === "Approved" ? "var(--sage-ink)" : "var(--rose-ink)" }}>
                            {p.verdict === "Approved" ? "✓ Currently Approved" : "⚠ Issues Found"}
                          </div>
                          {p.issues && <div style={{ fontSize: 12, color: "var(--ink)", marginTop: 4 }}>{p.issues}</div>}
                          <div style={{ fontSize: 11, color: "var(--faint)", marginTop: 4 }}>Use the form below to re-audit</div>
                        </div>
                      )}

                      {/* QC form */}
                      <div style={{ background: "var(--card)", border: "1px solid var(--line2)", borderRadius: 12, padding: "16px" }}>
                        <div style={{ fontSize: 11, fontWeight: 700, color: "var(--muted)", textTransform: "uppercase", letterSpacing: ".6px", marginBottom: 12 }}>
                          {hasVerdict ? "Re-audit" : "QC Verdict"}
                        </div>

                        {/* Approve / Issues Found buttons */}
                        <div style={{ display: "flex", gap: 10, marginBottom: 14 }}>
                          {[
                            { v: "Approved", activeBg: "var(--sage-deep)", activeBorder: "var(--sage-deep)", passiveBg: "var(--sage-bg)", passiveBorder: "var(--sage)", ink: "var(--sage-ink)", activeInk: "#fff", label: "✓  Approve" },
                            { v: "Issues Found", activeBg: "var(--rose-ink)", activeBorder: "var(--rose-ink)", passiveBg: "var(--rose-bg)", passiveBorder: "var(--rose)", ink: "var(--rose-ink)", activeInk: "#fff", label: "⚠  Issues Found" },
                          ].map(opt => (
                            <button key={opt.v}
                              onClick={() => setVState(p.id, { verdict: opt.v, stagesBack: opt.v === "Approved" ? [] : st.stagesBack })}
                              style={{
                                flex: 1, padding: "11px 0", borderRadius: 10, fontWeight: 700, fontSize: 13, cursor: "pointer", transition: ".15s",
                                background: st.verdict === opt.v ? opt.activeBg : opt.passiveBg,
                                border: `2px solid ${st.verdict === opt.v ? opt.activeBorder : opt.passiveBorder}`,
                                color: st.verdict === opt.v ? opt.activeInk : opt.ink,
                              }}>
                              {opt.label}
                            </button>
                          ))}
                        </div>

                        {/* Issues Found — comments + stages to reopen */}
                        {st.verdict === "Issues Found" && (
                          <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                            <label className="fld">
                              Describe the issue(s) *
                              <textarea
                                placeholder="e.g. colour mismatch on 3 cards, content typo in line 2, image missing…"
                                value={st.comments || ""}
                                onChange={e => setVState(p.id, { comments: e.target.value })}
                                style={{ minHeight: 80, fontSize: 13 }}
                              />
                            </label>
                            <label className="fld">
                              Send these stages back to "In Progress"
                              <div style={{ fontSize: 11, color: "var(--faint)", marginTop: 2, marginBottom: 6 }}>Only completed stages shown — select ones that need rework</div>
                              <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
                                {eligibleStages.filter(s => p.stages[s.k].status === "Completed").map(s => {
                                  const checked = (st.stagesBack || []).includes(s.k);
                                  return (
                                    <label key={s.k} style={{
                                      display: "flex", alignItems: "center", gap: 6, fontSize: 12, fontWeight: 500, cursor: "pointer",
                                      background: checked ? "var(--sky-bg)" : "var(--card)",
                                      border: `1px solid ${checked ? "var(--sky)" : "var(--line2)"}`,
                                      color: checked ? "var(--sky-ink)" : "var(--ink)",
                                      borderRadius: 8, padding: "5px 10px",
                                    }}>
                                      <input type="checkbox" checked={checked}
                                        style={{ width: 13, height: 13, accentColor: "var(--sky-ink)" }}
                                        onChange={e => {
                                          const prev = st.stagesBack || [];
                                          setVState(p.id, { stagesBack: e.target.checked ? [...prev, s.k] : prev.filter(k => k !== s.k) });
                                        }} />
                                      {s.n}
                                    </label>
                                  );
                                })}
                                {eligibleStages.filter(s => p.stages[s.k].status === "Completed").length === 0 && (
                                  <span style={{ fontSize: 12, color: "var(--faint)" }}>No completed stages to send back</span>
                                )}
                              </div>
                            </label>
                          </div>
                        )}

                        {/* Auditor + submit */}
                        <div style={{ display: "flex", alignItems: "center", gap: 12, marginTop: 16, flexWrap: "wrap" }}>
                          <span style={{ fontSize: 12, color: "var(--muted)" }}>
                            Auditor: <b style={{ color: "var(--ink)" }}>{operator}</b>
                          </span>
                          <div style={{ flex: 1 }} />
                          <button
                            onClick={() => handleSubmit(p)}
                            disabled={pipelineGateBlocks || !st.verdict || saving[p.id] || (st.verdict === "Issues Found" && !st.comments?.trim())}
                            style={{
                              padding: "10px 24px", borderRadius: 10, fontWeight: 700, fontSize: 13, cursor: "pointer", border: 0, transition: ".15s",
                              background: saved[p.id] ? "var(--sage)" : st.verdict === "Approved" ? "var(--sage-deep)" : st.verdict === "Issues Found" ? "var(--rose-ink)" : "var(--faint)",
                              color: "#fff",
                              opacity: (pipelineGateBlocks || !st.verdict || saving[p.id] || (st.verdict === "Issues Found" && !st.comments?.trim())) ? 0.45 : 1,
                            }}>
                            {pipelineGateBlocks ? "Pipeline incomplete — finish all stages first" : saving[p.id] ? "Saving…" : saved[p.id] ? "✓ Saved" : st.verdict === "Approved" ? "Confirm Approval" : st.verdict === "Issues Found" ? "Submit & Send Back" : "Select a verdict first"}
                          </button>
                        </div>
                      </div>

                      {/* QC history for this card */}
                      {(() => {
                        const history = qcAuditLog.filter(r => r.productId === p.id);
                        if (!history.length) return null;
                        return (
                          <div style={{ marginTop: 16 }}>
                            <div style={{ fontSize: 11, fontWeight: 700, color: "var(--muted)", textTransform: "uppercase", letterSpacing: ".6px", marginBottom: 8 }}>QC history</div>
                            <div style={{ border: "1px solid var(--line)", borderRadius: 10, overflow: "hidden" }}>
                              {history.map((r, i) => (
                                <div key={i} style={{ display: "flex", gap: 12, alignItems: "flex-start", padding: "10px 14px", borderBottom: i < history.length - 1 ? "1px solid var(--line)" : "none", background: r.verdict === "Approved" ? "var(--sage-bg)" : "var(--rose-bg)" }}>
                                  <div style={{ flex: 1, minWidth: 0 }}>
                                    <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
                                      <span style={{ fontWeight: 700, fontSize: 12, color: r.verdict === "Approved" ? "var(--sage-ink)" : "var(--rose-ink)" }}>
                                        {r.verdict === "Approved" ? "✓ Approved" : "⚠ Issues Found"}
                                      </span>
                                      {r.stagesSentBack && r.stagesSentBack !== "" && (
                                        <span style={{ fontSize: 11, color: "var(--sky-ink)", fontWeight: 600, background: "var(--sky-bg)", border: "1px solid var(--sky)", borderRadius: 6, padding: "1px 8px" }}>
                                          ↩ {r.stagesSentBack.split(",").map(k => STAGES.find(s => s.k === k)?.n || k).join(", ")}
                                        </span>
                                      )}
                                    </div>
                                    {r.comments && <div style={{ fontSize: 12, color: "var(--ink)", marginTop: 3 }}>{r.comments}</div>}
                                  </div>
                                  <div style={{ fontSize: 11, color: "var(--faint)", whiteSpace: "nowrap", textAlign: "right", flexShrink: 0 }}>
                                    <div>{fmt(r.at)}</div>
                                    <div style={{ fontWeight: 600, color: "var(--muted)" }}>by {r.auditor}</div>
                                  </div>
                                </div>
                              ))}
                            </div>
                          </div>
                        );
                      })()}
                    </div>
                  )}
                </div>
              );
            })}
