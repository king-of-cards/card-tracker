<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap');

  :root {
    --bg: #F4F2EC;
    --side: #FBFAF6;
    --card: #FFFFFF;
    --card-2: #FBFAF6;
    --ink: #35332D;
    --muted: #8C887E;
    --faint: #B3AFA4;
    --line: #EAE6DE;
    --line2: #DFDBD1;
    --sage: #9CBE9A;
    --sage-bg: #EDF4EB;
    --sage-ink: #4C6A4A;
    --sage-deep: #7FA67D;
    --sky: #A5C4D8;
    --sky-bg: #E9F1F6;
    --sky-ink: #42607A;
    --lav: #BCAFD4;
    --lav-bg: #EFEBF6;
    --lav-ink: #594D77;
    --peach: #E3C193;
    --peach-bg: #F8F0E2;
    --peach-ink: #8A6427;
    --rose: #D89F9F;
    --rose-bg: #F7EAEA;
    --rose-ink: #8C4C4C;
    --shadow: 0 1px 2px rgba(53, 51, 45, .04), 0 6px 22px rgba(53, 51, 45, .05);
    --shadow-lg: 0 18px 50px rgba(53, 51, 45, .14);
    --r: 16px;
    --r-sm: 11px;
    --side-w: 248px;
    --sans: 'Hanken Grotesk', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    --serif: 'Fraunces', Georgia, 'Times New Roman', serif;
  }

  * {
    box-sizing: border-box
  }

  html,
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased
  }

  .serif {
    font-family: var(--serif)
  }

  input,
  select,
  textarea,
  button {
    font-family: inherit;
    font-size: 13px;
    color: var(--ink)
  }

  button {
    cursor: pointer;
    border: 0;
    background: none
  }

  a {
    color: inherit
  }

  ::-webkit-scrollbar {
    width: 10px;
    height: 10px
  }

  ::-webkit-scrollbar-thumb {
    background: var(--line2);
    border-radius: 10px;
    border: 3px solid transparent;
    background-clip: padding-box
  }

  svg {
    display: block
  }

  /* ---------- shell ---------- */
  .app {
    display: flex;
    min-height: 100vh
  }

  .sidebar {
    width: var(--side-w);
    flex: 0 0 var(--side-w);
    background: var(--side);
    border-right: 1px solid var(--line);
    position: fixed;
    inset: 0 auto 0 0;
    display: flex;
    flex-direction: column;
    padding: 20px 14px;
    z-index: 40
  }

  .main {
    margin-left: var(--side-w);
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 11px;
    padding: 6px 8px 18px
  }

  .logo {
    width: 34px;
    height: 34px;
    border-radius: 10px;
    background: linear-gradient(150deg, var(--sage), var(--sage-deep));
    display: grid;
    place-items: center;
    color: #fff;
    box-shadow: 0 4px 10px rgba(124, 166, 125, .35)
  }

  .brand b {
    font-family: var(--serif);
    font-weight: 600;
    font-size: 19px;
    letter-spacing: .2px;
    line-height: 1
  }

  .brand span {
    display: block;
    font-size: 10.5px;
    color: var(--muted);
    letter-spacing: .6px;
    text-transform: uppercase;
    margin-top: 3px
  }

  .navlabel {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--faint);
    padding: 14px 10px 7px
  }

  .divbtn {
    display: flex;
    align-items: center;
    gap: 11px;
    width: 100%;
    text-align: left;
    padding: 11px 12px;
    border-radius: var(--r-sm);
    color: var(--muted);
    font-weight: 600;
    transition: .16s;
    margin-bottom: 3px
  }

  .divbtn:hover {
    background: var(--card)
  }

  .divbtn.on {
    background: var(--card);
    color: var(--ink);
    box-shadow: var(--shadow)
  }

  .divbtn .dmark {
    width: 26px;
    height: 26px;
    border-radius: 8px;
    display: grid;
    place-items: center;
    font-family: var(--serif);
    font-weight: 600;
    font-size: 13px;
    background: var(--sage-bg);
    color: var(--sage-ink);
    flex: 0 0 26px
  }

  .divbtn.on .dmark {
    background: var(--sage);
    color: #fff
  }

  .divbtn .dcount {
    margin-left: auto;
    font-size: 11px;
    font-weight: 600;
    color: var(--faint)
  }

  .navitem {
    display: flex;
    align-items: center;
    gap: 11px;
    width: 100%;
    text-align: left;
    padding: 9px 12px;
    border-radius: var(--r-sm);
    color: var(--muted);
    font-weight: 500;
    transition: .16s;
    position: relative;
    margin-bottom: 1px
  }

  .navitem:hover {
    background: var(--card);
    color: var(--ink)
  }

  .navitem.on {
    background: var(--sage-bg);
    color: var(--sage-ink);
    font-weight: 600
  }

  .navitem.on::before {
    content: "";
    position: absolute;
    left: -14px;
    top: 8px;
    bottom: 8px;
    width: 3px;
    border-radius: 3px;
    background: var(--sage-deep)
  }

  .navitem svg {
    flex: 0 0 17px;
    opacity: .85
  }

  .navitem .pip {
    margin-left: auto;
    background: var(--rose);
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    border-radius: 999px;
    padding: 1px 7px;
    min-width: 18px;
    text-align: center
  }

  .sidefoot {
    margin-top: auto;
    border-top: 1px solid var(--line);
    padding-top: 14px
  }

  .opwrap {
    display: flex;
    flex-direction: column;
    gap: 5px;
    padding: 0 4px
  }

  .opwrap label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .8px;
    text-transform: uppercase;
    color: var(--faint)
  }

  .opwrap input {
    border: 1px solid var(--line2);
    border-radius: 9px;
    padding: 8px 10px;
    background: var(--card);
    width: 100%
  }

  .syncbtn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    width: 100%;
    margin-top: 9px;
    padding: 8px;
    border: 1px solid var(--line2);
    border-radius: 9px;
    background: var(--card);
    color: var(--muted);
    font-weight: 600
  }

  .syncbtn:hover {
    color: var(--ink);
    border-color: var(--faint)
  }

  .shared {
    font-size: 10.5px;
    color: var(--faint);
    text-align: center;
    margin-top: 9px;
    line-height: 1.4
  }

  /* ---------- page header ---------- */
  .pagehead {
    position: sticky;
    top: 0;
    z-index: 20;
    background: rgba(244, 242, 236, .82);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--line);
    padding: 18px 32px;
    display: flex;
    align-items: center;
    gap: 16px
  }

  .pagehead h1 {
    margin: 0;
    font-family: var(--serif);
    font-weight: 600;
    font-size: 23px;
    letter-spacing: .2px
  }

  .pagehead .sub {
    font-size: 12.5px;
    color: var(--muted);
    margin-top: 2px
  }

  .pagehead .right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 10px
  }

  .crumb {
    font-size: 11px;
    color: var(--faint);
    font-weight: 600;
    letter-spacing: .4px;
    text-transform: uppercase;
    margin-bottom: 1px
  }

  .content {
    padding: 24px 32px 90px;
    max-width: 1180px
  }

  .menubtn {
    display: none
  }

  /* ---------- generic ---------- */
  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--r);
    box-shadow: var(--shadow)
  }

  .pad {
    padding: 20px 22px
  }

  .grid {
    display: grid;
    gap: 16px
  }

  .sec {
    margin-top: 24px
  }

  .sec-h {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 13px
  }

  .sec-h h3 {
    margin: 0;
    font-size: 15px;
    font-weight: 600
  }

  .sec-h .hint {
    font-size: 12px;
    color: var(--muted)
  }

  .spacer {
    flex: 1
  }

  .tag {
    font-size: 11.5px;
    color: var(--muted)
  }

  /* kpi */
  .kpis {
    grid-template-columns: repeat(auto-fit, minmax(165px, 1fr))
  }

  .kpi {
    padding: 17px 18px;
    position: relative;
    overflow: hidden
  }

  .kpi .kico {
    position: absolute;
    top: 15px;
    right: 15px;
    color: var(--faint);
    opacity: .6
  }

  .kpi .lab {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .6px;
    font-weight: 600
  }

  .kpi .val {
    font-family: var(--serif);
    font-size: 32px;
    font-weight: 600;
    margin-top: 8px;
    letter-spacing: -.5px;
    line-height: 1
  }

  .kpi .sub {
    font-size: 11.5px;
    color: var(--faint);
    margin-top: 5px
  }

  /* chips */
  .chip {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    border-radius: 999px;
    padding: 3px 10px;
    font-size: 11px;
    font-weight: 600;
    white-space: nowrap
  }

  .chip .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%
  }

  .c-none {
    background: #F0EEE8;
    color: #8C887E
  }

  .c-none .dot {
    background: #B3AFA4
  }

  .c-prog {
    background: var(--sky-bg);
    color: var(--sky-ink)
  }

  .c-prog .dot {
    background: var(--sky)
  }

  .c-done {
    background: var(--sage-bg);
    color: var(--sage-ink)
  }

  .c-done .dot {
    background: var(--sage)
  }

  .c-issue {
    background: var(--rose-bg);
    color: var(--rose-ink)
  }

  .c-issue .dot {
    background: var(--rose)
  }

  .c-app {
    background: var(--peach-bg);
    color: var(--peach-ink)
  }

  .c-app .dot {
    background: var(--peach)
  }

  /* bars / pipe */
  .bar {
    height: 7px;
    background: #EFEDE6;
    border-radius: 7px;
    overflow: hidden
  }

  .bar i {
    display: block;
    height: 100%;
    background: linear-gradient(90deg, var(--sage), var(--sage-deep));
    border-radius: 7px;
    transition: width .35s
  }

  .stagebar {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 10px 0;
    border-top: 1px solid var(--line)
  }

  .stagebar:first-child {
    border-top: 0
  }

  .stagebar .nm {
    width: 188px;
    font-size: 13px
  }

  .stagebar .meter {
    flex: 1
  }

  .stagebar .pc {
    width: 84px;
    text-align: right;
    font-size: 12px;
    color: var(--muted);
    font-variant-numeric: tabular-nums
  }

  .pipe {
    display: flex;
    gap: 3px;
    width: 170px
  }

  .pipe span {
    height: 6px;
    flex: 1;
    border-radius: 3px;
    background: var(--line2)
  }

  .pipe .s-done {
    background: var(--sage)
  }

  .pipe .s-prog {
    background: var(--sky)
  }

  .pipe .s-issue {
    background: var(--rose)
  }

  /* donut + legend */
  .donutwrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px
  }

  .legend {
    display: flex;
    flex-direction: column;
    gap: 9px;
    width: 100%
  }

  .legend .li {
    display: flex;
    align-items: center;
    gap: 9px;
    font-size: 12.5px
  }

  .legend .sw {
    width: 11px;
    height: 11px;
    border-radius: 4px
  }

  .legend .num {
    margin-left: auto;
    font-weight: 600;
    font-variant-numeric: tabular-nums
  }

  /* tables */
  table {
    border-collapse: collapse;
    width: 100%
  }

  th,
  td {
    text-align: left;
    padding: 11px 13px;
    border-bottom: 1px solid var(--line);
    font-size: 13px;
    vertical-align: middle
  }

  th {
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: .6px;
    color: var(--muted);
    font-weight: 700
  }

  td.num,
  th.num {
    text-align: right;
    font-variant-numeric: tabular-nums
  }

  tr:last-child td {
    border-bottom: 0
  }

  .tbl-wrap {
    overflow: auto;
    border: 1px solid var(--line);
    border-radius: var(--r);
    background: var(--card);
    box-shadow: var(--shadow)
  }

  thead th {
    position: sticky;
    top: 0;
    background: var(--card-2);
    z-index: 1
  }

  /* product rows */
  .plist {
    display: flex;
    flex-direction: column;
    gap: 11px
  }

  .prow {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--r);
    box-shadow: var(--shadow);
    overflow: hidden;
    transition: .16s
  }

  .prow:hover {
    border-color: var(--line2)
  }

  .phead {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 15px 18px;
    cursor: pointer
  }

  .phead:hover {
    background: var(--card-2)
  }

  .psku {
    font-family: ui-monospace, Menlo, monospace;
    font-size: 11.5px;
    color: var(--muted);
    background: var(--card-2);
    border: 1px solid var(--line);
    border-radius: 7px;
    padding: 3px 9px;
    white-space: nowrap
  }

  .pname {
    font-weight: 600
  }

  .pvend {
    font-size: 12px;
    color: var(--muted)
  }

  .pbody {
    border-top: 1px solid var(--line);
    background: var(--card-2)
  }

  .chev {
    color: var(--faint);
    transition: .2s;
    font-size: 11px
  }

  .chev.open {
    transform: rotate(90deg)
  }

  .pct {
    font-variant-numeric: tabular-nums;
    font-weight: 600;
    font-size: 12.5px;
    width: 40px;
    text-align: right
  }

  /* stage editor */
  .stage {
    display: grid;
    grid-template-columns: 182px 156px 1fr 90px;
    gap: 12px;
    align-items: start;
    padding: 13px 16px;
    border-bottom: 1px solid var(--line)
  }

  .stage:last-child {
    border-bottom: 0
  }

  .stage .lab {
    font-weight: 600;
    padding-top: 8px;
    display: flex;
    align-items: center;
    gap: 8px
  }

  .stage .meta {
    grid-column: 1/-1;
    font-size: 11px;
    color: var(--faint);
    margin-top: -5px
  }

  .stnum {
    width: 20px;
    height: 20px;
    border-radius: 6px;
    background: var(--card);
    border: 1px solid var(--line2);
    display: grid;
    place-items: center;
    font-size: 10px;
    color: var(--muted);
    font-weight: 700;
    flex: 0 0 20px
  }

  label.fld {
    display: flex;
    flex-direction: column;
    gap: 5px;
    font-size: 11px;
    color: var(--muted);
    font-weight: 500
  }

  select,
  input.txt,
  textarea {
    border: 1px solid var(--line2);
    border-radius: 9px;
    padding: 9px 11px;
    background: var(--card);
    width: 100%;
    transition: .14s
  }

  select:focus,
  input.txt:focus,
  textarea:focus {
    outline: none;
    border-color: var(--sage);
    box-shadow: 0 0 0 3px var(--sage-bg)
  }

  textarea {
    resize: vertical;
    min-height: 36px
  }

  .done-pill-wrap:hover .done-popup {
    opacity: 1 !important;
  }


  .mini {
    padding: 8px 12px;
    border: 1px solid var(--line2);
    border-radius: 9px;
    background: var(--card);
    font-weight: 600;
    color: var(--sage-ink)
  }

  .mini:hover:not(:disabled) {
    background: var(--sage-bg);
    border-color: var(--sage)
  }

  .mini:disabled {
    opacity: .45;
    cursor: default
  }

  .mini.saved {
    background: var(--sage-bg);
    border-color: var(--sage);
    color: var(--sage-ink)
  }

  /* buttons */
  .ghost {
    border: 1px solid var(--line2);
    background: var(--card);
    border-radius: 10px;
    padding: 9px 14px;
    color: var(--ink);
    font-weight: 600;
    display: inline-flex;
    align-items: center;
    gap: 7px
  }

  .ghost:hover {
    border-color: var(--faint)
  }

  .primary {
    background: var(--ink);
    color: #fff;
    border-radius: 10px;
    padding: 10px 18px;
    font-weight: 600;
    display: inline-flex;
    align-items: center;
    gap: 7px
  }

  .primary:hover {
    background: #26241f
  }

  .primary:disabled {
    opacity: .5
  }

  .danger {
    color: var(--rose-ink);
    background: transparent;
    font-weight: 600;
    font-size: 12px
  }

  .danger:hover {
    text-decoration: underline
  }

  /* toolbar / filters */
  .toolbar {
    display: flex;
    gap: 10px;
    align-items: center;
    margin-bottom: 16px;
    flex-wrap: wrap
  }

  .search {
    position: relative;
    flex: 1;
    min-width: 200px
  }

  .search input {
    border: 1px solid var(--line2);
    border-radius: 10px;
    padding: 10px 12px 10px 36px;
    background: var(--card);
    width: 100%
  }

  .search svg {
    position: absolute;
    left: 11px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--faint)
  }

  .filt {
    border: 1px solid var(--line2);
    border-radius: 10px;
    padding: 9px 11px;
    background: var(--card);
    font-weight: 500;
    color: var(--ink)
  }

  /* alerts */
  .alert {
    display: flex;
    align-items: center;
    gap: 13px;
    padding: 13px 15px;
    border: 1px solid var(--rose);
    background: var(--rose-bg);
    border-radius: 13px;
    margin-bottom: 9px
  }

  .alert .ic {
    width: 28px;
    height: 28px;
    border-radius: 9px;
    background: var(--rose);
    color: #fff;
    display: grid;
    place-items: center;
    font-weight: 700;
    flex: 0 0 28px
  }

  .alert .tx {
    flex: 1;
    font-size: 13px;
    color: var(--rose-ink)
  }

  .alert b {
    color: var(--ink)
  }

  /* activity feed */
  .feed {
    display: flex;
    flex-direction: column
  }

  .feed .fi {
    display: flex;
    gap: 11px;
    padding: 11px 0;
    border-top: 1px solid var(--line)
  }

  .feed .fi:first-child {
    border-top: 0
  }

  .feed .fdot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--lav);
    margin-top: 6px;
    flex: 0 0 8px
  }

  .feed .fmain {
    font-size: 12.5px;
    line-height: 1.45
  }

  .feed .fmeta {
    font-size: 11px;
    color: var(--faint);
    margin-top: 2px
  }

  .feed b {
    font-weight: 600
  }

  .empty {
    text-align: center;
    color: var(--faint);
    padding: 54px 20px;
    font-size: 13px
  }

  .note {
    font-size: 12.5px;
    color: var(--sky-ink);
    background: var(--sky-bg);
    border: 1px solid #D6E5EE;
    border-radius: 12px;
    padding: 12px 15px;
    line-height: 1.55
  }

  /* modal */
  .scrim {
    position: fixed;
    inset: 0;
    background: rgba(53, 51, 45, .32);
    backdrop-filter: blur(3px);
    z-index: 60;
    display: grid;
    place-items: center;
    padding: 20px
  }

  .modal {
    background: var(--card);
    border-radius: 20px;
    box-shadow: var(--shadow-lg);
    width: min(580px, 100%);
    max-height: 92vh;
    overflow: auto
  }

  .modal h3 {
    margin: 0;
    padding: 22px 24px;
    border-bottom: 1px solid var(--line);
    font-family: var(--serif);
    font-weight: 600;

      const sheetUsers = await gsGetUsers();
      console.log("Sheet users:", sheetUsers);
      const user = sheetUsers.find(u => u.email.toLowerCase() === em && u.password === password);
      if (user) { setBusy(false); onLogin(user); return; }
      // Fallback: check team members added via Assign tab
      const allLocal = window.__teamMembers || [];
      const local = allLocal.find(u => u.email.toLowerCase() === em && u.password === password);

    const [tab, setTab] = useState("overview");
    const [operator, setOperator] = useState("");
    const [products, setProducts] = useState([]);
    const productsRef = useRef([]);
    useEffect(() => { productsRef.current = products; }, [products]);
    const [audit, setAudit] = useState([]);
    const [vendors, setVendors] = useState(DEFAULT_VENDORS);
    const [teamMembers, setTeamMembers] = useState([]);
    const [assignments, setAssignments] = useState([]);
    const [navOpen, setNavOpen] = useState(false);
    const [auth, setAuth] = useState(() => {
      try {
        const raw = sessionStorage.getItem("ct:auth") || localStorage.getItem("ct:auth");
        return raw ? JSON.parse(raw) : null;
      } catch { return null; }
    });

    const handleLogin = (user) => {
      const a = { name: user.name, email: user.email, role: user.role, stages: user.stages };
      setAuth(a);
      localStorage.setItem("ct:auth", JSON.stringify(a));
      sessionStorage.setItem("ct:auth", JSON.stringify(a));
      // Always stamp the operator name to whoever just logged in — never leave it
      // pointing at a stale name from a previous session on this browser/device.
      setOperator(user.name);
    };
    const handleLogout = () => {
      setAuth(null);
      localStorage.removeItem("ct:auth");
      sessionStorage.removeItem("ct:auth");
      localStorage.removeItem("ct:operator");
    };

    const load = useCallback(async () => {
      // Operator always mirrors the signed-in user — never a stale typed name
      // from a previous session or a different person on this device.
      if (auth && auth.name) setOperator(auth.name);
      const [data, sheetUsers] = await Promise.all([gsGet(), gsGetUsers()]);
      if (data) {
        const PROTECT_MS = 15000; // ignore a synced stage value for 15s after our own write
        const incoming = (data.products || []).map(ensureStages);
        const reconciled = incoming.map(incomingP => {
          const localP = productsRef.current.find(p => p.id === incomingP.id);
          if (!localP) return incomingP;
          const mergedStages = { ...incomingP.stages };
          Object.keys(mergedStages).forEach(stageKey => {
            const stamp = recentStagePatchRef.current[incomingP.id + "|" + stageKey];
            if (stamp && Date.now() - stamp < PROTECT_MS) {
              // Trust our own very-recent local write over this sync's value.
              mergedStages[stageKey] = localP.stages[stageKey];
            }
          });
          return { ...incomingP, stages: mergedStages };
        });
        setProducts(reconciled);
        setAudit((data.audit || []).map(normalizeAuditRow));
        setVendors(data.vendors || DEFAULT_VENDORS);
        setAssignments(data.assignments || []);

        const savedMembers = data.teamMembers || [];

        // const fromSheet = sheetUsers

        // Use Users sheet as source of truth for team members
        // const sheetUsers = await gsGetUsers();
        // const savedMembers = data.teamMembers || [];

        const fromSheet = sheetUsers
          .filter(u => u.email && u.role !== "master" && u.role !== "admin")
          .map(u => {
            const saved = savedMembers.find(m => m.email && m.email.toLowerCase() === u.email.toLowerCase());
            return {
              id: saved?.id || (u.name ? u.name.toLowerCase().replace(/\s+/g, "_") : uid()),
              name: u.name || u.email,
              email: u.email,
              password: u.password || "",
              role: u.role || "member",
              stages: u.stages || saved?.stages || "",
              division: saved?.division || u.division || "KOC Cards",
              managerId: saved?.managerId || u.managerId || null,
              joinedAt: saved?.joinedAt || u.joinedAt || ""
            };
          });

        window.__teamMembers = fromSheet;
        setTeamMembers(fromSheet);
      }
      setLoading(false);
    }, [auth]);
    useEffect(() => { load(); }, [load]);

    const logAudit = useCallback(async (action, entity, detail) => {
      const e = { id: uid(), at: now(), actor: operator || "Unattributed", action, entity, detail, division };
      setAudit(prev => { const next = [e, ...prev].slice(0, 800); return next; });
      await gsPost("appendAudit", e);
    }, [operator, division]);

    const bulkLockRef = useRef(false);
    const recentStagePatchRef = useRef({}); // pid+stageKey -> timestamp(ms) of our own last write

    const saveProducts = useCallback(async (next) => {
      if (bulkLockRef.current) {
        console.warn("Skipped saveProducts — bulk stage update in progress");
        return;
      }
      productsRef.current = next;
      setProducts(next);
      await gsPost("batchUpsertProducts", next);
    }, []);

    const upsertProduct = useCallback(async (prod, isNew) => {
      prod.updatedAt = now();
      const next = isNew ? [prod, ...products] : products.map(x => x.id === prod.id ? prod : x); await saveProducts(next);
      logAudit(isNew ? "Added product" : "Edited product", prod.sku || prod.name || "product", `${prod.name || "(unnamed)"} · ${prod.vendor || "no vendor"} · qty ${prod.qty}`);
    }, [products, saveProducts, logAudit]);

    const patchStage = useCallback(async (pid, stageKey, patch) => {
      if (bulkLockRef.current) {
        console.warn("Skipped single-stage patch — bulk update in progress");
        return;
      }
      const nowIso = now();
      const base = productsRef.current;
      const next = base.map(p => p.id !== pid ? p : { ...p, stages: { ...p.stages, [stageKey]: { ...p.stages[stageKey], ...patch, at: nowIso } }, updatedAt: nowIso });
      productsRef.current = next;
      setProducts(next);

      // Targeted single-row patch — touches only this product's stage cells on the
      // backend, so a stale client elsewhere can never overwrite this fresh save.
      const res = await gsPost("batchPatchStage", { ids: [pid], stageKey, patch });
      if (!res || res.ok === false) {
        throw new Error("batchPatchStage failed: " + JSON.stringify(res));
      }

      // Remember that WE just wrote this stage, so a sync that lands shortly after
      // (and might still carry a stale read from before our write committed) doesn't
      // overwrite it back. See load()'s merge logic below.
      recentStagePatchRef.current[pid + "|" + stageKey] = Date.now();

      const p = next.find(x => x.id === pid), sn = STAGES.find(s => s.k === stageKey).n;
      logAudit("Stage update", `${p.name || p.sku || "product"}`, `${sn} → ${patch.status || p.stages[stageKey].status}${patch.person ? (" · " + patch.person) : ""}`);
    }, [logAudit]);
    const patchStageBulk = useCallback(async (ids, stageKey, patch) => {
      bulkLockRef.current = true;
      try {
        const nowIso = now();
        const idSet = new Set(ids);
        const base = productsRef.current;
        const next = base.map(p => !idSet.has(p.id) ? p : { ...p, stages: { ...p.stages, [stageKey]: { ...p.stages[stageKey], ...patch, at: nowIso } }, updatedAt: nowIso });
        productsRef.current = next;
        setProducts(next);

        // Send only the ids + the single stage patch — not the whole product list —
        // so the backend does one targeted read+write instead of re-serializing everything.
        const res = await gsPost("batchPatchStage", { ids, stageKey, patch });
        if (!res || res.ok === false) {
          throw new Error("batchPatchStage failed: " + JSON.stringify(res));
        }

        const stamp = Date.now();
        ids.forEach(id => { recentStagePatchRef.current[id + "|" + stageKey] = stamp; });

        const sn = STAGES.find(s => s.k === stageKey).n;
        logAudit("Bulk stage update", `${ids.length} products`, `${sn} → ${patch.status} (multi-select)`);
      } finally {
        bulkLockRef.current = false;
      }
    }, [logAudit]);
    const patchQC = useCallback(async (pid, patch) => {
      const base = productsRef.current;
      const next = base.map(p => p.id === pid ? { ...p, ...patch, updatedAt: now() } : p);
      productsRef.current = next;
      await saveProducts(next);
      const p = next.find(x => x.id === pid); logAudit("Final audit", `${p.name || p.sku || "product"}`, `Verdict: ${patch.verdict || p.verdict || "—"}`);
    }, [saveProducts, logAudit]);
    const patchStore = useCallback(async (pid, store, patch) => {
      if (bulkLockRef.current) {
        console.warn("Skipped patchStore — bulk stage update in progress");
        return;
      }
      const base = productsRef.current;
      const next = base.map(p => p.id !== pid ? p : { ...p, stores: { ...p.stores, [store]: { ...p.stores[store], ...patch, at: now() } }, updatedAt: now() });
      productsRef.current = next;
      await saveProducts(next);
      const updated = next.find(x => x.id === pid);
      await gsPost("upsertStore", {
        productId: pid,
        store,
        division: updated.division,
        sku: updated.sku,
        storeData: updated.stores[store]
      });
      const p = updated, s = p.stores[store];
      let d = `${store}: disp ${s.dispatched}, recv ${s.received ? "yes" : "no"}`; if (s.missing > 0 || s.damaged > 0) d += ` · ⚠ missing ${s.missing}, damaged ${s.damaged}`;
      logAudit((s.missing > 0 || s.damaged > 0) ? "Issue reported" : "Store update", `${p.name || p.sku || "product"}`, d);
    }, [saveProducts, logAudit]);
    const removeProduct = useCallback(async (pid) => {
      const p = products.find(x => x.id === pid);
      const filtered = products.filter(x => x.id !== pid);
      setProducts(filtered);
      await gsPost("deleteProduct", { id: pid });
      logAudit("Deleted product", `${p?.name || p?.sku || "product"}`, p?.vendor || "");
    }, [products, logAudit]);
    const addVendor = useCallback(async (div, name) => {
      if (!name) return; const list = vendors[div] || []; if (list.includes(name)) return; const next = { ...vendors, [div]: [...list, name].sort() }; setVendors(next); await gsPost("setVendors", next);
    }, [vendors]);

    const saveTeamMembers = useCallback(async (next) => {
      setTeamMembers(next);
      window.__teamMembers = next;
      const res = await gsPost("setTeamMembers", next);
      if (!res || res.ok === false) {
        alert("Could not save team members to the server — re-syncing.");
        await load();
      }
    }, [load]);

    const saveAssignments = useCallback(async (next) => {
      setAssignments(next);
      const res = await gsPost("setAssignments", next);
      if (!res || res.ok === false) {
        alert("Could not save this assignment to the server — re-syncing.");
        await load();
      }
    }, [load]);

    const saveOperator = (v) => { setOperator(v); localStorage.setItem("ct:operator", v); };

    const bulkProducts = useCallback(async (rows) => {
      let created = 0, updated = 0; const errs = []; const newV = new Set(); let next = [...products];
      rows.forEach((row, i) => {
        const sku = String(row.sku || "").trim(); if (!sku || sku.toUpperCase().includes("EXAMPLE")) return;
        const div = DIVISIONS.includes(String(row.division || "").trim()) ? String(row.division).trim() : division;
        let existing = next.find(p => p.division === div && p.sku.toLowerCase() === sku.toLowerCase()); let prod, isNew = false;
        if (existing) { prod = { ...existing, stages: { ...existing.stages } }; } else { prod = blankProduct(div, ""); prod.sku = sku; isNew = true; }
        const g = k => row[k] !== "" && row[k] != null;
        if (g("name")) prod.name = String(row.name).trim();
        if (g("vendor")) { prod.vendor = String(row.vendor).trim(); if (!(vendors[div] || []).includes(prod.vendor)) newV.add(div + "|" + prod.vendor); }
        if (g("inward")) prod.inward = normDate(row.inward);
        if (g("qty") && !isNaN(+row.qty)) prod.qty = +row.qty;
        if (g("note")) prod.note = String(row.note).trim();
        if (g("set_no")) prod.set_no = String(row.set_no).trim();
        STAGE_COLS.forEach(s => {
          const k = s.k; let t = false; const cur = { ...prod.stages[k] }; const st = row[k + "_status"], pe = row[k + "_person"], co = row[k + "_comments"];
          if (st !== "" && st != null) { const ns = normStatus(st); if (ns) { cur.status = ns; t = true; } else errs.push(`Row ${i + 2}: invalid status "${st}" in ${k}_status`); }
          if (pe !== "" && pe != null) { cur.person = String(pe).trim(); t = true; } if (co !== "" && co != null) { cur.comments = String(co).trim(); t = true; }
          if (t) { cur.at = now(); prod.stages[k] = cur; }
        });
        if (g("qc_verdict")) { const v = String(row.qc_verdict).trim(); if (/appro/i.test(v)) prod.verdict = "Approved"; else if (/issue/i.test(v)) prod.verdict = "Issues Found"; }
        if (g("qc_issues")) prod.issues = String(row.qc_issues).trim(); prod.updatedAt = now();
        if (isNew) { next = [prod, ...next]; created++; } else { next = next.map(p => p.id === prod.id ? prod : p); updated++; }
      });
      await saveProducts(next); newV.forEach(s => { const [d, n] = s.split("|"); addVendor(d, n); });
      logAudit("Bulk import", `${created + updated} products`, `${created} created, ${updated} updated${errs.length ? `, ${errs.length} field errors` : ""}`);
      return { created, updated, errs };
    }, [products, division, vendors, saveProducts, addVendor, logAudit]);

    const bulkStores = useCallback(async (rows) => {
      let updated = 0; const errs = []; let next = [...products];
      rows.forEach((row, i) => {
        const sku = String(row.sku || "").trim(); if (!sku || sku.toUpperCase().includes("EXAMPLE")) return;
        const div = DIVISIONS.includes(String(row.division || "").trim()) ? String(row.division).trim() : division;
        const store = String(row.store || "").trim(); if (!STORES.includes(store)) { errs.push(`Row ${i + 2}: unknown store "${store}"`); return; }
        const existing = next.find(p => p.division === div && p.sku.toLowerCase() === sku.toLowerCase());
        if (!existing) { errs.push(`Row ${i + 2}: product "${sku}" not found in ${div}`); return; }
        const np = { ...existing, stores: { ...existing.stores } }; const s = { ...np.stores[store] }; const g = k => row[k] !== "" && row[k] != null;
        if (g("dispatched") && !isNaN(+row.dispatched)) s.dispatched = +row.dispatched;
        if (g("missing") && !isNaN(+row.missing)) s.missing = +row.missing;
        if (g("damaged") && !isNaN(+row.damaged)) s.damaged = +row.damaged;
        if (g("notes")) s.notes = String(row.notes).trim();
        if (g("received")) { const rv = normBool(row.received); if (rv && !s.received) { s.received = true; s.receivedAt = now(); s.receivedBy = operator || "bulk"; } else if (!rv) { s.received = false; } else { s.received = true; } }
        s.at = now(); np.stores[store] = s; np.updatedAt = now(); next = next.map(p => p.id === np.id ? np : p); updated++;
      });
      await saveProducts(next); logAudit("Bulk store import", `${updated} store rows`, errs.length ? `${errs.length} errors` : "ok");
      return { updated, errs };
    }, [products, division, operator, saveProducts, logAudit]);

    const divProducts = useMemo(() => {
      const base = products.filter(p => p.division === division);
      if (!auth) return base;
      const isMasterOrAdmin = auth.role === "master" || auth.role === "admin";
      if (isMasterOrAdmin) return base;
      // member — find their record by email for reliable ID matching
      const myMember = window.__teamMembers?.find(m => m.email && auth.email && m.email.toLowerCase() === auth.email.toLowerCase());
      const myId = myMember?.id || auth.name.toLowerCase().replace(/\s+/g, "_");
      const myAssigned = assignments.filter(a => a.memberId === myId).map(a => a.sku.toLowerCase());
      if (myAssigned.length === 0) return [];
      return base.filter(p => myAssigned.includes(p.sku.toLowerCase()));
    }, [products, division, auth, assignments]);
    const counts = useMemo(() => { const o = {}; DIVISIONS.forEach(d => o[d] = products.filter(p => p.division === d).length); return o; }, [products]);
    const openIssues = useMemo(() => { const l = []; divProducts.forEach(p => STORES.forEach(st => { const s = p.stores[st]; if (s && (s.missing > 0 || s.damaged > 0)) l.push({ p, store: st, s }); })); return l; }, [divProducts]);

    const META = { overview: ["Overview", "Production, listing & dispatch at a glance"], products: ["Products & Pipeline", "Every design and its full production lifecycle"], dispatch: ["Dispatch & Stores", "Scan, dispatch & store receipts across 11 stores"], bulk: ["Bulk Upload", "Import & update thousands of records via Excel"], audit: ["Audit Log", "A complete timestamped trail of every action"], assign: ["Assign Work", "Manage team members and assign SKUs to individuals"], process: ["Process", "Member performance reports and completed work"] };

    if (!auth) return <Login onLogin={handleLogin} />;

    if (loading) return (
      <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", background: "var(--bg)", flexDirection: "column", gap: 14 }}>
        <div className="logo" style={{ width: 44, height: 44, borderRadius: 12, background: "linear-gradient(150deg, var(--sage), var(--sage-deep))", display: "grid", placeItems: "center", color: "#fff", boxShadow: "0 4px 10px rgba(124,166,125,.35)" }}>{I.box({ stroke: "#fff" })}</div>
        <div style={{ fontFamily: "var(--serif)", fontSize: 18, color: "var(--ink)" }}>Loading workspace…</div>
        <div style={{ fontSize: 12, color: "var(--muted)" }}>Connecting to Google Sheets</div>
      </div>
    );

    const allowedStages = getAllowedStages(auth);

    const ALL_NAV = [["overview", "Overview", I.grid], ["products", "Products & Pipeline", I.layers], ["dispatch", "Dispatch & Stores", I.truck], ["bulk", "Bulk Upload", I.upload], ["audit", "Audit Log", I.audit], ["assign", "Assign Work", I.gear], ["process", "Process", I.check]];
    const NAV = ALL_NAV.filter(([k]) => canSeeTab(auth, k));

    // If current tab is no longer accessible, switch to first allowed tab
    if (!canSeeTab(auth, tab) && NAV.length > 0) { setTab(NAV[0][0]); }

    return (
      <div className="app">
        {navOpen && <div className="scrim2" onClick={() => setNavOpen(false)} />}
        <aside className={"sidebar" + (navOpen ? " open" : "")}>
          <div className="brand">
            <div className="logo">{I.box({ stroke: "#fff" })}</div>
            <div><b>Card Flow</b><span>Production Suite</span></div>
          </div>
          <div className="navlabel">Division</div>
          {DIVISIONS.map(d => (
            <button key={d} className={"divbtn" + (division === d ? " on" : "")} onClick={() => { setDivision(d); setNavOpen(false); }}>
              <span className="dmark">{d[0]}</span>{d}<span className="dcount">{counts[d] || 0}</span>
            </button>
          ))}
          <div className="navlabel">Workspace</div>
          {NAV.map(([k, n, ic]) => (
            <button key={k} className={"navitem" + (tab === k ? " on" : "")} onClick={() => { setTab(k); setNavOpen(false); }}>
              {ic({})}{n}{k === "dispatch" && openIssues.length > 0 && <span className="pip">{openIssues.length}</span>}
            </button>
          ))}
          <div className="sidefoot" style={{ flexShrink: 0 }}>
            <div style={{ background: "var(--rose-bg)", border: "1px solid var(--rose)", borderRadius: 11, padding: "10px 12px", marginBottom: 8, display: "flex", alignItems: "center", justifyContent: "space-between", gap: 8 }}>
              <div>
                <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: ".6px", textTransform: "uppercase", color: "var(--rose-ink)", marginBottom: 2 }}>Signed in as</div>
                <div style={{ fontSize: 13, fontWeight: 600, color: "var(--ink)" }}>{auth.name}</div>
              </div>
              <button onClick={handleLogout} style={{ background: "var(--rose)", color: "#fff", border: 0, borderRadius: 8, padding: "7px 12px", fontSize: 12, fontWeight: 700, cursor: "pointer", whiteSpace: "nowrap", flexShrink: 0 }}>
                ↩ Log out
              </button>
            </div>
            <div className="opwrap">
              <label>Operator name</label>
              <div style={{ border: "1px solid var(--line2)", borderRadius: 9, padding: "8px 10px", background: "var(--card-2)", color: "var(--ink)", fontWeight: 600 }}>
                {operator || auth.name}
              </div>
            </div>
            <button className="syncbtn" onClick={load}>{I.sync({})} Sync workspace</button>
            <div className="shared">Shared workspace · everyone sees<br />the same live data</div>
          </div>
        </aside>

        <main className="main">
          <header className="pagehead">
            <button className="menubtn" onClick={() => setNavOpen(true)}>{I.menu({})}</button>
            <div>
              <div className="crumb">{division}</div>
              <h1>{META[tab][0]}</h1>
              <div className="sub">{META[tab][1]}</div>
            </div>
            <div className="right">
              {tab === "products" && <button className="primary" onClick={() => window.__openAdd && window.__openAdd()}>{I.plus({})} Add product</button>}
              <button onClick={handleLogout} style={{ border: "1px solid var(--line2)", borderRadius: 10, padding: "8px 14px", fontSize: 12, fontWeight: 600, color: "var(--rose-ink)", background: "var(--card)", display: "inline-flex", alignItems: "center", gap: 6 }}>
                ↩ Log out
              </button>
            </div>
          </header>
          <div className="content">
            {tab === "overview" && <Overview division={division} products={divProducts} issues={openIssues} audit={audit.filter(a => a.division === division)} go={setTab} vendors={vendors[division] || []} allowedStages={allowedStages} auth={auth} teamMembers={teamMembers} assignments={assignments} />}
            {tab === "products" && <Products division={division} products={divProducts} vendors={vendors[division] || []} onUpsert={upsertProduct} onStage={patchStage} onStageBulk={patchStageBulk} onQC={patchQC} onRemove={removeProduct} addVendor={addVendor} allowedStages={allowedStages} operator={operator} />}
            {tab === "dispatch" && <Dispatch products={divProducts} onStore={patchStore} onStage={patchStage} operator={operator} />}
            {tab === "bulk" && <Bulk division={division} products={products} divProducts={divProducts} bulkProducts={bulkProducts} bulkStores={bulkStores} />}
            {tab === "audit" && <AuditLog audit={audit.filter(a => a.division === division)} products={products} onStage={patchStage} />}
            {tab === "assign" && (canAssign(auth) || (auth.stages || "").split(",").map(s => s.trim()).includes("assign")) && <AssignWork division={division} products={divProducts} allProducts={products} teamMembers={teamMembers} assignments={assignments} onSaveTeam={saveTeamMembers} onSaveAssignments={saveAssignments} auth={auth} vendors={vendors[division] || []} />}
            {tab === "process" && <Process division={division} products={products} teamMembers={teamMembers} assignments={assignments} audit={audit} />}
          </div>
        </main>
      </div>
    );
  }

  /* ---------------- OVERVIEW ---------------- */
  function Overview({ division, products, issues, audit, go, vendors = [], allowedStages = null, auth, teamMembers = [], assignments = [] }) {
    const [fVendor, setFVendor] = useState("");
    const [fSetNo, setFSetNo] = useState("");
    const [fMember, setFMember] = useState("");
    const myMemberId = useMemo(() => {
      const me = teamMembers.find(m => m.email && auth?.email && m.email.toLowerCase() === auth.email.toLowerCase());
      return me?.id || null;
    }, [teamMembers, auth]);
    const myTeam = useMemo(() => {
      const reports = teamMembers.filter(m => m.division === division && m.managerId === myMemberId);
      const myOwn = teamMembers.find(m => m.id === myMemberId);
      if (myOwn && !reports.some(m => m.id === myOwn.id)) return [...reports, myOwn];
      return reports;
    }, [teamMembers, division, myMemberId]);
    const memberSkuMap = useMemo(() => {
      const map = {};
      const isMgr = !isMasterOrAdminView && myMemberId;

      assignments.filter(a => a.division === division).forEach(a => {
        (map[a.memberId] ||= new Set()).add(a.sku.toLowerCase());
      });

      // For the manager themselves: override their map entry to show only
      // their remaining pool (received but not yet pushed to anyone)
      if (isMgr) {
        const myReceivedSkus = new Set(
          assignments
            .filter(a => a.division === division && a.memberId === myMemberId)
            .map(a => a.sku.toLowerCase())
        );
        const myPushedSkus = new Set(
          assignments
            .filter(a => a.division === division && a.managerId === myMemberId)
            .map(a => a.sku.toLowerCase())
        );
        const remaining = new Set([...myReceivedSkus].filter(s => !myPushedSkus.has(s)));
        if (remaining.size > 0) {
          map[myMemberId] = remaining;
        } else {
          delete map[myMemberId];
        }
      }

      return map;
    }, [assignments, division, isMasterOrAdminView, myMemberId]);
    const vendorOptions = (vendors || []).map(v => v.trim()).filter(Boolean);
    const setNoOptions = useMemo(() => [...new Set(products.map(p => p.set_no).filter(Boolean))].sort(), [products]);
    const filteredProducts = useMemo(() => products.filter(p =>
      (!fVendor || (p.vendor || "").trim().toLowerCase() === fVendor.trim().toLowerCase()) &&
      (!fSetNo || (p.set_no || "").trim().toLowerCase() === fSetNo.trim().toLowerCase()) &&
      (!fMember || (memberSkuMap[fMember]?.has((p.sku || "").toLowerCase())))
    ), [products, fVendor, fSetNo, fMember, memberSkuMap]);
    const hasFilters = fVendor || fSetNo || fMember;

    const total = filteredProducts.length;
    const done = filteredProducts.filter(p => productState(p) === "done").length;
    const prog = filteredProducts.filter(p => productState(p) === "prog").length;
    const none = filteredProducts.filter(p => productState(p) === "none").length;
    const withIssue = filteredProducts.filter(p => productState(p) === "issue").length;
    let dispatched = 0, received = 0, missing = 0, damaged = 0;
    filteredProducts.forEach(p => STORES.forEach(st => { const s = p.stores[st]; dispatched += s.dispatched || 0; if (s.received) received++; missing += s.missing || 0; damaged += s.damaged || 0; }));
    const visibleStages = allowedStages ? STAGES.filter(s => allowedStages.includes(s.k)) : STAGES;
    const stageStats = visibleStages.map(s => ({ ...s, done: filteredProducts.filter(p => p.stages[s.k].status === "Completed").length, issue: filteredProducts.filter(p => p.stages[s.k].status === "Issue").length }));
    const storeStats = STORES.map(st => { let d = 0, r = 0, m = 0, dm = 0, pending = 0; filteredProducts.forEach(p => { const s = p.stores[st]; d += s.dispatched || 0; if (s.received) r++; else if (s.dispatched > 0) pending++; m += s.missing || 0; dm += s.damaged || 0; }); return { st, d, r, m, dm, pending }; });
    const segs = [{ label: "Listing complete", value: done, color: "var(--sage)" }, { label: "In production", value: prog, color: "var(--sky)" }, { label: "Not started", value: none, color: "var(--line2)" }, { label: "With issues", value: withIssue, color: "var(--rose)" }];

    // Only count as "distributed" when assigned to a leaf (non-master push)
    // A card assigned master→manager is still "with manager", not distributed
    const isMasterOrAdminView = auth?.role === "master" || auth?.role === "admin";
    const allDivProducts = products.filter(p => p.division === division);

    let distributedSkus, remainingWithManager, distributionBreakdown;

    if (isMasterOrAdminView) {
      const masterAssignedSkus = new Set(
        assignments
          .filter(a => a.division === division && a.managerId === "master")
          .map(a => a.sku.toLowerCase())
      );
      distributedSkus = allDivProducts.filter(p => masterAssignedSkus.has(p.sku.toLowerCase())).length;
      remainingWithManager = allDivProducts.filter(p => !masterAssignedSkus.has(p.sku.toLowerCase())).length;
      distributionBreakdown = teamMembers
        .filter(m => m.division === division)
        .map(m => {
          const seen = new Set();
          const count = assignments.filter(a => {
            if (a.memberId !== m.id || a.division !== division) return false;
            const key = a.sku.toLowerCase();
            if (seen.has(key)) return false;
            seen.add(key); return true;
          }).length;
          return { name: m.name, count };
        })
        .filter(x => x.count > 0)
        .sort((a, b) => b.count - a.count);
    } else {
      const myTeamMemberIds = new Set(myTeam.map(m => m.id));
      myTeamMemberIds.delete(myMemberId);
      const pushedToTeamSkus = new Set(
        assignments
          .filter(a => a.division === division && myTeamMemberIds.has(a.memberId))
          .map(a => a.sku.toLowerCase())
      );
      const mySkus = new Set(
        assignments
          .filter(a => a.division === division && a.memberId === myMemberId)
          .map(a => a.sku.toLowerCase())
      );
      const withMeSkus = new Set([...mySkus].filter(s => !pushedToTeamSkus.has(s)));
      distributedSkus = pushedToTeamSkus.size;
      remainingWithManager = withMeSkus.size;
      distributionBreakdown = myTeam
        .filter(m => m.id !== myMemberId)
        .map(m => {
          const seen = new Set();
          const count = assignments.filter(a => {
            if (a.memberId !== m.id || a.division !== division) return false;
            const key = a.sku.toLowerCase();
            if (seen.has(key)) return false;
            seen.add(key); return true;
          }).length;
          return { name: m.name, count };
        })
        .filter(x => x.count > 0)
        .sort((a, b) => b.count - a.count);
    }
    const [showDistBreakdown, setShowDistBreakdown] = useState(false);
    const kpis = [
      { lab: "Total Products", val: total, sub: division, ic: I.box },
      { lab: "With Manager", val: remainingWithManager, sub: isMasterOrAdminView ? "not yet assigned" : "remaining with me", ic: I.layers, color: remainingWithManager > 0 ? "var(--peach-ink)" : "var(--sage-ink)" },
      { lab: "Listing complete", val: done, sub: "all stages done", ic: I.check, color: "var(--sage-ink)" },
      { lab: "Issues", val: `${missing} / ${damaged}`, sub: `${issues.length} flagged rows`, ic: I.alert, color: (missing + damaged) ? "var(--rose-ink)" : "var(--ink)" },
    ];

    return (
      <div>
        <div className="grid kpis">
          {kpis.map((k, i) => (<div className="card kpi" key={i}><div className="kico">{k.ic({})}</div><div className="lab">{k.lab}</div><div className="val" style={{ color: k.color || "var(--ink)" }}>{k.val}</div><div className="sub">{k.sub}</div></div>))}
          {/* Distributed to Team — standalone card with dropdown */}
          <div className="card kpi" style={{ position: "relative" }}>
            <div className="kico">{I.gear({})}</div>
            <div className="lab">Distributed to Team</div>
            <div className="val" style={{ color: "var(--sky-ink)" }}>{distributedSkus}</div>
            <div className="sub" style={{ display: "flex", alignItems: "center", gap: 6, cursor: distributionBreakdown?.length > 0 ? "pointer" : "default" }}
              onClick={() => distributionBreakdown?.length > 0 && setShowDistBreakdown(s => !s)}>
              {distributionBreakdown?.length > 0
                ? <><span>{distributionBreakdown.length} member{distributionBreakdown.length !== 1 ? "s" : ""}</span><span style={{ fontSize: 10, color: "var(--faint)" }}>{showDistBreakdown ? "▲" : "▼"}</span></>
                : <span>{teamMembers.filter(m => m.division === division).length} members</span>}
            </div>
            {showDistBreakdown && distributionBreakdown?.length > 0 && (
              <div style={{ position: "absolute", top: "calc(100% + 6px)", left: 0, right: 0, background: "var(--card)", border: "1px solid var(--line2)", borderRadius: 12, boxShadow: "var(--shadow-lg)", zIndex: 30, padding: "8px 0", minWidth: 180 }}>
                {distributionBreakdown.map((x, i) => (
                  <div key={i} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "7px 14px", borderBottom: i < distributionBreakdown.length - 1 ? "1px solid var(--line)" : "none" }}>
                    <span style={{ fontSize: 12, fontWeight: 600, color: "var(--ink)" }}>{x.name}</span>
                    <span style={{ fontSize: 12, fontWeight: 700, color: "var(--sky-ink)", background: "var(--sky-bg)", borderRadius: 999, padding: "2px 10px" }}>{x.count}</span>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>

        <div className="card pad" style={{ marginTop: 14, display: "flex", alignItems: "center", gap: 20, flexWrap: "wrap" }}>
          <div style={{ fontWeight: 700, fontSize: 13, color: "var(--ink)", whiteSpace: "nowrap" }}>SKU Distribution</div>
          <div style={{ flex: 1, minWidth: 200 }}>
            <div style={{ display: "flex", height: 10, borderRadius: 99, overflow: "hidden", background: "var(--line2)" }}>
              {total > 0 && <>
                <div style={{ width: `${(distributedSkus / total) * 100}%`, background: "var(--sky)", transition: "width .4s" }} title={`Distributed: ${distributedSkus}`} />
                <div style={{ flex: 1, background: "var(--peach)", transition: "width .4s" }} title={`With manager: ${remainingWithManager}`} />
              </>}
            </div>
          </div>
          <div style={{ display: "flex", gap: 18, flexShrink: 0, flexWrap: "wrap" }}>
            <span style={{ fontSize: 12, display: "flex", alignItems: "center", gap: 6 }}>
              <span style={{ width: 10, height: 10, borderRadius: 3, background: "var(--sky)", display: "inline-block" }} />
              <span style={{ color: "var(--muted)" }}>Distributed</span>
              <b style={{ color: "var(--sky-ink)" }}>{distributedSkus}</b>
            </span>
            <span style={{ fontSize: 12, display: "flex", alignItems: "center", gap: 6 }}>
              <span style={{ width: 10, height: 10, borderRadius: 3, background: "var(--peach)", display: "inline-block" }} />
              <span style={{ color: "var(--muted)" }}>With manager</span>
              <b style={{ color: "var(--peach-ink)" }}>{remainingWithManager}</b>
            </span>
            <span style={{ fontSize: 12, display: "flex", alignItems: "center", gap: 6 }}>
              <span style={{ color: "var(--muted)" }}>Total</span>
              <b>{total}</b>
            </span>
          </div>
        </div>

        {issues.length > 0 && (
          <div className="sec">
            <div className="sec-h"><h3>Live alerts · missing & damaged</h3><span className="hint">reported by store executives</span></div>
            {issues.slice(0, 6).map((x, i) => (
              <div className="alert" key={i}><div className="ic">!</div>
                <div className="tx"><b>{x.store}</b> — {x.s.missing > 0 ? `${x.s.missing} missing` : ""}{x.s.missing > 0 && x.s.damaged > 0 ? ", " : ""}{x.s.damaged > 0 ? `${x.s.damaged} damaged` : ""} · <b>{x.p.name || x.p.sku || "product"}</b> ({x.p.vendor || "—"}){x.s.notes ? ` · "${x.s.notes}"` : ""} <span className="tag">· {fmt(x.s.at)}</span></div>
                <button className="ghost" onClick={() => go("dispatch")}>Resolve</button>
              </div>
            ))}
            {issues.length > 6 && <div className="tag" style={{ marginTop: 4 }}>+{issues.length - 6} more in Dispatch & Stores</div>}
          </div>
        )}

        <div className="sec ov-grid">
          <div className="card pad">
            <div className="sec-h" style={{ marginBottom: 6, alignItems: "center", flexWrap: "wrap", gap: 8 }}>
              <h3>Pipeline progress</h3>
              <div style={{ display: "flex", alignItems: "center", gap: 8, marginLeft: "auto", flexWrap: "wrap" }}>
                <select value={fVendor} onChange={e => setFVendor(e.target.value)} style={{ border: "1px solid var(--line2)", borderRadius: 8, padding: "6px 10px", background: "var(--card)", fontSize: 11.5, color: fVendor ? "var(--ink)" : "var(--muted)" }}>
                  <option value="">— all vendors —</option>
                  {vendorOptions.map(v => <option key={v} value={v}>{v}</option>)}
                </select>
                <select value={fSetNo} onChange={e => setFSetNo(e.target.value)} style={{ border: "1px solid var(--line2)", borderRadius: 8, padding: "6px 10px", background: "var(--card)", fontSize: 11.5, color: fSetNo ? "var(--ink)" : "var(--muted)" }}>
                  <option value="">— all set no. —</option>
                  {setNoOptions.map(s => <option key={s} value={s}>{s}</option>)}
                </select>
                {myTeam.length > 0 && (
                  <select value={fMember} onChange={e => setFMember(e.target.value)} style={{ border: "1px solid var(--line2)", borderRadius: 8, padding: "6px 10px", background: "var(--card)", fontSize: 11.5, color: fMember ? "var(--ink)" : "var(--muted)" }}>
                    <option value="">— all my team —</option>
                    {myTeam.map(m => <option key={m.id} value={m.id}>{m.name}</option>)}
                  </select>
                )}
                {hasFilters && <button className="ghost" style={{ padding: "6px 10px", fontSize: 11.5 }} onClick={() => { setFVendor(""); setFSetNo(""); setFMember(""); }}>Clear</button>}
                <span className="hint" style={{ whiteSpace: "nowrap" }}>manufacturing → listing → dispatch</span>
              </div>
            </div>
            {hasFilters && <div className="tag" style={{ marginBottom: 10 }}>Showing {filteredProducts.length} of {products.length} {division} products{fVendor ? ` · vendor: ${fVendor}` : ""}{fSetNo ? ` · set no: ${fSetNo}` : ""}</div>}
            <div style={{ overflowX: "auto" }}>
              <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
                <thead>
                  <tr>
                    <th style={{ textAlign: "left", padding: "8px 10px", color: "var(--muted)", fontWeight: 700, fontSize: 11, textTransform: "uppercase", letterSpacing: ".6px", borderBottom: "1px solid var(--line)", width: 180 }}>Stage</th>
                    <th style={{ textAlign: "center", padding: "8px 10px", color: "#B3AFA4", fontWeight: 700, fontSize: 11, textTransform: "uppercase", letterSpacing: ".6px", borderBottom: "1px solid var(--line)" }}>Not Started</th>
                    <th style={{ textAlign: "center", padding: "8px 10px", color: "var(--sky-ink)", fontWeight: 700, fontSize: 11, textTransform: "uppercase", letterSpacing: ".6px", borderBottom: "1px solid var(--line)" }}>In Progress</th>
                    <th style={{ textAlign: "center", padding: "8px 10px", color: "var(--sage-ink)", fontWeight: 700, fontSize: 11, textTransform: "uppercase", letterSpacing: ".6px", borderBottom: "1px solid var(--line)" }}>Completed</th>
                    <th style={{ textAlign: "center", padding: "8px 10px", color: "var(--rose-ink)", fontWeight: 700, fontSize: 11, textTransform: "uppercase", letterSpacing: ".6px", borderBottom: "1px solid var(--line)" }}>Issue</th>
                  </tr>
                </thead>
                <tbody>
                  {stageStats.map(s => {
                    const notStarted = filteredProducts.filter(p => p.stages[s.k].status === "Not Started").length;
                    const inProgress = filteredProducts.filter(p => p.stages[s.k].status === "In Progress").length;
                    const completed = filteredProducts.filter(p => p.stages[s.k].status === "Completed").length;
                    const issue = filteredProducts.filter(p => p.stages[s.k].status === "Issue").length;
                    return (
                      <tr key={s.k} style={{ borderBottom: "1px solid var(--line)" }}>
                        <td style={{ padding: "10px 10px", fontWeight: 600, fontSize: 13 }}>{s.n}</td>
                        <td style={{ textAlign: "center", padding: "10px 10px" }}>
                          {notStarted > 0
                            ? <span style={{ background: "#F0EEE8", color: "#8C887E", borderRadius: 999, padding: "3px 12px", fontWeight: 700, fontSize: 12 }}>{notStarted}</span>
                            : <span style={{ color: "var(--faint)" }}>—</span>}
                        </td>
                        <td style={{ textAlign: "center", padding: "10px 10px" }}>
                          {inProgress > 0
                            ? <span style={{ background: "var(--sky-bg)", color: "var(--sky-ink)", borderRadius: 999, padding: "3px 12px", fontWeight: 700, fontSize: 12 }}>{inProgress}</span>
                            : <span style={{ color: "var(--faint)" }}>—</span>}
                        </td>
                        <td style={{ textAlign: "center", padding: "10px 10px" }}>
                          {completed > 0
                            ? <span style={{ background: "var(--sage-bg)", color: "var(--sage-ink)", borderRadius: 999, padding: "3px 12px", fontWeight: 700, fontSize: 12 }}>{completed}</span>
                            : <span style={{ color: "var(--faint)" }}>—</span>}
                        </td>
                        <td style={{ textAlign: "center", padding: "10px 10px" }}>
                          {issue > 0
                            ? <span style={{ background: "var(--rose-bg)", color: "var(--rose-ink)", borderRadius: 999, padding: "3px 12px", fontWeight: 700, fontSize: 12 }}>{issue}</span>
                            : <span style={{ color: "var(--faint)" }}>—</span>}
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
          <div className="card pad">
            <div className="sec-h" style={{ marginBottom: 10 }}><h3>Status mix</h3></div>
            <div className="donutwrap">
              <Donut segments={segs} centerTop={total} centerBot="products" />
              <div className="legend">
                {segs.map((s, i) => (<div className="li" key={i}><span className="sw" style={{ background: s.color }} />{s.label}<span className="num">{s.value}</span></div>))}
              </div>
            </div>
          </div>
        </div>

        <div className="sec ov-grid">
          <div>
            <div className="sec-h"><h3>Store receipt status</h3><span className="hint">{STORES.length} stores</span></div>
            <div className="tbl-wrap">
              <table>
                <thead><tr><th>Store</th><th className="num">Disp.</th><th className="num">Recv ✓</th><th className="num">Pending</th><th className="num">Miss</th><th className="num">Dmg</th><th>Status</th></tr></thead>
                <tbody>{storeStats.map(r => (<tr key={r.st}><td><b>{r.st}</b></td><td className="num">{r.d}</td><td className="num">{r.r}</td><td className="num">{r.pending}</td><td className="num" style={{ color: r.m ? "var(--rose-ink)" : "inherit" }}>{r.m}</td><td className="num" style={{ color: r.dm ? "var(--rose-ink)" : "inherit" }}>{r.dm}</td><td>{(r.m || r.dm) ? <Chip status="Issue" /> : r.pending === 0 && r.d > 0 ? <Chip status="Completed" /> : r.d > 0 ? <Chip status="In Progress" /> : <Chip status="Not Started" />}</td></tr>))}</tbody>
              </table>
            </div>
          </div>
          <div className="card pad">
            <div className="sec-h" style={{ marginBottom: 6 }}><h3>Recent activity</h3></div>
            {audit.length === 0 ? <div className="tag" style={{ padding: "14px 0" }}>No activity yet.</div> :
              <div className="feed">{audit.slice(0, 9).map(a => (<div className="fi" key={a.id}><span className="fdot" /><div><div className="fmain"><b>{a.action}</b> — {a.entity}</div><div className="fmeta">{a.actor} · {fmt(a.at)}</div></div></div>))}</div>}
          </div>
        </div>
      </div>
    );
  }
